                      <img src={cp.stampImage} alt="印章" style={{ height: 64, borderRadius: 6, border: `1px solid ${C.border}` }} />
                      <button onClick={() => setCP("stampImage", "")}
                        style={{ position: "absolute", top: -6, right: -6, width: 18, height: 18, borderRadius: "50%", background: C.rose, color: "#fff", border: "none", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit" }}>×</button>
                    </div>
                  ) : null}
                  <button onClick={() => stampInputRef.current?.click()}
                    style={{ fontSize: 11, color: C.accent, background: `${C.accent}10`, border: `1px solid ${C.accent}30`, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                    onMouseEnter={(e) => e.currentTarget.style.background = `${C.accent}20`}
                    onMouseLeave={(e) => e.currentTarget.style.background = `${C.accent}10`}>
                    {cp.stampImage ? "🔄 更換圖片" : "📎 上傳印章圖片"}
                  </button>
                  <span style={{ fontSize: 11, color: C.inkMuted }}>PNG / JPG，建議透明背景，500KB 以下（會以半透明鋼印效果覆蓋在報價單金額區）</span>
                </div>
              </Field>
              <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 4, padding: "0 2px" }}>這些設定會自動儲存，套用到所有報價單的 FROM、簽約欄位與底部。</div>
            </div>
          )}

          {/* Quote type selector */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {QUOTE_TYPES.map((qt) => (
              <button key={qt.id} onClick={() => { setF("quoteType", qt.id); setSourceKey(""); setForm((p) => ({ ...p, dealId: null, partnerId: null, client: { name: "", contact: "", email: "", address: "" } })); }}
                style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: `1px solid ${form.quoteType === qt.id ? C.accent : C.border}`, background: form.quoteType === qt.id ? `${C.accent}15` : "transparent", color: form.quoteType === qt.id ? C.accent : C.inkSoft, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: T, textAlign: "center" }}>
                {qt.label}
                <div style={{ fontSize: 11, fontWeight: 400, marginTop: 2, opacity: 0.7 }}>{qt.desc}</div>
              </button>
            ))}
          </div>

          {/* Source import — different by quoteType */}
          {form.quoteType === "client" ? (
            <div>
              <Field label="🔗 匯入客戶（案件 / BD）">
                <select style={selectStyle} value={sourceKey} onChange={(e) => fillFromSource(e.target.value)}>
                  <option value="">✏️ 手動輸入客戶資訊</option>
                  {clientSources.filter((s) => s.type === "deal").length > 0 && <optgroup label="📊 案件">{clientSources.filter((s) => s.type === "deal").map((s) => <option key={`deal:${s.id}`} value={`deal:${s.id}`}>{s.label}</option>)}</optgroup>}
                  {clientSources.filter((s) => s.type === "lead").length > 0 && <optgroup label="🎯 BD 對象">{clientSources.filter((s) => s.type === "lead").map((s) => <option key={`lead:${s.id}`} value={`lead:${s.id}`}>{s.label}</option>)}</optgroup>}
                </select>
              </Field>
              <input type="file" ref={csvClientRef} accept=".csv" onChange={importLeadsFromCSV} style={{ display: "none" }} />
              <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
                <button onClick={() => csvClientRef.current?.click()}
                  style={{ fontSize: 11, color: "#8B5CF6", background: "rgba(139,92,246,0.07)", border: "1px solid rgba(139,92,246,0.19)", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                  onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,92,246,0.14)"}
                  onMouseLeave={(e) => e.currentTarget.style.background = "rgba(139,92,246,0.07)"}>
                  📁 CSV 匯入 BD 對象
                </button>
                <button onClick={() => downloadSampleCSV("client")}
                  style={{ fontSize: 11, color: C.inkMuted, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = C.borderHover}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = C.border}>
                  📥 下載範例 CSV
                </button>
                {csvResult && (
                  <span style={{ fontSize: 11, color: csvResult.ok ? C.mint : C.rose, fontWeight: 600 }}>
                    {csvResult.ok ? "✅" : "⚠️"} {csvResult.msg}
                  </span>
                )}
              </div>
            </div>
          ) : (
            <div>
              <Field label="🤝 選擇外包夥伴">
                <select style={selectStyle} value={sourceKey} onChange={(e) => fillFromSource(e.target.value)}>
                  <option value="">✏️ 手動輸入外包夥伴資訊</option>
                  {partners.map((p) => <option key={`partner:${p.id}`} value={`partner:${p.id}`}>🤝 {p.company} — {p.contact}</option>)}
                </select>
              </Field>
              {/* Save current input as partner / manage partners / CSV import */}
              <input type="file" ref={csvInputRef} accept=".csv" onChange={importPartnersFromCSV} style={{ display: "none" }} />
              <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
                {!sourceKey && form.client.name.trim() && !partners.some((p) => p.company === form.client.name.trim()) && (
                  <button onClick={saveCurrentAsPartner}
                    style={{ fontSize: 11, color: C.accent, background: `${C.accent}12`, border: `1px solid ${C.accent}30`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                    onMouseEnter={(e) => e.currentTarget.style.background = `${C.accent}22`}
                    onMouseLeave={(e) => e.currentTarget.style.background = `${C.accent}12`}>
                    💾 儲存為外包夥伴
                  </button>
                )}
                {sourceKey.startsWith("partner:") && (
                  <button onClick={() => { const pid = Number(sourceKey.split(":")[1]); removePartner(pid); }}
                    style={{ fontSize: 11, color: C.rose, background: `${C.rose}12`, border: `1px solid ${C.rose}30`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                    onMouseEnter={(e) => e.currentTarget.style.background = `${C.rose}22`}
                    onMouseLeave={(e) => e.currentTarget.style.background = `${C.rose}12`}>
                    🗑 刪除此夥伴
                  </button>
                )}
                <button onClick={() => csvInputRef.current?.click()}
                  style={{ fontSize: 11, color: "#8B5CF6", background: "rgba(139,92,246,0.07)", border: "1px solid rgba(139,92,246,0.19)", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                  onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,92,246,0.14)"}
                  onMouseLeave={(e) => e.currentTarget.style.background = "rgba(139,92,246,0.07)"}>
                  📁 CSV 匯入夥伴
                </button>
                <button onClick={() => downloadSampleCSV("partner")}
                  style={{ fontSize: 11, color: C.inkMuted, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", transition: T }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = C.borderHover}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = C.border}>
                  📥 下載範例 CSV
                </button>
                {csvResult && (
                  <span style={{ fontSize: 11, color: csvResult.ok ? C.mint : C.rose, fontWeight: 600 }}>
                    {csvResult.ok ? "✅" : "⚠️"} {csvResult.msg}
                  </span>
                )}
              </div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px" }}>
            <Field label="報價單編號"><input style={inputStyle} value={form.number} onChange={(e) => setF("number", e.target.value)} /></Field>
            <Field label="有效期限"><input style={inputStyle} type="date" value={form.validUntil} onChange={(e) => setF("validUntil", e.target.value)} /></Field>
          </div>
          <Field label={<span>提案標題 <span style={{ color: C.rose, fontSize: 12 }}>*</span></span>}>
            <AutoSuggest
              value={form.title}
              onChange={(v) => setF("title", v)}
              onSelect={(item) => setF("title", typeof item === "string" ? item : item)}
              suggestions={TITLE_SUGGESTIONS}
              placeholder={form.quoteType === "outsource" ? "輸入或選擇：UI 設計外包委託..." : "輸入或選擇：產品規格定義服務..."}
              style={errors.title ? { border: `1.5px solid ${C.rose}` } : undefined}
            />
            {errors.title && <div style={{ fontSize: 11, color: C.rose, marginTop: 4 }}>{errors.title}</div>}
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px" }}>
            <Field label={<span>{form.quoteType === "outsource" ? "外包公司 / 個人名稱" : "客戶公司"} <span style={{ color: C.rose, fontSize: 12 }}>*</span></span>}>
              <input style={{ ...inputStyle, ...(errors["client.name"] ? { border: `1.5px solid ${C.rose}` } : {}) }} value={form.client.name} onChange={(e) => setClient("name", e.target.value)} placeholder={form.quoteType === "outsource" ? "輸入外包公司或個人名稱" : "輸入客戶公司名稱"} />
              {errors["client.name"] && <div style={{ fontSize: 11, color: C.rose, marginTop: 4 }}>{errors["client.name"]}</div>}
            </Field>
            <Field label={<span>聯繫人 <span style={{ color: C.rose, fontSize: 12 }}>*</span></span>}>
              <input style={{ ...inputStyle, ...(errors["client.contact"] ? { border: `1.5px solid ${C.rose}` } : {}) }} value={form.client.contact} onChange={(e) => setClient("contact", e.target.value)} placeholder="聯繫窗口姓名" />
              {errors["client.contact"] && <div style={{ fontSize: 11, color: C.rose, marginTop: 4 }}>{errors["client.contact"]}</div>}
            </Field>
          </div>
          <Field label="Email"><input style={inputStyle} type="email" value={form.client.email} onChange={(e) => setClient("email", e.target.value)} placeholder="email@example.com" /></Field>

          {/* Line items */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, marginTop: 8 }}>

                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: mobile ? "wrap" : "nowrap" }}>

                    <select style={{ ...selectStyle, fontSize: 12, width: 70, flexShrink: 0 }} value={newCustom.unit} onChange={(e) => setNewCustom((p) => ({ ...p, unit: e.target.value }))}>

                    </select>
                    <input type="number" step="1000" style={{ ...inputStyle, width: 90, fontSize: 12, textAlign: "right", flexShrink: 0 }} value={newCustom.unitPrice} onChange={(e) => setNewCustom((p) => ({ ...p, unitPrice: Number(e.target.value) }))} placeholder="單價" />
                    <button onClick={addServiceTemplate}
                      style={{ background: C.accent, border: "none", color: "#fff", fontSize: 11, fontWeight: 700, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0 }}>
                      儲存
                    </button>
                    <button onClick={() => { setShowAddCustom(false); setNewCustom({ desc: "", unit: "式", unitPrice: 0 }); }}

                      取消
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Column headers — desktop only */}
          {!mobile && form.items.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "5fr 60px 90px 100px 90px 28px", gap: 8, marginBottom: 6, paddingLeft: 2 }}>
              {["項目說明", "數量", "單位", "單價", "小計", ""].map((h, i) => (
                <div key={i} style={{ fontSize: 11, color: C.inkMuted, fontWeight: 500, textAlign: i >= 3 ? "right" : "left" }}>{h}</div>
              ))}
            </div>
          )}
          {form.items.map((item, idx) => mobile ? (
            <div key={idx} style={{ background: C.surface, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${idx === flashIdx ? C.emerald : C.border}`, transition: "border-color .6s, box-shadow .6s", boxShadow: idx === flashIdx ? `0 0 12px ${C.emerald}30` : "none" }}>
              <div style={{ marginBottom: 8 }}>
                <AutoSuggest
                  value={item.desc}
                  onChange={(v) => setItem(idx, "desc", v)}
                  onSelect={(tpl) => { if (tpl.desc) { setItem(idx, "desc", tpl.desc); setItem(idx, "unit", tpl.unit); setItem(idx, "unitPrice", tpl.unitPrice); } else { setItem(idx, "desc", tpl.label || tpl); } }}
                  suggestions={serviceSuggestions}
                  placeholder="輸入或選擇服務項目..."
                  style={{ fontSize: 13 }}
                  renderItem={(item) => (<div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center" }}><span style={{ whiteSpace: "nowrap" }}>{item.label}</span><span style={{ color: C.gold, fontSize: 11, whiteSpace: "nowrap", flexShrink: 0 }}>{fmt(item.unitPrice)}/{item.unit}</span></div>)}
                />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div><div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4 }}>數量</div><input style={{ ...inputStyle, fontSize: 13, textAlign: "center" }} type="number" min="1" value={item.qty} onChange={(e) => setItem(idx, "qty", Number(e.target.value))} /></div>
                <div><div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4 }}>單位</div>
                  <select style={{ ...selectStyle, fontSize: 13 }} value={item.unit} onChange={(e) => setItem(idx, "unit", e.target.value)}>

              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.gold }}>小計 NT$ {(item.qty * item.unitPrice).toLocaleString()}</span>
                {form.items.length > 1 && <Btn variant="ghost" size="sm" onClick={() => removeItem(idx)} style={{ color: C.rose, padding: "4px 8px" }}>移除</Btn>}
              </div>
            </div>
          ) : (
            <div key={idx} style={{ display: "grid", gridTemplateColumns: "5fr 60px 90px 100px 90px 28px", gap: 8, marginBottom: 8, alignItems: "center", borderRadius: 8, padding: idx === flashIdx ? "4px" : 0, border: idx === flashIdx ? `1px solid ${C.emerald}60` : "1px solid transparent", transition: "border-color .6s, box-shadow .6s", boxShadow: idx === flashIdx ? `0 0 12px ${C.emerald}25` : "none" }}>
              <AutoSuggest
                value={item.desc}
                onChange={(v) => setItem(idx, "desc", v)}
                onSelect={(tpl) => { if (tpl.desc) { setItem(idx, "desc", tpl.desc); setItem(idx, "unit", tpl.unit); setItem(idx, "unitPrice", tpl.unitPrice); } else { setItem(idx, "desc", tpl.label || tpl); } }}
                suggestions={serviceSuggestions}
                placeholder="輸入或選擇服務項目..."
                style={{ fontSize: 13 }}
                renderItem={(item) => (<div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center" }}><span style={{ whiteSpace: "nowrap" }}>{item.label}</span><span style={{ color: C.gold, fontSize: 11, whiteSpace: "nowrap", flexShrink: 0 }}>{fmt(item.unitPrice)}/{item.unit}</span></div>)}
              />
              <input style={{ ...inputStyle, fontSize: 13, textAlign: "center" }} type="number" min="1" value={item.qty} onChange={(e) => setItem(idx, "qty", Number(e.target.value))} />
              <select style={{ ...selectStyle, fontSize: 13 }} value={item.unit} onChange={(e) => setItem(idx, "unit", e.target.value)}>
                {UNIT_OPTIONS.map((u) => <option key={u} value={u}>{u}</option>)}
              </select>
              <input style={{ ...inputStyle, fontSize: 13, textAlign: "right" }} type="number" step="1000" value={item.unitPrice} onChange={(e) => setItem(idx, "unitPrice", Number(e.target.value))} />
              <div style={{ fontSize: 13, fontWeight: 600, color: C.gold, textAlign: "right" }}>{fmt(item.qty * item.unitPrice)}</div>
              {form.items.length > 1 ? <button onClick={() => removeItem(idx)} style={{ background: "none", border: "none", color: C.rose, cursor: "pointer", fontSize: 16, padding: 0, width: 28, textAlign: "center" }}>×</button> : <div style={{ width: 28 }} />}
            </div>
          ))}
          <Btn variant="secondary" size="sm" onClick={() => addItem()} style={{ marginBottom: 16 }}>+ 新增空白項目</Btn>

          {/* Tax / Discount / Total */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 14px" }}>
            <Field label="稅率">
              <select style={selectStyle} value={form.taxType || "added"} onChange={(e) => setF("taxType", e.target.value)}>
                {TAX_OPTIONS.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </Field>
            <Field label="折扣 (NT$)"><input style={inputStyle} type="number" step="1000" value={form.discount} onChange={(e) => setF("discount", Number(e.target.value))} /></Field>
            <Field label="總計">
              <div style={{ padding: "10px 14px", borderRadius: 10, background: C.surface }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.gold }}>{fmt(totals.total)}</div>
                {totals.taxType === "included" && <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 2 }}>含稅額 {fmt(totals.taxAmount)}</div>}
                {totals.taxType === "added" && totals.taxAmount > 0 && <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 2 }}>含外加稅 {fmt(totals.taxAmount)}</div>}
              </div>
            </Field>
          </div>

          {/* Payment schedule — installments */}
          <Field label="💰 付款條件">
            <PaymentSchedule
              total={totals.total}
              schedule={form.paymentSchedule}
              onChange={(schedule) => {
                setF("paymentSchedule", schedule);
                // Auto-generate terms string for backward compat + print preview
                const termsStr = schedule.map((p) => `${p.label} ${p.pct || ""}%`).join(" / ");
                setF("terms", termsStr);
              }}
            />
          </Field>

          <Field label="備註">
            <textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={form.notes} onChange={(e) => setF("notes", e.target.value)} placeholder="其他備註..." />
            {/* Notes template picker */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
              {noteTemplates.map((nt, i) => (
                <div key={i} style={{ display: "inline-flex", alignItems: "center", gap: 4, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 8px", fontSize: 11, color: C.inkSoft, cursor: "pointer", transition: T, maxWidth: 260, overflow: "hidden" }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = C.accent}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = C.border}>
                  <span onClick={() => setF("notes", form.notes ? form.notes + "\n" + nt : nt)} style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={nt}>{nt}</span>
                  <button onClick={(e) => { e.stopPropagation(); onNoteTemplatesChange(noteTemplates.filter((_, j) => j !== i)); }}
                    style={{ background: "none", border: "none", color: C.rose, cursor: "pointer", fontSize: 12, padding: "0 1px", flexShrink: 0, opacity: 0.5, transition: T }}
                    onMouseEnter={(e) => e.currentTarget.style.opacity = 1}
                    onMouseLeave={(e) => e.currentTarget.style.opacity = 0.5}
                    title="刪除此範本">×</button>
                </div>
              ))}
              <button onClick={() => {
                const note = form.notes.trim();
                if (note && !noteTemplates.includes(note)) onNoteTemplatesChange([...noteTemplates, note]);
              }}
                style={{ display: "inline-flex", alignItems: "center", gap: 4, background: "transparent", border: `1px dashed ${C.accent}50`, borderRadius: 6, padding: "3px 10px", fontSize: 11, color: C.accent, cursor: "pointer", fontFamily: "inherit", transition: T }}
                onMouseEnter={(e) => e.currentTarget.style.background = `${C.accent}10`}
                onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                title="將目前備註儲存為範本">＋ 存為範本</button>

          {Object.keys(errors).length > 0 && (
            <div style={{ background: `${C.rose}10`, border: `1px solid ${C.rose}30`, borderRadius: 10, padding: "10px 14px", marginTop: 8, display: "flex", alignItems: "flex-start", gap: 8 }}>
              <span style={{ fontSize: 16, lineHeight: 1, flexShrink: 0 }}>⚠️</span>
              <div style={{ fontSize: 12, color: C.rose, lineHeight: 1.6 }}>
                <span style={{ fontWeight: 600 }}>請完成以下必填欄位：</span>
                {Object.values(errors).map((msg, i) => <span key={i}>{i > 0 ? "、" : ""}{msg}</span>)}
              </div>
            </div>
          )}
          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn variant="ghost" onClick={onCancel}>取消</Btn>
            <Btn color={C.emerald} onClick={() => { if (validateForm()) onSave(form); }}>儲存報價單</Btn>
          </div>
        </div>
      );
    };

    // Proposal list view
    const ProposalsView = ({ proposals, deals, onAdd, onEdit, onPreview, onDelete, onStatusChange, search = "", filter = "all" }) => {
      const { mobile } = useWindowSize();
      const active = proposals;

      const now = new Date();
      const thisMonthProposals = active.filter(p => {
        if (!p.created) return false;
        const d = new Date(p.created);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      });
      const thisMonthValue = thisMonthProposals.reduce((s, p) => {
        const to = TAX_OPTIONS.find(t => t.id === p.taxType) || (p.tax === 0 ? TAX_OPTIONS[0] : TAX_OPTIONS[2]);
        return s + calcProposalTotals(p.items, to.rate, p.discount, to.mode).total;
      }, 0);

      const sentOrViewed = active.filter(p => ["sent", "viewed", "accepted"].includes(p.status)).length;
      const acceptedCount = active.filter(p => p.status === "accepted").length;
      const closeRate = sentOrViewed > 0 ? Math.round((acceptedCount / sentOrViewed) * 100) : 0;

      const acceptedValue = active.filter(p => p.status === "accepted").reduce((s, p) => {
        const to = TAX_OPTIONS.find(t => t.id === p.taxType) || (p.tax === 0 ? TAX_OPTIONS[0] : TAX_OPTIONS[2]);
        return s + calcProposalTotals(p.items, to.rate, p.discount, to.mode).total;
      }, 0);

      const pending = active.filter((p) => ["sent", "viewed"].includes(p.status)).length;

      // Search & filter
      const q = search.toLowerCase().trim();
      const filtered = active.filter(p => {
        if (filter !== "all" && p.status !== filter) return false;
        if (q) {
          const hay = `${p.title || ""} ${p.number || ""} ${p.client?.name || ""} ${p.client?.contact || ""}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      const stagger = useStagger(filtered.length);

      return (
        <div>
          {/* Summary stats */}
          <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
            {[
              { label: "本月報價", value: fmt(thisMonthValue), color: C.gold },
              { label: "簽回率", value: `${closeRate}%`, color: C.emerald },
              { label: "等待回覆", value: pending, color: C.cyan },
              { label: "待收金額", value: fmt(acceptedValue), color: C.orange },
            ].map((s, i) => (
              <div key={i} className="castle-stat-card" style={{ background: C.card, borderRadius: 12, padding: mobile ? 14 : 18, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 11, color: C.inkMuted, fontWeight: 600, letterSpacing: ".06em", marginBottom: 6 }}>{s.label}</div>
                <div style={{ fontSize: mobile ? 18 : 22, fontWeight: 800, color: s.color }}>{s.value}</div>
              </div>
            ))}
          </div>
          {/* List */}
          {active.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60, color: C.inkMuted }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>📋</div>
              <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>還沒有報價單</div>
              <div style={{ fontSize: 14, marginBottom: 20 }}>從業務漏斗的案件一鍵生成，或直接新增</div>
              <Btn color={C.gold} onClick={onAdd}>建立第一張報價單</Btn>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: C.inkMuted, fontSize: 14 }}>找不到符合條件的報價單</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.map((p, idx) => {
                const _to = TAX_OPTIONS.find((t) => t.id === p.taxType) || (p.tax === 0 ? TAX_OPTIONS[0] : TAX_OPTIONS[2]);
                const totals = calcProposalTotals(p.items, _to.rate, p.discount, _to.mode);
                const st = PROPOSAL_STATUS.find((s) => s.id === p.status);
                const deal = deals.find((d) => d.id === p.dealId);
                const creator = p._lastEditedBy ? (p._lastEditedBy.name || p._lastEditedBy.email?.split("@")[0]) : null;
                return (
                  <div key={p.id} style={stagger(idx)}>
                    <HoverCard onClick={() => onPreview(p)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                            <span style={{ fontSize: 13, fontFamily: "monospace", color: C.inkMuted }}>{p.number}</span>
                            <Badge color={st?.color} bg={`${st?.color}18`} small>{st?.icon} {st?.label}</Badge>
                          </div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginBottom: 4 }}>{p.title || "未命名提案"}</div>
                          <div style={{ fontSize: 13, color: C.inkSoft }}>{p.client.name} · {p.client.contact}</div>
                          {deal && <div style={{ fontSize: 12, color: C.inkMuted, marginTop: 4 }}>📎 {deal.name}</div>}
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 18, fontWeight: 800, color: C.gold }}>{fmt(totals.total)}</div>
                          <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 4 }}>{p.created}</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8, marginTop: 12, justifyContent: "space-between", alignItems: "center" }} onClick={(e) => e.stopPropagation()}>
                        {creator ? <span style={{ fontSize: 11, color: C.inkMuted }}>✎ {creator}</span> : <span />}
                        <div style={{ display: "flex", gap: 8 }}>
                          <Btn variant="ghost" size="sm" onClick={() => onPreview(p)}>預覽</Btn>
                          <Btn variant="secondary" size="sm" onClick={() => onEdit(p)}>編輯</Btn>
                          {p.status === "draft" && <Btn size="sm" color={C.accent} onClick={() => onStatusChange(p.id, "sent")}>寄送</Btn>}
                          {p.status === "sent" && <Btn size="sm" color={C.rose} onClick={() => onStatusChange(p.id, "declined")}>未成案</Btn>}
                          {p.status === "sent" && <Btn size="sm" color={C.emerald} onClick={() => onStatusChange(p.id, "accepted")}>已簽回</Btn>}
                        </div>
                      </div>
                    </HoverCard>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════
    // 🧾 Invoice & Payment Tracking (P0)
    // ══════════════════════════════════════════════

    const calcInvoiceTotals = (items, tax = 0.05, discount = 0, taxType = "added") => calcProposalTotals(items, tax, discount, taxType);

    const InvoiceForm = ({ invoice, deals, proposals, onSave, onCancel }) => {
      const { mobile } = useWindowSize();
      const [form, setForm] = useState(invoice || {
        dealId: null, proposalId: null, number: `INV-${new Date().getFullYear()}-${String(Date.now()).slice(-3)}`,
        client: { name: "", contact: "", email: "" },
        title: "", items: [{ desc: "", qty: 1, unit: "式", unitPrice: 0 }],
        tax: 0.05, discount: 0, notes: "",
        status: "draft", issuedDate: today(), dueDate: "", paidDate: null, paymentMethod: "",
      });

      const setF = (k, v) => setForm((p) => ({ ...p, [k]: v }));
      const setClient = (k, v) => setForm((p) => ({ ...p, client: { ...p.client, [k]: v } }));
      const setItem = (idx, k, v) => setForm((p) => ({ ...p, items: p.items.map((it, i) => i === idx ? { ...it, [k]: v } : it) }));
      const addItem = () => setForm((p) => ({ ...p, items: [...p.items, { desc: "", qty: 1, unit: "式", unitPrice: 0 }] }));

      const fillFromProposal = (propId) => {
        const prop = proposals.find((p) => p.id === Number(propId));
        if (prop) {
          setF("proposalId", prop.id);
          setF("dealId", prop.dealId);
          setF("title", prop.title);
          setF("items", [...prop.items]);
          setF("tax", prop.tax);
          setF("discount", prop.discount);
          setClient("name", prop.client.name);
          setClient("contact", prop.client.contact);
          setClient("email", prop.client.email);

      return (

            <Field label="發票編號"><input style={inputStyle} value={form.number} onChange={(e) => setF("number", e.target.value)} /></Field>

            <Field label="折扣 (NT$)"><input style={inputStyle} type="number" step="1000" value={form.discount} onChange={(e) => setF("discount", Number(e.target.value))} /></Field>
            <Field label="總計"><div style={{ padding: "10px 14px", borderRadius: 10, background: C.surface, fontSize: 16, fontWeight: 800, color: C.gold }}>{fmt(totals.total)}</div></Field>
          </div>

          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn variant="ghost" onClick={onCancel}>取消</Btn>
            <Btn color={C.emerald} onClick={() => { if (form.title && form.client.name) onSave(form); }}>儲存發票</Btn>
          </div>

      );
    };

    const InvoicesView = ({ invoices, deals, proposals, onAdd, onEdit, onStatusChange, onDelete, search = "", filter = "all" }) => {
      const { mobile } = useWindowSize();

      const now = new Date();
      const thisMonthPaid = invoices.filter(i => {
        if (i.status !== "paid") return false;
        const pd = i.paidDate ? new Date(i.paidDate) : (i.issuedDate ? new Date(i.issuedDate) : null);
        if (!pd) return false;
        return pd.getFullYear() === now.getFullYear() && pd.getMonth() === now.getMonth();
      }).reduce((s, i) => s + calcInvoiceTotals(i.items, i.tax, i.discount).total, 0);

      const totalRevenue = invoices.filter((i) => i.status === "paid").reduce((s, i) => s + calcInvoiceTotals(i.items, i.tax, i.discount).total, 0);
      const totalPending = invoices.filter((i) => i.status === "sent").reduce((s, i) => s + calcInvoiceTotals(i.items, i.tax, i.discount).total, 0);
      const overdueInvoices = invoices.filter((i) => i.status === "sent" && i.dueDate && i.dueDate < today());
      const overdueCount = overdueInvoices.length;
      const overdueAmount = overdueInvoices.reduce((s, i) => s + calcInvoiceTotals(i.items, i.tax, i.discount).total, 0);

      // Search & filter
      const q = search.toLowerCase().trim();
      const filtered = invoices.filter(inv => {
        if (filter !== "all" && inv.status !== filter) return false;
        if (q) {
          const hay = `${inv.title || ""} ${inv.number || ""} ${inv.invoiceNumber || ""} ${inv.client?.name || ""}`.toLowerCase();
          if (!hay.includes(q)) return false;

        return true;

        <div>

              { label: "待收款", value: fmt(totalPending), color: C.gold },
              { label: "逾期件數", value: overdueCount, color: C.rose, sub: overdueCount > 0 ? `${fmt(overdueAmount)}` : "" },
              { label: "逾期金額", value: fmt(overdueAmount), color: overdueAmount > 0 ? C.rose : C.inkMuted },

                <div style={{ fontSize: mobile ? 18 : 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                {s.sub && <div style={{ fontSize: 10, color: C.inkMuted, marginTop: 4 }}>{s.sub}</div>}
              </div>
            ))}

          {invoices.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60, color: C.inkMuted }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>🧾</div>
              <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>還沒有發票</div>
              <div style={{ fontSize: 14, marginBottom: 20 }}>從已簽回的報價單一鍵轉為發票，或手動新增</div>
              <Btn color={C.gold} onClick={onAdd}>建立第一張發票</Btn>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: C.inkMuted, fontSize: 14 }}>找不到符合條件的發票</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.map((inv, idx) => {
                const totals = calcInvoiceTotals(inv.items, inv.tax, inv.discount);
                const st = INVOICE_STATUS.find((s) => s.id === inv.status);
                const isOverdue = inv.status === "sent" && inv.dueDate && inv.dueDate < today();
                const creator = inv._lastEditedBy ? (inv._lastEditedBy.name || inv._lastEditedBy.email?.split("@")[0]) : null;
                return (
                  <div key={inv.id} style={stagger(idx)}>
                    <HoverCard onClick={() => onEdit(inv)} accentColor={isOverdue ? C.rose : st?.color}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                            <span style={{ fontSize: 13, fontFamily: "monospace", color: C.inkMuted }}>{inv.number}</span>
                            <Badge color={isOverdue ? C.rose : st?.color} bg={`${(isOverdue ? C.rose : st?.color)}18`} small>{isOverdue ? "⚠️ 逾期" : `${st?.icon} ${st?.label}`}</Badge>
                          </div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{inv.title || "未命名發票"}</div>
                          <div style={{ fontSize: 13, color: C.inkSoft }}>{inv.client.name}</div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 18, fontWeight: 800, color: inv.status === "paid" ? C.emerald : C.gold }}>{fmt(totals.total)}</div>
                          <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 4 }}>{inv.dueDate ? `到期 ${inv.dueDate}` : inv.issuedDate}</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8, marginTop: 12, justifyContent: "space-between", alignItems: "center" }} onClick={(e) => e.stopPropagation()}>
                        {creator ? <span style={{ fontSize: 11, color: C.inkMuted }}>✎ {creator}</span> : <span />}
                        <div style={{ display: "flex", gap: 8 }}>
                          <Btn variant="secondary" size="sm" onClick={() => onEdit(inv)}>編輯</Btn>
                          {inv.status === "draft" && <Btn size="sm" color={C.accent} onClick={() => onStatusChange(inv.id, "sent")}>開立</Btn>}
                          {(inv.status === "sent" || isOverdue) && <Btn size="sm" color={C.inkMuted} onClick={() => onStatusChange(inv.id, "cancelled")}>作廢</Btn>}
                          {(inv.status === "sent" || isOverdue) && <Btn size="sm" color={C.emerald} onClick={() => onStatusChange(inv.id, "paid")}>已收款</Btn>}
                        </div>
                      </div>
                    </HoverCard>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════
    // 👤 Contacts / 客戶檔案 (v2.7)
    // ══════════════════════════════════════════════

    const CONTACT_TAGS = [
      { id: "client", label: "客戶", color: C.emerald, icon: "🤝" },
      { id: "vendor", label: "廠商", color: C.accent, icon: "🏢" },
      { id: "partner", label: "合作夥伴", color: C.violet, icon: "🤲" },
      { id: "prospect", label: "潛在客戶", color: C.gold, icon: "🎯" },
    ];

    // Auto-aggregate contacts from deals, proposals, invoices, leads, partners
    const useAggregatedContacts = (deals, proposals, invoices, leads, partners, manualContacts, arCases) => {
      return useMemo(() => {
        const map = new Map();
        const norm = (s) => (s || "").trim().toLowerCase();
        const merge = (key, source) => {
          if (!key) return;
          const existing = map.get(key) || { company: "", contact: "", email: "", phone: "", address: "", tags: [], notes: "", deals: [], proposals: [], invoices: [], leads: [], arCaseIds: [], sources: [], manualId: null };
          if (source.company && source.company.length > (existing.company || "").length) existing.company = source.company;
          if (source.contact && !existing.contact) existing.contact = source.contact;
          if (source.email && !existing.email) existing.email = source.email;
          if (source.phone && !existing.phone) existing.phone = source.phone;
          if (source.address && !existing.address) existing.address = source.address;
          if (source.dealId && !existing.deals.includes(source.dealId)) existing.deals.push(source.dealId);
          if (source.proposalId && !existing.proposals.includes(source.proposalId)) existing.proposals.push(source.proposalId);
          if (source.invoiceId && !existing.invoices.includes(source.invoiceId)) existing.invoices.push(source.invoiceId);
          if (source.leadId && !existing.leads.includes(source.leadId)) existing.leads.push(source.leadId);
          if (source.src && !existing.sources.includes(source.src)) existing.sources.push(source.src);
          map.set(key, existing);
        };
        deals.filter(d => !d.archived).forEach(d => {
          const key = norm(d.company) || norm(d.email);
          if (key) merge(key, { company: d.company, contact: d.contact, email: d.email, dealId: d.id, src: "deal" });
        });
        proposals.forEach(p => {
          const key = norm(p.client?.name) || norm(p.client?.email);
          if (key) merge(key, { company: p.client.name, contact: p.client.contact, email: p.client.email, address: p.client.address, proposalId: p.id, src: "proposal" });
        });
        invoices.forEach(inv => {
          const key = norm(inv.client?.name) || norm(inv.client?.email);
          if (key) merge(key, { company: inv.client.name, contact: inv.client.contact, email: inv.client.email, invoiceId: inv.id, src: "invoice" });
        });
        leads.filter(l => !l.archived).forEach(l => {
          const key = norm(l.company) || norm(l.email);
          if (key) merge(key, { company: l.company, contact: l.name, email: l.email || "", leadId: l.id, src: "lead" });
        });
        (partners || []).forEach(pt => {
          const key = norm(pt.company) || norm(pt.email);
          if (key) merge(key, { company: pt.company, contact: pt.contact, email: pt.email, src: "partner" });
        });
        (manualContacts || []).forEach(mc => {
          const key = norm(mc.company) || norm(mc.email);
          if (key && map.has(key)) {
            const e = map.get(key);
            if (mc.phone) e.phone = mc.phone;
            if (mc.address) e.address = mc.address;
            if (mc.notes) e.notes = mc.notes;
            if (mc.tags?.length) e.tags = [...new Set([...e.tags, ...mc.tags])];
            e.manualId = mc.id;
            map.set(key, e);
          } else if (key) {
            map.set(key, { ...mc, deals: [], proposals: [], invoices: [], leads: [], arCaseIds: [], sources: ["manual"], manualId: mc.id });
          }
        });
        // AR Cases — link to contact by clientName / contactEmail match
        (arCases || []).forEach(arc => {
          const key = norm(arc.clientName) || norm(arc.contactEmail);
          if (!key) return;
          if (map.has(key)) {
            const e = map.get(key);
            if (!e.arCaseIds) e.arCaseIds = [];
            if (!e.arCaseIds.includes(arc.id)) e.arCaseIds.push(arc.id);
            if (!e.email && arc.contactEmail) e.email = arc.contactEmail;
            if (!e.contact && arc.contactName) e.contact = arc.contactName;
            if (!e.phone && arc.contactPhone) e.phone = arc.contactPhone;
            map.set(key, e);
          } else {
            map.set(key, {
              company: arc.clientName || "", contact: arc.contactName || "", email: arc.contactEmail || "",
              phone: arc.contactPhone || "", address: "", tags: [], notes: "",
              deals: [], proposals: [], invoices: [], leads: [], arCaseIds: [arc.id],
              sources: ["ar"], manualId: null,
            });
          }
        });
        // Build final array with AR health score
        const AR_RISK_ORDER = { legal: 4, overdue_t3: 3, overdue_t2: 2, overdue_t1: 1, upcoming: 0, resolved: -1 };
        let idx = 0;
        return Array.from(map.entries()).map(([key, c]) => {
          const linkedAr = (arCases || []).filter(a => (c.arCaseIds || []).includes(a.id));
          const activeAr = linkedAr.filter(a => a.status !== "resolved");
          const worstStatus = activeAr.reduce((w, a) => (AR_RISK_ORDER[a.status] || 0) > (AR_RISK_ORDER[w] || 0) ? a.status : w, null);
          // Client health: "vip" > "good" > "watch" > "risk" > "critical"
          const paidInvoices = (invoices || []).filter(inv => {
            const iKey = norm(inv.client?.name) || norm(inv.client?.email);
            return iKey === key && inv.status === "paid";
          });
          let clientHealth;
          if (activeAr.length === 0 && linkedAr.length === 0) {
            clientHealth = paidInvoices.length >= 2 ? "vip" : "good";
          } else if (worstStatus === "overdue_t1" || worstStatus === "upcoming") {
            clientHealth = "watch";
          } else if (worstStatus === "overdue_t2") {
            clientHealth = "risk";
          } else if (worstStatus === "overdue_t3" || worstStatus === "legal") {
            clientHealth = "critical";
          } else {
            clientHealth = "good";
          }
          return {
            ...c, _key: key, id: c.manualId || `auto_${idx++}`,
            totalTransactions: c.deals.length + c.proposals.length + c.invoices.length,
            arCaseIds: c.arCaseIds || [],
            activeArCount: activeAr.length,
            activeArAmount: activeAr.reduce((s, a) => s + (a.amount || 0), 0),
            arWorstStatus: worstStatus,
            clientHealth,
          };
        }).sort((a, b) => b.totalTransactions - a.totalTransactions);
      }, [deals, proposals, invoices, leads, partners, manualContacts, arCases]);
    };

    // Contact Form (add / edit manual contact)
    const ContactForm = ({ contact, onSave, onCancel }) => {
      const [f, setF] = useState(contact || { company: "", contact: "", email: "", phone: "", address: "", tags: [], notes: "" });
      const set = (k, v) => setF(p => ({ ...p, [k]: v }));

      const canSave = f.company.trim() || f.email.trim();
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>公司名稱 *</span>
              <input value={f.company} onChange={e => set("company", e.target.value)} placeholder="公司 / 組織名稱" style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink }} />
            </label>
            <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>聯絡人</span>
              <input value={f.contact} onChange={e => set("contact", e.target.value)} placeholder="姓名" style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink }} />
            </label>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>Email</span>
              <input value={f.email} onChange={e => set("email", e.target.value)} placeholder="email@example.com" type="email" style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink }} />
            </label>
            <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>電話</span>
              <input value={f.phone} onChange={e => set("phone", e.target.value)} placeholder="02-xxxx-xxxx" style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink }} />
            </label>
          </div>
          <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>地址</span>
            <input value={f.address} onChange={e => set("address", e.target.value)} placeholder="公司地址" style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink }} />
          </label>
          <div>
            <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted, display: "block", marginBottom: 6 }}>標籤</span>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {CONTACT_TAGS.map(t => (
                <button key={t.id} onClick={() => toggleTag(t.id)} style={{ padding: "4px 12px", borderRadius: C.radius.pill, border: `1px solid ${f.tags.includes(t.id) ? t.color : C.border}`, background: f.tags.includes(t.id) ? `${t.color}18` : "transparent", color: f.tags.includes(t.id) ? t.color : C.inkMuted, fontSize: 13, cursor: "pointer", fontFamily: "inherit", transition: T }}>{t.icon} {t.label}</button>
              ))}
            </div>
          </div>
          <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: C.inkMuted }}>備註</span>
            <textarea value={f.notes} onChange={e => set("notes", e.target.value)} placeholder="備註..." rows={3} style={{ padding: "10px 12px", borderRadius: C.radius.md, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: "inherit", background: C.bg, color: C.ink, resize: "vertical" }} />
          </label>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <Btn variant="ghost" onClick={onCancel}>取消</Btn>
            <Btn color={C.emerald} onClick={() => canSave && onSave(f)} style={{ opacity: canSave ? 1 : 0.5 }}>儲存</Btn>
          </div>
        </div>
      );
    };

    // CSV Template download
    const downloadContactCSVTemplate = () => {
      const header = "公司名稱,聯絡人,Email,電話,地址,標籤(client/vendor/partner/prospect),備註";
      const example = "範例科技股份有限公司,王小明,wang@example.com,02-2345-6789,台北市信義區,client,重要客戶";
      const blob = new Blob(["\uFEFF" + header + "\n" + example + "\n"], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "contacts-template.csv"; a.click();
      URL.revokeObjectURL(url);
    };

    // CSV Import parser
    const parseContactCSV = (text) => {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      const results = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(",").map(c => c.trim().replace(/^"|"$/g, ""));
        if (!cols[0] && !cols[2]) continue;
        const tagStr = (cols[5] || "").toLowerCase();
        const tags = CONTACT_TAGS.map(t => t.id).filter(id => tagStr.includes(id));
        results.push({ company: cols[0] || "", contact: cols[1] || "", email: cols[2] || "", phone: cols[3] || "", address: cols[4] || "", tags, notes: cols[6] || "" });
      }
      return results;
    };

    // Client health config — used in card badges and list sort
    const CLIENT_HEALTH = {
      vip:      { label: "優質客戶", icon: "⭐", color: "#F5A623", bg: "rgba(245,166,35,.15)" },
      good:     { label: "付款正常", icon: "✅", color: "#34D399", bg: "rgba(52,211,153,.12)" },
      watch:    { label: "待追蹤",   icon: "👀", color: "#22D3EE", bg: "rgba(34,211,238,.12)" },
      risk:     { label: "逾期警示", icon: "⚠️",  color: "#FB923C", bg: "rgba(251,146,60,.15)" },
      critical: { label: "高風險",   icon: "🚨", color: "#F472B6", bg: "rgba(244,114,182,.18)" },
    };

    // Contacts View
    const ContactsView = ({ contacts, deals, proposals, invoices, leads, manualContacts, arCases, onAddManual, onEditManual, onDeleteManual, onImportCSV, search, filter }) => {
      const [expandedId, setExpandedId] = useState(null);
      const fileRef = useRef(null);

      const filtered = contacts.filter(c => {
        if (search) {
          const q = search.toLowerCase();
          if (!(c.company || "").toLowerCase().includes(q) && !(c.contact || "").toLowerCase().includes(q) && !(c.email || "").toLowerCase().includes(q)) return false;
        }
        if (filter && filter !== "all") {
          // 健康度快速篩選
          if (filter === "health_vip")      return c.clientHealth === "vip";
          if (filter === "health_risk")     return c.clientHealth === "risk";
          if (filter === "health_critical") return c.clientHealth === "critical";
          if (filter === "has_ar")          return (c.activeArCount || 0) > 0;
          // 交易量篩選
          if (filter === "has_deals" && c.totalTransactions === 0) return false;
          if (filter === "no_deals" && c.totalTransactions > 0) return false;
          // 標籤篩選（非以上 id 才走這裡）
          if (!["has_deals", "no_deals"].includes(filter) && !c.tags?.includes(filter)) return false;
        }
        return true;
      });

      const expanded = expandedId ? contacts.find(c => c.id === expandedId) : null;

      // Build timeline for expanded contact
      const timeline = useMemo(() => {
        if (!expanded) return [];
        const items = [];
        expanded.deals.forEach(did => {
          const d = deals.find(x => x.id === did);
          if (d) items.push({ type: "deal", date: d.created, title: d.name, value: d.value, stage: d.stage, icon: "📊" });
        });
        expanded.proposals.forEach(pid => {
          const p = proposals.find(x => x.id === pid);
          if (p) {
            const total = (p.items || []).reduce((s, i) => s + (i.qty || 0) * (i.unitPrice || i.price || 0), 0);
            items.push({ type: "proposal", date: p.created, title: p.title, value: total, status: p.status, icon: "📄" });
          }
        });
        expanded.invoices.forEach(iid => {
          const inv = invoices.find(x => x.id === iid);
          if (inv) {
            const total = (inv.items || []).reduce((s, i) => s + (i.qty || 0) * (i.unitPrice || i.price || 0), 0);
            items.push({ type: "invoice", date: inv.issuedDate || inv.created, title: inv.title, value: total || inv.amount, status: inv.status, icon: "🧾" });
          }
        });
        expanded.leads.forEach(lid => {
          const l = leads.find(x => x.id === lid);
          if (l) items.push({ type: "lead", date: l.lastTouch, title: `BD: ${l.name}`, status: l.status, icon: "🎯" });
        });
        // AR Cases — show each active case and its latest history entry
        (expanded.arCaseIds || []).forEach(aid => {
          const arc = (arCases || []).find(x => x.id === aid);
          if (!arc) return;
          const arStatus = AR_STATUSES.find(s => s.id === arc.status);
          const latestAction = [...(arc.history || [])].reverse()[0];
          items.push({
            type: "ar", date: arc.dueDate, icon: arStatus?.icon || "💰",
            title: `催收：${arc.invoiceId || arc.clientName} — NT$ ${(arc.amount || 0).toLocaleString()}`,
            status: arc.status, arStatus,
            note: latestAction ? latestAction.action : "",
          });
        });
        return items.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
      }, [expanded, deals, proposals, invoices, leads, arCases]);

      const handleCSVUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const parsed = parseContactCSV(ev.target.result);
          if (parsed.length) onImportCSV(parsed);
        };
        reader.readAsText(file, "UTF-8");
        e.target.value = "";
      };

      const fmt = (v) => typeof v === "number" ? `$${v.toLocaleString()}` : "";

      return (
        <div>
          {/* Actions bar */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <Btn variant="ghost" size="sm" onClick={downloadContactCSVTemplate}>⬇ 下載 CSV 範本</Btn>
            <Btn variant="ghost" size="sm" onClick={() => fileRef.current?.click()}>📥 匯入 CSV</Btn>
            <input ref={fileRef} type="file" accept=".csv" onChange={handleCSVUpload} style={{ display: "none" }} />
          </div>

          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 48, color: C.inkMuted }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>👤</div>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>尚無客戶資料</div>
              <div style={{ fontSize: 13 }}>開始建立案件或報價後，客戶會自動出現在這裡</div>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 14 }}>
              {filtered.map(c => {
                const isExpanded = expandedId === c.id;
                return (
                  <div key={c.id} style={{ gridColumn: isExpanded ? "1 / -1" : undefined }}>
                    <HoverCard onClick={() => setExpandedId(isExpanded ? null : c.id)} style={{ cursor: "pointer", border: isExpanded ? `2px solid ${C.accent}30` : undefined }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                            <span style={{ fontSize: 16, fontWeight: 700, color: C.ink }}>{c.company || c.email || "未命名"}</span>
                            {/* 客戶健康度識別標籤 */}
                            {(() => {
                              const h = CLIENT_HEALTH[c.clientHealth || "good"];
                              return (
                                <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 10, color: h.color, background: h.bg, letterSpacing: 0.3, flexShrink: 0 }}>
                                  {h.icon} {h.label}
                                </span>
                              );
                            })()}
                            {c.tags?.map(tagId => {
                              const tag = CONTACT_TAGS.find(t => t.id === tagId);
                              return tag ? <Badge key={tagId} color={tag.color} bg={`${tag.color}18`} small>{tag.icon} {tag.label}</Badge> : null;
                            })}
                          </div>
                          {c.contact && <div style={{ fontSize: 13, color: C.inkSoft }}>👤 {c.contact}</div>}
                          {c.email && <div style={{ fontSize: 13, color: C.inkMuted }}>{c.email}</div>}
                          {c.phone && <div style={{ fontSize: 13, color: C.inkMuted }}>📞 {c.phone}</div>}
                          {/* 主動催收警示列 */}
                          {c.activeArCount > 0 && (
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, padding: "3px 8px", borderRadius: 6, background: "rgba(251,146,60,.12)", border: "1px solid rgba(251,146,60,.3)" }}>
                              <span style={{ fontSize: 12 }}>⚠️</span>
                              <span style={{ fontSize: 12, color: "#FB923C", fontWeight: 600 }}>
                                {c.activeArCount} 筆催收中 · NT$ {(c.activeArAmount || 0).toLocaleString()}
                              </span>
                            </div>
                          )}
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          {c.totalTransactions > 0 && <div style={{ fontSize: 13, color: C.accent, fontWeight: 700 }}>{c.totalTransactions} 筆交易</div>}
                          <div style={{ display: "flex", gap: 4, marginTop: 4, justifyContent: "flex-end" }}>
                            {c.sources.map(s => <span key={s} style={{ fontSize: 10, padding: "1px 6px", borderRadius: 6, background: `${C.accent}10`, color: C.inkMuted }}>{s}</span>)}
                          </div>
                        </div>
                      </div>

                      {/* Expanded: timeline + details */}
                      {isExpanded && (
                        <div style={{ marginTop: 16, borderTop: `1px solid ${C.border}`, paddingTop: 16 }} onClick={e => e.stopPropagation()}>
                          {c.address && <div style={{ fontSize: 13, color: C.inkMuted, marginBottom: 8 }}>📍 {c.address}</div>}
                          {c.notes && <div style={{ fontSize: 13, color: C.inkSoft, marginBottom: 12, fontStyle: "italic" }}>💬 {c.notes}</div>}

                          {timeline.length > 0 && (
                            <div>
                              <div style={{ fontSize: 13, fontWeight: 700, color: C.ink, marginBottom: 8 }}>📋 交易歷史</div>
                              {timeline.map((t, i) => {
                                const statusLabel = t.status ? (
                                  t.type === "proposal" ? PROPOSAL_STATUS.find(s => s.id === t.status)?.label :
                                    t.type === "invoice" ? INVOICE_STATUS.find(s => s.id === t.status)?.label : t.status
                                ) : null;
                                return (
                                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", borderBottom: i < timeline.length - 1 ? `1px solid ${C.border}30` : "none" }}>
                                    <span style={{ fontSize: 16, flexShrink: 0 }}>{t.icon}</span>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                      <div style={{ fontSize: 13, fontWeight: 600, color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</div>
                                      <div style={{ fontSize: 11, color: C.inkMuted }}>{t.date}{statusLabel ? ` · ${statusLabel}` : ""}</div>
                                    </div>
                                    {t.value ? <span style={{ fontSize: 13, fontWeight: 700, color: C.gold, flexShrink: 0 }}>{fmt(t.value)}</span> : null}
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          <div style={{ display: "flex", gap: 8, marginTop: 12, justifyContent: "flex-end" }}>
                            {c.manualId && <Btn variant="ghost" size="sm" color={C.rose} onClick={() => onDeleteManual(c.manualId)}>刪除</Btn>}
                            <Btn variant="secondary" size="sm" onClick={() => onEditManual(c)}>編輯</Btn>
                          </div>
                        </div>
                      )}
                    </HoverCard>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════
    // 📝 Meeting Notes (P1)
    // ══════════════════════════════════════════════

    const MeetingForm = ({ meeting, deals, onSave, onCancel }) => {
      const { mobile } = useWindowSize();
      const [form, setForm] = useState(meeting || {
        dealId: null, title: "", date: today(), time: "14:00", duration: 60,
        attendees: "", notes: "", followUps: [""], completed: false,
      });
      const setF = (k, v) => setForm((p) => ({ ...p, [k]: v }));
      const setFollowUp = (idx, v) => setForm((p) => ({ ...p, followUps: p.followUps.map((f, i) => i === idx ? v : f) }));
      const addFollowUp = () => setForm((p) => ({ ...p, followUps: [...p.followUps, ""] }));
      const removeFollowUp = (idx) => setForm((p) => ({ ...p, followUps: p.followUps.filter((_, i) => i !== idx) }));

      return (
        <div>
          <Field label="關聯案件">
            <select style={selectStyle} value={form.dealId || ""} onChange={(e) => setF("dealId", e.target.value ? Number(e.target.value) : null)}>
              <option value="">（不關聯）</option>
              {deals.filter((d) => !d.archived).map((d) => <option key={d.id} value={d.id}>{d.name} — {d.company}</option>)}
            </select>
          </Field>
          <Field label="會議標題"><input style={inputStyle} value={form.title} onChange={(e) => setF("title", e.target.value)} placeholder="e.g. FitTrack 探索會議" /></Field>
          <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr 1fr" : "1fr 1fr 1fr", gap: "0 14px" }}>
            <Field label="日期"><input style={inputStyle} type="date" value={form.date} onChange={(e) => setF("date", e.target.value)} /></Field>
            <Field label="時間"><input style={inputStyle} type="time" value={form.time} onChange={(e) => setF("time", e.target.value)} /></Field>
            <Field label="時長 (分鐘)"><input style={inputStyle} type="number" step="15" value={form.duration} onChange={(e) => setF("duration", Number(e.target.value))} /></Field>
          </div>
          <Field label="參會人員"><input style={inputStyle} value={form.attendees} onChange={(e) => setF("attendees", e.target.value)} placeholder="e.g. 陳小明 (FitLife), 愛德華" /></Field>
          <Field label="會議筆記"><textarea style={{ ...inputStyle, minHeight: 120, resize: "vertical" }} value={form.notes} onChange={(e) => setF("notes", e.target.value)} placeholder="會議重點、決議事項..." /></Field>

          <div style={{ fontSize: 13, fontWeight: 600, color: C.inkMuted, letterSpacing: ".04em", marginBottom: 10 }}>Follow-up 任務</div>
          {form.followUps.map((fu, idx) => (
            <div key={idx} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
              <input style={{ ...inputStyle, fontSize: 13, flex: 1 }} value={fu} onChange={(e) => setFollowUp(idx, e.target.value)} placeholder="待辦事項..." />
              {form.followUps.length > 1 && <button onClick={() => removeFollowUp(idx)} style={{ background: "none", border: "none", color: C.rose, cursor: "pointer", fontSize: 16 }}>×</button>}
            </div>
          ))}
          <Btn variant="secondary" size="sm" onClick={addFollowUp} style={{ marginBottom: 16 }}>+ 新增 Follow-up</Btn>

          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn variant="ghost" onClick={onCancel}>取消</Btn>
            <Btn color={C.emerald} onClick={() => { if (form.title) onSave(form); }}>儲存會議紀錄</Btn>
          </div>
        </div>
      );
    };

    const MeetingsView = ({ meetings, deals, onAdd, onEdit, onComplete, onCreateTasks, search = "" }) => {
      const { mobile } = useWindowSize();

      // Search filter
      const q = search.toLowerCase().trim();
      const matchedMeetings = q ? meetings.filter(m => {
        const hay = `${m.title || ""} ${m.attendees || ""} ${m.date || ""}`.toLowerCase();
        return hay.includes(q);
      }) : meetings;

      const upcoming = matchedMeetings.filter((m) => !m.completed && m.date >= today()).sort((a, b) => a.date.localeCompare(b.date));
      const past = matchedMeetings.filter((m) => m.completed || m.date < today()).sort((a, b) => b.date.localeCompare(a.date));
      const stagger = useStagger(upcoming.length);

      return (
        <div>
          {meetings.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60, color: C.inkMuted }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>📝</div>
              <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>還沒有會議紀錄</div>
              <div style={{ fontSize: 14, marginBottom: 20 }}>記錄每次會議的重點和 Follow-up 任務</div>
              <Btn color={C.accent} onClick={onAdd}>新增會議紀錄</Btn>
            </div>
          ) : matchedMeetings.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: C.inkMuted, fontSize: 14 }}>找不到符合條件的會議</div>
          ) : (
            <>
              {upcoming.length > 0 && (
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.emerald, letterSpacing: ".06em", marginBottom: 12 }}>UPCOMING</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {upcoming.map((m, idx) => {
                      const deal = deals.find((d) => d.id === m.dealId);
                      const creator = m._lastEditedBy ? (m._lastEditedBy.name || m._lastEditedBy.email?.split("@")[0]) : null;
                      return (
                        <div key={m.id} style={stagger(idx)}>
                          <HoverCard onClick={() => onEdit(m)} accentColor={C.accent}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{m.title}</div>
                                <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 4 }}>{m.date} {m.time} · {m.duration}分鐘</div>
                                <div style={{ fontSize: 12, color: C.inkMuted, marginTop: 2 }}>{m.attendees}</div>
                                {deal && <div style={{ fontSize: 12, color: C.inkMuted, marginTop: 4 }}>📎 {deal.name}</div>}
                              </div>
                              <div style={{ display: "flex", gap: 8, flexShrink: 0 }} onClick={(e) => e.stopPropagation()}>
                                <Btn size="sm" color={C.emerald} onClick={() => onComplete(m.id)}>完成</Btn>
                              </div>
                            </div>
                            {m.followUps.filter(Boolean).length > 0 && (
                              <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {m.followUps.filter(Boolean).map((fu, i) => <Badge key={i} color={C.accent} bg={C.accentSoft} small>{fu}</Badge>)}
                              </div>
                            )}
                            {creator && <div style={{ marginTop: 8, fontSize: 11, color: C.inkMuted }}>✎ {creator}</div>}
                          </HoverCard>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {past.length > 0 && (
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.inkMuted, letterSpacing: ".06em", marginBottom: 12 }}>PAST / COMPLETED</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {past.map((m) => {
                      const deal = deals.find((d) => d.id === m.dealId);
                      const creator = m._lastEditedBy ? (m._lastEditedBy.name || m._lastEditedBy.email?.split("@")[0]) : null;
                      return (
                        <HoverCard key={m.id} onClick={() => onEdit(m)} style={{ opacity: 0.7 }}>
                          <div style={{ display: "flex", justifyContent: "space-between" }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 14, fontWeight: 600, color: C.ink }}>{m.completed ? "✅ " : ""}{m.title}</div>
                              <div style={{ fontSize: 12, color: C.inkMuted }}>{m.date} · {m.attendees}</div>
                              <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 2 }}>
                                {deal && <span style={{ fontSize: 11, color: C.inkMuted }}>📎 {deal.name}</span>}
                                {creator && <span style={{ fontSize: 11, color: C.inkMuted }}>· ✎ {creator}</span>}
                              </div>
                            </div>
                          </div>
                        </HoverCard>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════
    // 🎮 Pixel Art — Howl's Moving Castle World
    // ══════════════════════════════════════════════

    // Pixel renderer: uses CSS box-shadow to draw pixel art (no images)
    const px = (size, grid) => {
      const shadows = [];
      grid.forEach((row, y) => {
        [...row].forEach((ch, x) => {
          const c = {
            "#": "#3a3a5c", "W": "#e8e8f0", "B": "#6C8EFF", "F": "#FB923C", "R": "#F472B6",
            "G": "#34D399", "Y": "#F5A623", "V": "#A78BFA", "D": "#1c1c28", "S": "#8888aa",
            "O": "#FB923C", "L": "#22D3EE", "C": "#cc5533",
            // Extended palette for characters (matched to bead art reference)

      }, [frames.length, interval]);
      const shadow = px(size, frames[frame]);
      const w = frames[0][0].length * size;
      const h = frames[0].length * size;
      return React.createElement("div", {
        style: { width: w, height: h, position: "relative", ...style },
