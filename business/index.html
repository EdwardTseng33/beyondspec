                      const speed = days <= 14 ? { label: "🚀 快速", color: C.emerald } : days <= 30 ? { label: "✅ 正常", color: C.accent } : { label: "🐢 偏慢", color: C.orange };
                      return (
                        <tr key={d.id}>
                          <td style={{ padding: "10px 14px", fontSize: 14, fontWeight: 600, color: C.ink, background: C.card, borderRadius: "8px 0 0 8px" }}>{d.name}</td>
                          <td style={{ padding: "10px 14px", fontSize: 13, color: C.inkSoft, background: C.card }}>{d.company}</td>
                          <td style={{ padding: "10px 14px", fontSize: 12, color: C.inkMuted, fontFamily: "monospace", background: C.card }}>{d.created}</td>
                          <td style={{ padding: "10px 14px", fontSize: 12, color: C.inkMuted, fontFamily: "monospace", background: C.card }}>{d.signedDate}</td>
                          <td style={{ padding: "10px 14px", fontSize: 14, fontWeight: 700, color: speed.color, fontFamily: "monospace", background: C.card }}>{days}</td>
                          <td style={{ padding: "10px 14px", fontSize: 13, color: C.gold, fontFamily: "monospace", background: C.card }}>{fmt(d.value)}</td>
                          <td style={{ padding: "10px 14px", background: C.card, borderRadius: "0 8px 8px 0" }}><Badge color={speed.color} bg={`${speed.color}15`} small>{speed.label}</Badge></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Stage Dwell Time — v2.2 compact 4-col */}
          {(() => {
            const stageIds = ["inquiry", "exploring", "proposal", "negotiation"];
            const dwellData = stageIds.map((sid) => {
              const stageMeta = STAGES.find((s) => s.id === sid);
              const durations = [];
              allDeals.forEach((d) => {
                const hist = d.stageHistory || [];
                for (let i = 0; i < hist.length; i++) {
                  if (hist[i].stage === sid) {
                    const enter = new Date(hist[i].at);
                    const exit = hist[i + 1] ? new Date(hist[i + 1].at) : (d.stage === sid ? new Date() : null);
                    if (exit) durations.push(Math.max(1, Math.round((exit - enter) / 86400000)));
                  }
                }
              });
              const avg = durations.length > 0 ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;
              const max = durations.length > 0 ? Math.max(...durations) : 0;
              return { id: sid, label: stageMeta?.label || sid, icon: stageMeta?.icon || "📍", color: stageMeta?.color || C.inkMuted, avg, max, count: durations.length };
            });
            const maxAvg = Math.max(...dwellData.map((d) => d.avg), 1);
            const hasData = dwellData.some((d) => d.count > 0);
            return (
              <div style={{ marginBottom: 20 }}>
                <h3 style={{ fontSize: 15, fontWeight: 800, color: C.ink, marginBottom: 12 }}>🔬 階段停留天數</h3>
                {!hasData ? (
                  <div style={{ padding: 20, textAlign: "center", color: C.inkMuted, fontSize: 13, background: C.surface, borderRadius: 10 }}>資料累積中，系統將自動建立</div>
                ) : (
                  <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4,1fr)", gap: 10 }}>
                    {dwellData.map((s, idx) => (
                      <HoverCard key={s.id} style={{ padding: mobile ? 14 : 16, animation: `analyticsIn .3s ease ${idx * 0.05}s both`, transition: "transform .15s ease", cursor: "default" }}
                        onMouseEnter={e => e.currentTarget.style.transform = "scale(1.03)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                          <span style={{ fontSize: 14 }}>{s.icon}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: s.color }}>{s.label}</span>
                          <span style={{ fontSize: 10, color: C.inkMuted, marginLeft: "auto" }}>{s.count}案</span>
                        </div>
                        <div style={{ fontSize: 22, fontWeight: 800, color: s.avg > 14 ? C.orange : s.avg > 7 ? C.gold : C.emerald, fontFamily: "monospace", marginBottom: 4 }}>
                          {s.avg}<span style={{ fontSize: 11, fontWeight: 500, marginLeft: 2, color: C.inkMuted }}>天</span>
                        </div>
                        <div style={{ height: 6, background: C.surface, borderRadius: 3, overflow: "hidden", marginBottom: 4 }}>
                          <div style={{ height: "100%", width: `${Math.round((s.avg / maxAvg) * 100)}%`, background: s.avg > 14 ? C.orange : s.avg > 7 ? C.gold : C.emerald, borderRadius: 3, transition: "width .6s ease" }} />
                        </div>
                        <div style={{ fontSize: 10, color: C.inkMuted }}>最長 {s.max} 天</div>
                        {s.avg > 14 && <div style={{ fontSize: 10, color: C.orange, marginTop: 4, fontWeight: 600 }}>⚠️ 瓶頸</div>}
                      </HoverCard>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Lost Reason — v2.2 compact */}
          {(() => {
            const lostDeals = allDeals.filter((d) => d.stage === "lost" && d.lostReason);
            if (lostDeals.length === 0) return null;
            const reasonCounts = {};
            lostDeals.forEach((d) => {
              const r = d.lostReason;
              if (!reasonCounts[r]) reasonCounts[r] = { count: 0, value: 0 };
              reasonCounts[r].count++;
              reasonCounts[r].value += d.value;
            });
            const sorted = Object.entries(reasonCounts).sort((a, b) => b[1].count - a[1].count);
            const maxCount = sorted.length > 0 ? sorted[0][1].count : 1;
            const totalLostValue = lostDeals.reduce((s, d) => s + d.value, 0);
            const topReason = LOST_REASONS.find((r) => r.id === sorted[0]?.[0]);
            return (
              <div style={{ marginBottom: 20 }}>
                <h3 style={{ fontSize: 15, fontWeight: 800, color: C.ink, marginBottom: 12 }}>💔 流失原因分析</h3>
                <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "2fr 1fr", gap: 12 }}>
                  <HoverCard style={{ padding: mobile ? 14 : 18, animation: "analyticsIn .3s ease both" }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {sorted.map(([rId, data]) => {
                        const rMeta = LOST_REASONS.find((r) => r.id === rId);
                        return (
                          <div key={rId}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                              <span style={{ fontSize: 12, color: C.inkSoft }}>{rMeta?.icon || "📝"} {rMeta?.label || rId}</span>
                              <span style={{ fontSize: 12, fontWeight: 700, color: C.rose, fontFamily: "monospace" }}>{data.count}</span>
                            </div>
                            <div style={{ height: 5, background: C.surface, borderRadius: 3, overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${Math.round((data.count / maxCount) * 100)}%`, background: C.rose, borderRadius: 3, transition: "width .5s ease" }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </HoverCard>
                  <div style={{ display: "grid", gridTemplateRows: "1fr 1fr 1fr", gap: 8 }}>
                    <HoverCard style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "space-between", animation: "analyticsIn .3s ease .06s both" }}>
                      <span style={{ fontSize: 11, color: C.inkMuted }}>流失</span>
                      <span style={{ fontSize: 20, fontWeight: 800, color: C.rose, fontFamily: "monospace" }}>{lostDeals.length}</span>
                    </HoverCard>
                    <HoverCard style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "space-between", animation: "analyticsIn .3s ease .1s both" }}>
                      <span style={{ fontSize: 11, color: C.inkMuted }}>損失</span>
                      <span style={{ fontSize: 16, fontWeight: 800, color: C.rose, fontFamily: "monospace" }}>{fmt(totalLostValue)}</span>
                    </HoverCard>
                    <HoverCard style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "space-between", animation: "analyticsIn .3s ease .14s both" }}>
                      <span style={{ fontSize: 11, color: C.inkMuted }}>主因</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>{topReason ? `${topReason.icon} ${topReason.label}` : "—"}</span>
                    </HoverCard>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Role Performance — v2.5 mobile optimized card layout */}
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 800, color: C.ink, marginBottom: 12 }}>👥 {periodLabels[period]}角色業績</h3>
            {/* v2.5: Card-based layout automatically stacks on mobile (1fr) and expands to grid on desktop */}
            <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
              {rolePerf.sort((a, b) => b.wonRevenue - a.wonRevenue).map((r, idx) => (
                <HoverCard key={r.id} style={{ padding: 16, borderTop: `3px solid ${r.color}`, animation: `analyticsIn .3s ease ${idx * 0.05}s both`, transition: "transform .15s ease", cursor: "default" }}
                  onMouseEnter={e => e.currentTarget.style.transform = "scale(1.02)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                    <span style={{ fontSize: 20 }}>{r.emoji}</span>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 800, color: r.color }}>{r.name}</div>
                      <div style={{ fontSize: 11, color: C.inkMuted }}>{r.title}</div>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    <div style={{ background: C.surface, borderRadius: 6, padding: "6px 10px" }}>
                      <div style={{ fontSize: 9, color: C.inkMuted, letterSpacing: ".04em" }}>進件</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: C.accent, fontFamily: "monospace" }}>{r.totalDeals}</div>
                    </div>
                    <div style={{ background: C.surface, borderRadius: 6, padding: "6px 10px" }}>
                      <div style={{ fontSize: 9, color: C.inkMuted, letterSpacing: ".04em" }}>簽約</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: C.emerald, fontFamily: "monospace" }}>{r.wonCount}</div>
                    </div>
                    <div style={{ background: C.surface, borderRadius: 6, padding: "6px 10px" }}>
                      <div style={{ fontSize: 9, color: C.inkMuted, letterSpacing: ".04em" }}>金額</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: C.gold, fontFamily: "monospace" }}>{fmt(r.wonRevenue)}</div>
                    </div>
                    <div style={{ background: C.surface, borderRadius: 6, padding: "6px 10px" }}>
                      <div style={{ fontSize: 9, color: C.inkMuted, letterSpacing: ".04em" }}>速度</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: C.cyan, fontFamily: "monospace" }}>{r.avgVelocity > 0 ? `${r.avgVelocity}天` : "—"}</div>
                    </div>
                  </div>
                </HoverCard>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ── Documents / Templates View ──
    const DocumentsView = ({ userDocs, onAddDoc, onDeleteDoc, onEditDoc, showAddForm, onCloseForm, search = "" }) => {
      const { mobile } = useWindowSize();
      const [catFilter, setCatFilter] = useState("全部");
      const [copied, setCopied] = useState(null);
      const [editingIcon, setEditingIcon] = useState(null); // doc id being edited
      const [newDoc, setNewDoc] = useState({ name: "", url: "", category: "其他", desc: "", format: "AUTO", icon: "" });

      const docs = userDocs || [];
      const q = search.toLowerCase().trim();
      const searched = q ? docs.filter(d => `${d.name} ${d.url} ${d.desc || ""} ${d.category}`.toLowerCase().includes(q)) : docs;
      const filtered = catFilter === "全部" ? searched : searched.filter((d) => d.category === catFilter);
      const usedCats = ["全部", ...DOC_CATEGORIES.filter(c => c !== "全部" && searched.some(d => d.category === c))];

      const copyLink = (id, url) => {
        navigator.clipboard?.writeText(url).then(() => {
          setCopied(id);
          setTimeout(() => setCopied(null), 2000);
        });
      };

      const detectFormat = (url) => {
        const ext = url.match(/\.(pdf|docx?|xlsx?|pptx?|csv|txt)/i)?.[1]?.toUpperCase();
        if (ext) return ext;
        if (url.includes("drive.google.com")) return "GDRIVE";
        if (url.includes("dropbox.com")) return "DBOX";
        if (url.includes("notion.so") || url.includes("notion.site")) return "NOTION";
        if (url.includes("figma.com")) return "FIGMA";
        return "LINK";
      };

      const FORMAT_OPTIONS = [
        { value: "AUTO", label: "自動偵測" },
        { value: "PDF", label: "📕 PDF" },
        { value: "DOCX", label: "📄 Word" },
        { value: "PPTX", label: "📊 PowerPoint" },
        { value: "XLSX", label: "📗 Excel / CSV" },
        { value: "GDRIVE", label: "☁️ Google Drive" },
        { value: "DBOX", label: "📦 Dropbox" },
        { value: "NOTION", label: "📝 Notion" },
        { value: "FIGMA", label: "🎨 Figma" },
        { value: "TXT", label: "📃 純文字" },
        { value: "LINK", label: "🔗 一般連結" },
      ];

      const formatIcons = { PDF: "📕", DOCX: "📄", DOC: "📄", PPTX: "📊", PPT: "📊", XLSX: "📗", XLS: "📗", CSV: "📗", GDRIVE: "☁️", DBOX: "📦", NOTION: "📝", FIGMA: "🎨", LINK: "🔗", TXT: "📃" };
      const formatColors = { DOCX: C.accent, DOC: C.accent, PPTX: C.orange, PPT: C.orange, PDF: C.rose, XLSX: C.emerald, XLS: C.emerald, CSV: C.emerald, GDRIVE: C.cyan, DBOX: C.accent, NOTION: C.inkSoft, FIGMA: C.violet, LINK: C.cyan, TXT: C.inkSoft };

      // Icon picker for doc cards
      const DOC_ICON_OPTIONS = ["📕", "📄", "📊", "📗", "☁️", "📦", "📝", "🎨", "🔗", "📃", "📎", "📂", "💼", "📋", "🗂️", "📑", "🖼️", "🎵", "🎬", "💾"];

      const resolveFormat = () => {
        if (newDoc.format && newDoc.format !== "AUTO") return newDoc.format;
        return detectFormat(newDoc.url || "");
      };

      const handleAddDoc = () => {
        if (!newDoc.name || !newDoc.url) return;
        const fmt = resolveFormat();
        const icon = newDoc.icon || formatIcons[fmt] || "📎";
        const doc = { id: "doc_" + Date.now(), name: newDoc.name, url: newDoc.url, category: newDoc.category || "其他", icon, format: fmt, desc: newDoc.desc || "", custom: true };
        onAddDoc(doc);
        setNewDoc({ name: "", url: "", category: "其他", desc: "", format: "AUTO", icon: "" });
        if (onCloseForm) onCloseForm();
      };

      // Update icon on existing doc card
      const handleIconChange = (docId, newIcon) => {
        if (onEditDoc) onEditDoc(docId, { icon: newIcon });
        setEditingIcon(null);
      };

      // Preview the detected/selected format
      const previewFmt = resolveFormat();
      const previewIcon = newDoc.icon || formatIcons[previewFmt] || "📎";

      return (
        <div>
          <div style={{ fontSize: 15, color: C.inkSoft, marginBottom: 20, lineHeight: 1.7 }}>
            你的業務文件資源庫。貼上 Google Drive、Dropbox、Notion 或任何連結來統一管理文件。
          </div>

          {/* Category filter — only show categories that have docs */}
          {docs.length > 0 && (
            <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
              {usedCats.map((cat) => {
                const count = cat === "全部" ? docs.length : docs.filter(d => d.category === cat).length;
                return (
                  <button key={cat} onClick={() => setCatFilter(cat)}
                    style={{ padding: "6px 16px", borderRadius: 20, border: catFilter === cat ? `1.5px solid ${C.accent}` : `1px solid ${C.border}`, background: catFilter === cat ? `${C.accent}15` : "transparent", color: catFilter === cat ? C.accent : C.inkMuted, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: T }}>
                    {cat} ({count})
                  </button>
                );
              })}
            </div>
          )}

          {/* Add Document Form */}
          {showAddForm && (
            <div style={{ background: C.card, border: `1px solid ${C.borderHover}`, borderRadius: 14, padding: mobile ? 18 : 24, marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <span style={{ fontSize: 24 }}>{previewIcon}</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: C.ink }}>新增文件</span>
                <Badge color={formatColors[previewFmt] || C.cyan} bg={`${formatColors[previewFmt] || C.cyan}15`} small>{previewFmt}</Badge>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px", marginBottom: 4 }}>
                <Field label="文件名稱 *"><input style={inputStyle} value={newDoc.name} onChange={(e) => setNewDoc({ ...newDoc, name: e.target.value })} placeholder="例：Q1 客戶提案簡報" /></Field>
                <Field label="分類"><select style={selectStyle} value={newDoc.category} onChange={(e) => setNewDoc({ ...newDoc, category: e.target.value })}>{DOC_CATEGORIES.filter(c => c !== "全部").map(c => <option key={c} value={c}>{c}</option>)}</select></Field>
              </div>
              <Field label="連結 URL *">
                <input style={inputStyle} value={newDoc.url} onChange={(e) => setNewDoc({ ...newDoc, url: e.target.value })} placeholder="https://drive.google.com/file/d/... 或任何連結" />
                <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 4 }}>支援：Google Drive、Dropbox、Notion、Figma、或任何可開啟的網址</div>
              </Field>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px", marginBottom: 4 }}>
                <Field label="檔案格式">
                  <select style={selectStyle} value={newDoc.format} onChange={(e) => {
                    const fmt = e.target.value;
                    const autoIcon = fmt !== "AUTO" ? formatIcons[fmt] || "" : "";
                    setNewDoc({ ...newDoc, format: fmt, icon: autoIcon });
                  }}>
                    {FORMAT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                  <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 4 }}>預設自動偵測，也可手動指定</div>
                </Field>
                <Field label="自訂圖示">
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {DOC_ICON_OPTIONS.map(icon => (
                      <button key={icon} onClick={() => setNewDoc({ ...newDoc, icon })}
                        style={{ width: 34, height: 34, borderRadius: 8, border: newDoc.icon === icon ? `2px solid ${C.accent}` : `1px solid ${C.border}`, background: newDoc.icon === icon ? `${C.accent}20` : C.surface, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", transition: T, padding: 0 }}>
                        {icon}
                      </button>
                    ))}
                    {newDoc.icon && <button onClick={() => setNewDoc({ ...newDoc, icon: "" })}
                      style={{ height: 34, borderRadius: 8, border: `1px solid ${C.border}`, background: "transparent", cursor: "pointer", fontSize: 11, color: C.inkMuted, padding: "0 10px", fontFamily: "inherit" }}>
                      重設
                    </button>}
                  </div>
                </Field>
              </div>
              <Field label="備註說明"><input style={inputStyle} value={newDoc.desc} onChange={(e) => setNewDoc({ ...newDoc, desc: e.target.value })} placeholder="簡述文件用途..." /></Field>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn color={C.emerald} size="sm" onClick={handleAddDoc}>新增</Btn>
                <Btn variant="ghost" size="sm" onClick={onCloseForm}>取消</Btn>
              </div>
            </div>
          )}

          {/* Document cards */}
          {filtered.length > 0 ? (
            <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "repeat(auto-fill, minmax(340px, 1fr))", gap: 12 }}>
              {filtered.map((doc) => (
                <HoverCard key={doc.id} style={{ padding: 20 }}>
                  <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                    {/* Editable icon */}
                    <div style={{ position: "relative", flexShrink: 0 }}>
                      <button onClick={() => setEditingIcon(editingIcon === doc.id ? null : doc.id)}
                        style={{ fontSize: 28, background: "none", border: "none", cursor: "pointer", padding: 0, borderRadius: 8, transition: T, outline: "none" }}
                        title="點擊更換圖示">
                        {doc.icon || "📎"}
                      </button>
                      {editingIcon === doc.id && (
                        <div style={{ position: "absolute", top: 38, left: 0, zIndex: 100, background: C.card, border: `1px solid ${C.borderHover}`, borderRadius: 12, padding: 8, display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 4, boxShadow: "0 8px 24px rgba(0,0,0,.5)", width: 190 }}>
                          {DOC_ICON_OPTIONS.map(icon => (
                            <button key={icon} onClick={() => handleIconChange(doc.id, icon)}
                              style={{ width: 34, height: 34, borderRadius: 8, border: doc.icon === icon ? `2px solid ${C.accent}` : `1px solid ${C.border}`, background: doc.icon === icon ? `${C.accent}20` : "transparent", cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", padding: 0, transition: T }}>
                              {icon}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, wordBreak: "break-word" }}>{doc.name}</div>
                        <Badge color={formatColors[doc.format] || C.cyan} bg={`${formatColors[doc.format] || C.cyan}15`} small>{doc.format}</Badge>
                      </div>
                      {doc.desc && <div style={{ fontSize: 13, color: C.inkSoft, lineHeight: 1.6, marginBottom: 12 }}>{doc.desc}</div>}
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <Btn color={C.accent} size="sm" onClick={() => window.open(doc.url, "_blank")}>開啟</Btn>
                        <Btn variant="secondary" color={copied === doc.id ? C.emerald : C.cyan} size="sm" onClick={() => copyLink(doc.id, doc.url)}>
                          {copied === doc.id ? "✓ 已複製" : "複製連結"}
                        </Btn>
                        <Btn variant="secondary" color={C.rose} size="sm" onClick={() => { if (window.confirm(`確定刪除「${doc.name}」？此操作無法復原。`)) onDeleteDoc(doc.id); }}>刪除</Btn>
                      </div>
                    </div>
                  </div>
                </HoverCard>
              ))}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "60px 20px" }}>
              <TurnipIdleCompanion message="...這裡還空空的。" />
              <div style={{ marginTop: 16, fontSize: 16, fontWeight: 700, color: C.ink, marginBottom: 8 }}>{catFilter === "全部" ? "尚未新增任何文件" : `「${catFilter}」分類尚無文件`}</div>
              <div style={{ fontSize: 14, color: C.inkMuted, marginBottom: 20, lineHeight: 1.6 }}>點擊上方「+ 新增文件」開始建立你的業務文件庫<br />可貼上 Google Drive、Dropbox 或任何檔案連結</div>
            </div>
          )}
        </div>
      );
    };

    // ── Roles Management View ──
    const RolesView = ({ roles, onAdd, onEdit, onArchive, members, onRoleAssign }) => {
      const { mobile } = useWindowSize();
      const activeRoles = roles.filter(r => !r.archived);
      const getBoundMember = (roleId) => (members || []).find(m => m.roleId === roleId) || null;
      // Track which role card is in "assigning" mode
      const [assigningRoleId, setAssigningRoleId] = React.useState(null);

      const MemberAvatar = ({ member, size = 32, border }) => (
        member.picture
          ? <img src={member.picture} alt="" referrerPolicy="no-referrer" style={{ width: size, height: size, borderRadius: "50%", objectFit: "cover", border: border || `2px solid ${C.border}` }} onError={e => { e.target.style.display = "none"; }} />
          : <div style={{ width: size, height: size, borderRadius: "50%", background: `hsl(${(member.email || "").charCodeAt(0) * 7 % 360}, 55%, 45%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: Math.round(size * 0.42), fontWeight: 700, flexShrink: 0, border: border || `2px solid ${C.border}` }}>{(member.email || "?")[0].toUpperCase()}</div>
      );

      const handleAssign = (roleId, newEmail, oldBound) => {
        if (oldBound) onRoleAssign(oldBound.email, null);
        if (newEmail) onRoleAssign(newEmail, roleId);
        setAssigningRoleId(null);
      };

      return (
        <div>
          <div style={{ fontSize: 14, color: C.inkSoft, marginBottom: 20, lineHeight: 1.7 }}>每個角色對應一位成員。點擊可指派或更換綁定帳號。</div>
          <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "repeat(3,1fr)", gap: 14, alignItems: "start" }}>
            {activeRoles.map((r) => {
              const bound = getBoundMember(r.id);
              const isAssigning = assigningRoleId === r.id;
              return (
                <HoverCard key={r.id} style={{ padding: 20, borderTop: `3px solid ${r.color}` }}>
                  {/* Role identity */}
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                    <span style={{ fontSize: 28 }}>{r.emoji}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: r.color }}>{r.name}</div>
                      <div style={{ fontSize: 12, color: C.inkMuted }}>{r.title}</div>
                    </div>
                  </div>
                  {/* Member binding area — dual state */}
                  {isAssigning ? (
                    /* ASSIGNING STATE: inline select */
                    <div style={{ padding: "10px 12px", background: `${r.color}08`, borderRadius: 10, border: `1.5px solid ${r.color}40`, marginBottom: 12 }}>
                      <div style={{ fontSize: 11, color: r.color, fontWeight: 600, marginBottom: 8 }}>選擇要綁定的成員</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {(members || []).map(m => {
                          const isCurrent = bound && bound.email === m.email;
                          return (
                            <button key={m.email} onClick={() => handleAssign(r.id, m.email, bound)}
                              style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", background: isCurrent ? `${r.color}18` : C.surface, border: isCurrent ? `1.5px solid ${r.color}` : `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", fontFamily: "inherit", transition: T, width: "100%" }}
                              onMouseEnter={e => { if (!isCurrent) e.currentTarget.style.background = `${r.color}10`; }}
                              onMouseLeave={e => { if (!isCurrent) e.currentTarget.style.background = C.surface; }}>
                              <MemberAvatar member={m} size={24} border={isCurrent ? `2px solid ${r.color}` : `1px solid ${C.border}`} />
                              <div style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
                                <div style={{ fontSize: 13, fontWeight: 600, color: isCurrent ? r.color : C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.name || m.email.split("@")[0]}</div>
                                <div style={{ fontSize: 10, color: C.inkMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.email}</div>
                              </div>
                              {isCurrent && <span style={{ fontSize: 11, color: r.color, fontWeight: 700, flexShrink: 0 }}>目前</span>}
                            </button>
                          );
                        })}
                        {/* Unbind option */}
                        {bound && (
                          <button onClick={() => handleAssign(r.id, null, bound)}
                            style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", fontFamily: "inherit", transition: T, width: "100%" }}
                            onMouseEnter={e => { e.currentTarget.style.background = `${C.rose}10`; }}
                            onMouseLeave={e => { e.currentTarget.style.background = C.surface; }}>
                            <span style={{ fontSize: 14, width: 24, textAlign: "center" }}>✕</span>
                            <span style={{ fontSize: 12, color: C.rose, fontWeight: 600 }}>取消綁定</span>
                          </button>
                        )}
                      </div>
                      <button onClick={() => setAssigningRoleId(null)}
                        style={{ marginTop: 8, background: "none", border: "none", color: C.inkMuted, fontSize: 11, cursor: "pointer", fontFamily: "inherit", padding: 0 }}>
                        收起
                      </button>
                    </div>
                  ) : bound ? (
                    /* BOUND STATE: show member fully, with small 🔄 */
                    <div onClick={() => { if (onRoleAssign && members && members.length > 0) setAssigningRoleId(r.id); }}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: C.bg, borderRadius: 10, border: `1px solid ${C.border}`, marginBottom: 12, cursor: onRoleAssign ? "pointer" : "default", transition: T }}
                      title="點擊更換綁定成員">
                      <MemberAvatar member={bound} size={34} border={`2px solid ${r.color}`} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>{bound.name || bound.email.split("@")[0]}</div>
                        <div style={{ fontSize: 11, color: C.inkMuted }}>{bound.email}</div>
                      </div>
                      {onRoleAssign && <span style={{ fontSize: 16, color: C.inkMuted, flexShrink: 0, opacity: 0.6 }} title="更換成員">🔄</span>}
                    </div>
                  ) : (
                    /* EMPTY STATE: clickable assign button */
                    <button onClick={() => { if (onRoleAssign && members && members.length > 0) setAssigningRoleId(r.id); }}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", background: "transparent", borderRadius: 10, border: `2px dashed ${C.border}`, marginBottom: 12, cursor: "pointer", width: "100%", fontFamily: "inherit", transition: T }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = r.color; e.currentTarget.style.background = `${r.color}08`; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = "transparent"; }}>
                      <div style={{ width: 34, height: 34, borderRadius: "50%", border: `2px dashed ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <span style={{ fontSize: 18, color: C.inkMuted }}>+</span>
                      </div>
                      <span style={{ fontSize: 13, color: C.inkMuted, fontWeight: 600 }}>指派成員</span>
                    </button>
                  )}
                  {/* Actions */}
                  <div style={{ display: "flex", gap: 6 }}>
                    <Btn size="sm" color={C.accent} onClick={() => onEdit(r)}>編輯</Btn>
                    <Btn variant="secondary" color={C.rose} size="sm" onClick={() => onArchive(r.id)}>封存</Btn>
                  </div>
                </HoverCard>
              );
            })}
            {/* Add new role card */}
            <button onClick={onAdd} style={{ background: "transparent", border: `2px dashed ${C.border}`, borderRadius: 12, padding: 24, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, minHeight: 110, transition: T, fontFamily: "inherit" }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.background = `${C.accent}08`; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = "transparent"; }}>
              <span style={{ fontSize: 28, color: C.inkMuted }}>+</span>
              <span style={{ fontSize: 14, color: C.inkMuted }}>新增角色</span>
            </button>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════
    // 📋 Proposal / Quote Generator (P0)
    // ══════════════════════════════════════════════

    const calcProposalTotals = (items, tax = 0.05, discount = 0, taxType = "added") => {
      const subtotal = items.reduce((s, i) => s + (i.qty * i.unitPrice), 0);
      const afterDiscount = subtotal - discount;
      if (taxType === "none" || tax === 0) {
        return { subtotal, afterDiscount, taxAmount: 0, total: afterDiscount, taxType: "none" };
      }
      if (taxType === "included") {
        // 含稅：報價金額已含稅，拆出稅額供顯示
        const preTax = Math.round(afterDiscount / (1 + tax));
        const taxAmount = afterDiscount - preTax;
        return { subtotal, afterDiscount, taxAmount, total: afterDiscount, preTax, taxType: "included" };
      }
      // 外加：稅額加在報價之上
      const taxAmount = Math.round(afterDiscount * tax);
      return { subtotal, afterDiscount, taxAmount, total: afterDiscount + taxAmount, taxType: "added" };
    };

    const ProposalPreview = ({ proposal, companyProfile: cp, onClose }) => {
      const { mobile } = useWindowSize();
      const pTaxOpt = TAX_OPTIONS.find((t) => t.id === proposal.taxType) || (proposal.tax === 0 ? TAX_OPTIONS[0] : TAX_OPTIONS[2]);
      const totals = calcProposalTotals(proposal.items, pTaxOpt.rate, proposal.discount, pTaxOpt.mode);
      const statusObj = PROPOSAL_STATUS.find((s) => s.id === proposal.status);

      const handlePrint = () => {
        const printWindow = window.open("", "_blank");
        printWindow.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${proposal.number}</title>
      <style>*{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans TC",sans-serif}
      body{padding:40px 50px;color:#222;font-size:14px;line-height:1.6}
      .header{display:flex;justify-content:space-between;border-bottom:3px solid #6C8EFF;padding-bottom:20px;margin-bottom:30px}
      .title{font-size:24px;font-weight:800;color:#6C8EFF}
      .meta{text-align:right;font-size:13px;color:#666}
      .meta strong{color:#222}
      .client{background:#f8f9fa;border-radius:8px;padding:16px;margin-bottom:24px}
      table{width:100%;border-collapse:collapse;margin-bottom:24px}
      th{background:#6C8EFF;color:#fff;padding:10px 14px;text-align:left;font-size:13px;font-weight:600}
      td{padding:10px 14px;border-bottom:1px solid #eee;font-size:13px}
      tr:nth-child(even){background:#fafafa}
      .total-row{text-align:right;font-size:15px;margin-bottom:6px}
      .total-row.grand{font-size:20px;font-weight:800;color:#6C8EFF;border-top:2px solid #6C8EFF;padding-top:10px;margin-top:10px}
      .notes{background:#f0f4ff;border-radius:8px;padding:16px;margin-top:20px;font-size:13px;color:#555}
      .footer{margin-top:40px;padding-top:20px;border-top:1px solid #ddd;display:flex;justify-content:space-between;font-size:12px;color:#999}
      .sign-area{margin-top:50px;display:flex;justify-content:space-between}
      .sign-box{width:45%;border-top:1px solid #999;padding-top:10px;font-size:13px;color:#666}
      .stamp-zone{position:relative}
      .stamp-watermark{position:absolute;top:50%;right:10%;transform:translate(0,-50%) rotate(-15deg);width:35%;max-width:240px;min-width:160px;opacity:0.35;pointer-events:none;z-index:10}
      @media print{body{padding:20px 30px}.stamp-watermark{opacity:0.35;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
      </style></head><body>
      <div class="header"><div><div class="title">報價單</div><div style="color:#888;font-size:13px;margin-top:4px">QUOTATION</div></div>
      <div class="meta"><div><strong>${proposal.number}</strong></div>
      <div>日期：${proposal.created}</div>
      <div>有效期限：${proposal.validUntil || "—"}</div></div></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:24px">
      <div class="client" style="flex:1;margin-right:16px"><div style="font-size:11px;color:#888;font-weight:600;letter-spacing:.08em;margin-bottom:6px">FROM</div>
      <div style="font-size:16px;font-weight:700">${cp?.name || "Beyond Spec 規格外工作室"}</div>
      <div>聯絡人：${cp?.contact || "愛德華"}</div><div>Email：${cp?.email || ""}</div>
      ${cp?.phone ? `<div>電話：${cp.phone}</div>` : ""}
      ${cp?.address ? `<div>${cp.address}</div>` : ""}</div>
      <div class="client" style="flex:1"><div style="font-size:11px;color:#888;font-weight:600;letter-spacing:.08em;margin-bottom:6px">TO</div>
      <div style="font-size:16px;font-weight:700">${proposal.client.name}</div>
      <div>聯絡人：${proposal.client.contact}</div>
      <div>Email：${proposal.client.email}</div>
      ${proposal.client.address ? `<div>${proposal.client.address}</div>` : ""}</div></div>
      <div style="font-size:17px;font-weight:700;margin-bottom:16px">${proposal.title}</div>
      <table><thead><tr><th>#</th><th>項目說明</th><th>數量</th><th>單位</th><th>單價</th><th style="text-align:right">小計</th></tr></thead>
      <tbody>${proposal.items.map((item, idx) => `<tr><td>${idx + 1}</td><td>${item.desc}</td><td>${item.qty}</td><td>${item.unit || "式"}</td>
      <td>NT$ ${item.unitPrice.toLocaleString()}</td><td style="text-align:right">NT$ ${(item.qty * item.unitPrice).toLocaleString()}</td></tr>`).join("")}</tbody></table>
      <div class="stamp-zone">
      ${cp?.stampImage ? `<img src="${cp.stampImage}" class="stamp-watermark" />` : ""}
      <div style="text-align:right"><div class="total-row">小計：NT$ ${totals.subtotal.toLocaleString()}</div>
      ${proposal.discount ? `<div class="total-row">折扣：-NT$ ${proposal.discount.toLocaleString()}</div>` : ""}
      ${totals.taxType === "included" ? `<div class="total-row">含稅 5%（稅額 NT$ ${totals.taxAmount.toLocaleString()}）</div>` : totals.taxType === "added" ? `<div class="total-row">外加稅 5%：NT$ ${totals.taxAmount.toLocaleString()}</div>` : ""}
      <div class="total-row grand">總計：NT$ ${totals.total.toLocaleString()}</div></div>
      ${proposal.paymentSchedule && proposal.paymentSchedule.length > 0 ? `
        <div class="notes"><strong>付款條件：</strong>
        <table style="width:100%;margin-top:8px;border-collapse:collapse;font-size:12px">
          <tr style="background:#f0f4ff"><th style="padding:6px 10px;text-align:left;border:1px solid #ddd">期數</th><th style="padding:6px 10px;text-align:left;border:1px solid #ddd">付款節點</th><th style="padding:6px 10px;text-align:right;border:1px solid #ddd">金額</th></tr>
          ${proposal.paymentSchedule.map((p, i) => `<tr><td style="padding:6px 10px;border:1px solid #ddd">第 ${i + 1} 期</td><td style="padding:6px 10px;border:1px solid #ddd">${p.label}</td><td style="padding:6px 10px;text-align:right;border:1px solid #ddd">NT$ ${(p.amt || Math.round(totals.total * (p.pct || 0) / 100)).toLocaleString()}</td></tr>`).join("")}
        </table></div>
      ` : proposal.terms ? `<div class="notes"><strong>付款條件：</strong>${proposal.terms}</div>` : ""}
      ${proposal.notes ? `<div class="notes" style="margin-top:10px"><strong>備註：</strong>${proposal.notes}</div>` : ""}
      <div class="sign-area"><div class="sign-box">客戶簽章<br><br><br>日期：_______________</div>
      <div class="sign-box">${cp?.signatory || cp?.name || "Beyond Spec 規格外工作室"}<br><br><br>日期：_______________</div></div>
      </div>
      <div class="footer"><span>${cp?.name || "Beyond Spec 規格外工作室"}${cp?.slogan ? ` — ${cp.slogan}` : ""}</span><span>${cp?.website || "beyondspec.tw"}</span></div>
      </body></html>`);
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 300);
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1200 }} onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 18, width: mobile ? "100%" : 680, maxHeight: "90vh", display: "flex", flexDirection: "column", animation: "scaleIn .25s cubic-bezier(.4,0,.2,1)" }}>
            {/* Preview header */}
            <div style={{ padding: "20px 28px", borderBottom: "1px solid #eee", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#222" }}>報價單預覽</div>
                <div style={{ fontSize: 13, color: "#888" }}>{proposal.number} · <span style={{ color: statusObj?.color }}>{statusObj?.label}</span></div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn color={C.accent} size="sm" onClick={handlePrint}>列印 / PDF</Btn>
                <button onClick={onClose} style={{ background: "#f5f5f5", border: "none", color: "#888", cursor: "pointer", fontSize: 14, padding: "6px 10px", borderRadius: 8, fontFamily: "inherit" }}>✕</button>
              </div>
            </div>
            {/* Preview body */}
            <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px", color: "#222", fontSize: 14, lineHeight: 1.7 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
                <div><div style={{ fontSize: 11, color: "#888", fontWeight: 600, letterSpacing: ".08em", marginBottom: 4 }}>FROM</div>
                  <div style={{ fontWeight: 700 }}>{cp?.name || "Beyond Spec 規格外工作室"}</div>
                  <div style={{ fontSize: 13, color: "#666" }}>{cp?.contact || ""}{cp?.contact && cp?.email ? " · " : ""}{cp?.email || ""}</div>
                  {cp?.phone && <div style={{ fontSize: 13, color: "#666" }}>{cp.phone}</div>}
                  {cp?.address && <div style={{ fontSize: 13, color: "#666" }}>{cp.address}</div>}</div>
                <div style={{ textAlign: "right" }}><div style={{ fontSize: 11, color: "#888", fontWeight: 600, letterSpacing: ".08em", marginBottom: 4 }}>TO</div>
                  <div style={{ fontWeight: 700 }}>{proposal.client.name}</div>
                  <div style={{ fontSize: 13, color: "#666" }}>{proposal.client.contact} · {proposal.client.email}</div></div>
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, color: "#333" }}>{proposal.title}</div>
              <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 20 }}>
                <thead><tr>{["#", "項目說明", "數量", "單位", "單價", "小計"].map((h, i) => <th key={i} style={{ background: "#6C8EFF", color: "#fff", padding: "8px 12px", fontSize: 12, fontWeight: 600, textAlign: i >= 4 ? "right" : "left" }}>{h}</th>)}</tr></thead>
                <tbody>{proposal.items.map((item, idx) => (
                  <tr key={idx} style={{ background: idx % 2 ? "#fafafa" : "#fff" }}>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13 }}>{idx + 1}</td>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13 }}>{item.desc}</td>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13 }}>{item.qty}</td>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13 }}>{item.unit || "式"}</td>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13, textAlign: "right" }}>NT$ {item.unitPrice.toLocaleString()}</td>
                    <td style={{ padding: "8px 12px", borderBottom: "1px solid #eee", fontSize: 13, textAlign: "right", fontWeight: 600 }}>NT$ {(item.qty * item.unitPrice).toLocaleString()}</td>
                  </tr>
                ))}</tbody>
              </table>
              <div style={{ position: "relative" }}>
                {cp?.stampImage && <img src={cp.stampImage} alt="" style={{ position: "absolute", top: "50%", right: "8%", transform: "translate(0,-50%) rotate(-15deg)", width: "35%", maxWidth: 220, minWidth: 140, opacity: 0.35, pointerEvents: "none", zIndex: 10 }} />}
                <div style={{ textAlign: "right", marginBottom: 20 }}>
                  <div style={{ fontSize: 14, marginBottom: 4 }}>小計：<strong>NT$ {totals.subtotal.toLocaleString()}</strong></div>
                  {proposal.discount > 0 && <div style={{ fontSize: 14, marginBottom: 4, color: C.rose }}>折扣：-NT$ {proposal.discount.toLocaleString()}</div>}
                  {totals.taxType === "included" && <div style={{ fontSize: 14, marginBottom: 4 }}>含稅 5%（稅額 NT$ {totals.taxAmount.toLocaleString()}）</div>}
                  {totals.taxType === "added" && <div style={{ fontSize: 14, marginBottom: 4 }}>外加稅 5%：NT$ {totals.taxAmount.toLocaleString()}</div>}
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#6C8EFF", borderTop: "2px solid #6C8EFF", paddingTop: 10, marginTop: 10 }}>總計：NT$ {totals.total.toLocaleString()}</div>
                </div>
                {proposal.paymentSchedule && proposal.paymentSchedule.length > 0 ? (
                  <div style={{ background: "#f0f4ff", borderRadius: 8, padding: 14, fontSize: 13, color: "#555", marginBottom: 10 }}>
                    <div style={{ fontWeight: 600, marginBottom: 8 }}>付款條件：</div>
                    {proposal.paymentSchedule.map((p, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: i < proposal.paymentSchedule.length - 1 ? "1px solid #e0e4ea" : "none" }}>
                        <span>第 {i + 1} 期 — {p.label}</span>
                        <span style={{ fontWeight: 600 }}>NT$ {(p.amt || Math.round(totals.total * (p.pct || 0) / 100)).toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                ) : proposal.terms ? (
                  <div style={{ background: "#f0f4ff", borderRadius: 8, padding: 14, fontSize: 13, color: "#555", marginBottom: 10 }}>付款條件：{proposal.terms}</div>
                ) : null}
                {proposal.notes && <div style={{ background: "#f9f9f9", borderRadius: 8, padding: 14, fontSize: 13, color: "#555" }}>備註：{proposal.notes}</div>}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Proposal form for creating/editing
    // ── Proposal/Quote Presets ──
    const QUOTE_TYPES = [
      { id: "client", label: "📄 客戶報價", desc: "給客戶的服務報價單" },
      { id: "outsource", label: "🤝 外包發包", desc: "發給外包夥伴的委託單" },
    ];
    const PAYMENT_PRESETS = [
      { id: "50_50", label: "簽約 50% / 交付 50%", periods: [{ label: "簽約", pct: 50 }, { label: "交付", pct: 50 }] },
      { id: "30_30_40", label: "簽約 30% / 中期 30% / 交付 40%", periods: [{ label: "簽約", pct: 30 }, { label: "中期驗收", pct: 30 }, { label: "交付", pct: 40 }] },
      { id: "40_30_30", label: "簽約 40% / 中期 30% / 尾款 30%", periods: [{ label: "簽約", pct: 40 }, { label: "中期", pct: 30 }, { label: "尾款", pct: 30 }] },
      { id: "100_upfront", label: "100% 預付", periods: [{ label: "預付全額", pct: 100 }] },
      { id: "100_delivery", label: "交付後 100% 付清", periods: [{ label: "交付付清", pct: 100 }] },
      { id: "net30", label: "月結 30 天", periods: [{ label: "月結 30 天", pct: 100 }] },
      { id: "milestone", label: "自訂里程碑分期", periods: [{ label: "第 1 期", pct: 50 }, { label: "第 2 期", pct: 50 }] },
    ];
    const PERIOD_LABEL_OPTIONS = ["簽約", "訂金", "開工", "中期驗收", "中期", "交付", "尾款", "驗收完成", "月結 7 天", "月結 14 天", "月結 30 天", "預付全額", "交付付清"];

    // PaymentSchedule: 1-7 installment editor with auto-calculate last period
    const PaymentSchedule = ({ total, schedule, onChange }) => {
      const { mobile } = useWindowSize();
      const periods = schedule || [{ label: "簽約", pct: 50, amt: 0 }, { label: "交付", pct: 50, amt: 0 }];
      const numPeriods = periods.length;

      // Recalculate amounts from percentages whenever total changes
      const computed = useMemo(() => {
        const result = periods.map((p, i) => {
          const amt = p.amt > 0 ? p.amt : Math.round(total * (p.pct || 0) / 100);
          return { ...p, amt };
        });
        // Auto-calc last period as remainder
        if (result.length > 1) {
          const sumPrev = result.slice(0, -1).reduce((s, p) => s + p.amt, 0);
          result[result.length - 1] = { ...result[result.length - 1], amt: Math.max(0, total - sumPrev) };
        } else if (result.length === 1) {
          result[0] = { ...result[0], amt: total };
        }
        return result;
      }, [periods, total]);

      const sumAlloc = computed.reduce((s, p) => s + p.amt, 0);
      const diff = total - sumAlloc;

      const updatePeriod = (idx, key, val) => {
        const next = periods.map((p, i) => {
          if (i !== idx) return p;
          const updated = { ...p, [key]: val };
          // If user edits amount, clear pct so it's treated as fixed
          if (key === "amt") { updated.pct = 0; }
          // If user edits pct, clear amt so it recalculates
          if (key === "pct") { updated.amt = 0; }
          return updated;
        });
        onChange(next);
      };

      const setNumPeriods = (n) => {
        const count = Math.max(1, Math.min(7, n));
        let next = [...periods];
        while (next.length < count) next.push({ label: `第 ${next.length + 1} 期`, pct: 0, amt: 0 });
        while (next.length > count) next.pop();
        // Auto-distribute evenly if all are 0
        const hasValues = next.some((p) => p.pct > 0 || p.amt > 0);
        if (!hasValues && count > 0) {
          const evenPct = Math.floor(100 / count);
          next = next.map((p, i) => ({ ...p, pct: i === count - 1 ? 100 - evenPct * (count - 1) : evenPct }));
        }
        onChange(next);
      };

      const applyPreset = (presetId) => {
        const preset = PAYMENT_PRESETS.find((p) => p.id === presetId);
        if (preset) onChange(preset.periods.map((p) => ({ ...p, amt: 0 })));
      };

      return (
        <div>
          {/* Preset + period count row — single line, no wrap */}
          <div style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-end" }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4, fontWeight: 500 }}>快速套用</div>
              <select style={{ ...selectStyle, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }} onChange={(e) => applyPreset(e.target.value)} value="">
                <option value="">選擇付款範本...</option>
                {PAYMENT_PRESETS.map((p) => <option key={p.id} value={p.id}>{p.label}</option>)}
              </select>
            </div>
            <div style={{ flexShrink: 0 }}>
              <div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4, fontWeight: 500 }}>期數</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <button onClick={() => setNumPeriods(numPeriods - 1)} style={{ width: 32, height: 36, borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, color: C.ink, fontSize: 16, cursor: "pointer", fontFamily: "inherit" }}>−</button>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: C.surface, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 700, color: C.accent }}>{numPeriods}</div>
                <button onClick={() => setNumPeriods(numPeriods + 1)} style={{ width: 32, height: 36, borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, color: C.ink, fontSize: 16, cursor: "pointer", fontFamily: "inherit" }}>+</button>
              </div>
            </div>
          </div>

          {/* Period rows */}
          <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, overflow: "hidden" }}>
            {/* Header */}
            {!mobile && <div style={{ display: "grid", gridTemplateColumns: "140px 80px 1fr 100px", gap: 8, padding: "8px 14px", borderBottom: `1px solid ${C.border}` }}>
              {["付款節點", "%", "金額 (NT$)", ""].map((h, i) => (
                <div key={i} style={{ fontSize: 11, color: C.inkMuted, fontWeight: 600 }}>{h}</div>
              ))}
            </div>}

            {computed.map((p, idx) => {
              const isLast = idx === computed.length - 1 && computed.length > 1;
              return (
                <div key={idx} style={{ padding: mobile ? "10px 14px" : "8px 14px", borderBottom: idx < computed.length - 1 ? `1px solid ${C.border}` : "none", background: isLast ? `${C.accent}08` : "transparent" }}>
                  {mobile ? (
                    <div>
                      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4 }}>節點</div>
                          <select style={{ ...selectStyle, fontSize: 13 }} value={p.label} onChange={(e) => updatePeriod(idx, "label", e.target.value)}>
                            {PERIOD_LABEL_OPTIONS.map((l) => <option key={l} value={l}>{l}</option>)}
                            {!PERIOD_LABEL_OPTIONS.includes(p.label) && <option value={p.label}>{p.label}</option>}
                          </select>
                        </div>
                        <div style={{ width: 70 }}>
                          <div style={{ fontSize: 11, color: C.inkMuted, marginBottom: 4 }}>%</div>
                          <input style={{ ...inputStyle, fontSize: 13, textAlign: "center" }} type="number" min="0" max="100" value={p.pct || ""} disabled={isLast}
                            onChange={(e) => updatePeriod(idx, "pct", Number(e.target.value))} />
                        </div>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: isLast ? C.accent : C.gold }}>
                          {isLast ? "⬇ 尾款 " : ""}NT$ {p.amt.toLocaleString()}
                        </div>
                        {!isLast && <input style={{ ...inputStyle, fontSize: 13, textAlign: "right", width: 120 }} type="number" step="1000" value={p.amt || ""} placeholder="自動" onChange={(e) => updatePeriod(idx, "amt", Number(e.target.value))} />}
                      </div>
                    </div>
                  ) : (
                    <div style={{ display: "grid", gridTemplateColumns: "140px 80px 1fr 100px", gap: 8, alignItems: "center" }}>
                      <select style={{ ...selectStyle, fontSize: 13 }} value={p.label} onChange={(e) => updatePeriod(idx, "label", e.target.value)}>
                        {PERIOD_LABEL_OPTIONS.map((l) => <option key={l} value={l}>{l}</option>)}
                        {!PERIOD_LABEL_OPTIONS.includes(p.label) && <option value={p.label}>{p.label}</option>}
                      </select>
                      <input style={{ ...inputStyle, fontSize: 13, textAlign: "center" }} type="number" min="0" max="100" value={p.pct || ""} disabled={isLast}
                        onChange={(e) => updatePeriod(idx, "pct", Number(e.target.value))} />
                      {isLast ? (
                        <div style={{ padding: "10px 14px", borderRadius: 10, background: `${C.accent}10`, fontSize: 14, fontWeight: 700, color: C.accent, whiteSpace: "nowrap", textAlign: "right" }}>NT$ {p.amt.toLocaleString()} <span style={{ fontSize: 11, fontWeight: 500, opacity: 0.7 }}>尾款</span></div>
                      ) : (
                        <input style={{ ...inputStyle, fontSize: 13, textAlign: "right" }} type="number" step="1000" value={p.amt || ""} placeholder={`≈ NT$ ${Math.round(total * (p.pct || 0) / 100).toLocaleString()}`}
                          onChange={(e) => updatePeriod(idx, "amt", Number(e.target.value))} />
                      )}
                      <div style={{ fontSize: 13, color: C.inkMuted, textAlign: "right" }}>{total > 0 ? Math.round(p.amt / total * 100) : 0}%</div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Summary footer */}
            <div style={{ padding: "10px 14px", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: `${C.gold}08` }}>
              <span style={{ fontSize: 12, color: C.inkMuted }}>合計 {computed.length} 期</span>
              <span style={{ fontSize: 14, fontWeight: 800, color: diff === 0 ? C.emerald : C.rose }}>
                NT$ {sumAlloc.toLocaleString()} {diff === 0 ? "✓" : diff > 0 ? `（差 ${fmt(diff)}）` : `（超額 ${fmt(Math.abs(diff))}）`}
              </span>
            </div>
          </div>
        </div>
      );
    };
    const TAX_OPTIONS = [
      { id: "none", label: "免稅 (0%)", rate: 0, mode: "none" },
      { id: "included", label: "含稅 5%（總價已含稅）", rate: 0.05, mode: "included" },
      { id: "added", label: "外加 5%（稅額另計）", rate: 0.05, mode: "added" },
    ];
    const UNIT_OPTIONS = ["式", "小時", "天", "月", "頁", "份", "套", "人月", "人天"];
    const DEFAULT_SERVICE_TEMPLATES = [
      { desc: "產品規格定義 (PRD)", unit: "式", unitPrice: 60000 },
      { desc: "UX 研究與用戶訪談", unit: "式", unitPrice: 45000 },
      { desc: "UI/UX 設計", unit: "頁", unitPrice: 8000 },
      { desc: "前端開發", unit: "頁", unitPrice: 12000 },
      { desc: "後端 API 開發", unit: "式", unitPrice: 80000 },
      { desc: "產品健檢報告", unit: "份", unitPrice: 30000 },
      { desc: "品牌識別設計", unit: "套", unitPrice: 50000 },
      { desc: "Landing Page 設計＋開發", unit: "頁", unitPrice: 25000 },
      { desc: "技術顧問諮詢", unit: "小時", unitPrice: 3000 },
      { desc: "專案管理", unit: "月", unitPrice: 20000 },
      { desc: "QA 測試", unit: "式", unitPrice: 15000 },
      { desc: "維護與支援方案", unit: "月", unitPrice: 10000 },
    ];

    const TITLE_SUGGESTIONS = [
      "產品規格定義服務", "UX 研究與設計服務", "MVP 開發服務", "品牌識別設計",
      "Landing Page 設計開發", "產品健檢報告", "技術顧問諮詢服務", "UI/UX 設計服務",
      "前端開發服務", "後端 API 開發服務", "全端開發服務", "專案管理服務",
      "QA 測試服務", "維護與支援方案", "數位轉型諮詢", "App 設計開發服務",
    ];

    const ProposalForm = ({ proposal, deals, leads, partners = [], onPartnersChange, onLeadsImport, companyProfile, onCompanyProfileChange, serviceTemplates = DEFAULT_SERVICE_TEMPLATES, onServiceTemplatesChange, noteTemplates = [], onNoteTemplatesChange, onSave, onCancel }) => {
      const { mobile } = useWindowSize();
      const [form, setForm] = useState(() => {
        const p = proposal || {
          dealId: null, quoteType: "client", number: `QT-${new Date().getFullYear()}-${String(Date.now()).slice(-3)}`,
          client: { name: "", contact: "", email: "", address: "" },
          title: "", items: [{ desc: "", qty: 1, unit: "式", unitPrice: 0 }],
          taxType: "added", discount: 0, notes: "",
          terms: "簽約 50% / 交付 50%",
          paymentSchedule: [{ label: "簽約", pct: 50, amt: 0 }, { label: "交付", pct: 50, amt: 0 }],
          status: "draft", created: today(), validUntil: "", sentDate: null,
        };
        if (p.tax !== undefined && !p.taxType) {
          if (p.tax === 0) p.taxType = "none";
          else p.taxType = "added";
        }
        return p;
      });
      const [showServicePicker, setShowServicePicker] = useState(false);
      const [showAddCustom, setShowAddCustom] = useState(false);
      const [newCustom, setNewCustom] = useState({ desc: "", unit: "式", unitPrice: 0 });
      const [tplPrices, setTplPrices] = useState(() => serviceTemplates.map((t) => t.unitPrice));
      useEffect(() => { setTplPrices(serviceTemplates.map((t) => t.unitPrice)); }, [serviceTemplates.length]);

      const [flashIdx, setFlashIdx] = useState(-1);
      const [sourceKey, setSourceKey] = useState(() => {
        if (proposal?.partnerId) return `partner:${proposal.partnerId}`;
        if (proposal?.dealId) return `deal:${proposal.dealId}`;
        if (proposal?.leadId) return `lead:${proposal.leadId}`;
        return "";
      });
      const [showAddPartner, setShowAddPartner] = useState(false);

      // Service template CRUD
      const addServiceTemplate = () => {
        if (!newCustom.desc.trim()) return;
        onServiceTemplatesChange([...serviceTemplates, { desc: newCustom.desc.trim(), unit: newCustom.unit, unitPrice: newCustom.unitPrice }]);
        setNewCustom({ desc: "", unit: "式", unitPrice: 0 });
        setShowAddCustom(false);
      };
      const removeServiceTemplate = (idx) => {
        onServiceTemplatesChange(serviceTemplates.filter((_, i) => i !== idx));
      };

      const serviceSuggestions = useMemo(() => serviceTemplates.map((t) => ({ label: t.desc, ...t })), [serviceTemplates]);

      const [errors, setErrors] = useState({});
      const clearError = (field) => { if (errors[field]) setErrors((e) => { const n = { ...e }; delete n[field]; return n; }); };

      const setF = (k, v) => { setForm((p) => ({ ...p, [k]: v })); clearError(k); };
      const setClient = (k, v) => { setForm((p) => ({ ...p, client: { ...p.client, [k]: v } })); clearError(`client.${k}`); };
      const setItem = (idx, k, v) => { setForm((p) => ({ ...p, items: p.items.map((it, i) => i === idx ? { ...it, [k]: v } : it) })); clearError("items"); };
      const addItem = (template) => { setForm((p) => ({ ...p, items: [...p.items, template || { desc: "", qty: 1, unit: "式", unitPrice: 0 }] })); clearError("items"); };
      const removeItem = (idx) => setForm((p) => ({ ...p, items: p.items.filter((_, i) => i !== idx) }));

      const validateForm = () => {
        const errs = {};
        if (!form.title.trim()) errs.title = "請輸入提案標題";
        if (!form.client.name.trim()) errs["client.name"] = form.quoteType === "outsource" ? "請輸入外包公司名稱" : "請輸入客戶公司名稱";
        if (!form.client.contact.trim()) errs["client.contact"] = "請輸入聯繫人";
        if (form.items.length === 0 || form.items.every((it) => !it.desc.trim())) errs.items = "至少需要一個報價項目";
        setErrors(errs);
        return Object.keys(errs).length === 0;
      };
      const taxOpt = TAX_OPTIONS.find((t) => t.id === form.taxType) || TAX_OPTIONS[2];
      const totals = calcProposalTotals(form.items, taxOpt.rate, form.discount, taxOpt.mode);

      // ── Client sources (deals + leads) — for 客戶報價 ──
      const clientSources = useMemo(() => {
        const sources = [];
        const seen = new Set();
        (deals || []).filter((d) => !d.archived).forEach((d) => {
          const key = `deal-${d.id}`;
          if (!seen.has(key)) { seen.add(key); sources.push({ type: "deal", id: d.id, label: `${d.name} — ${d.company}`, company: d.company, contact: d.contact, email: d.email, dealId: d.id, title: d.name }); }
        });
        (leads || []).filter((l) => !l.archived).forEach((l) => {
          const key = `lead-${l.id}`;
          if (!seen.has(key)) { seen.add(key); sources.push({ type: "lead", id: l.id, label: `${l.name} — ${l.company}`, company: l.company, contact: l.name, email: l.email || "", dealId: null, title: "" }); }
        });
        return sources;
      }, [deals, leads]);

      // ── Fill from source (client or partner) ──
      const fillFromSource = (newSourceKey) => {
        setSourceKey(newSourceKey);
        if (!newSourceKey) {
          setForm((p) => ({ ...p, dealId: null, partnerId: null, client: { name: "", contact: "", email: "", address: p.client.address || "" } }));
          return;
        }
        const [type, id] = newSourceKey.split(":");
        if (type === "partner") {
          const pt = partners.find((p) => String(p.id) === id);
          if (pt) {
            setForm((p) => ({ ...p, dealId: null, partnerId: pt.id, client: { ...p.client, name: pt.company || "", contact: pt.contact || "", email: pt.email || "" } }));
          }
        } else {
          const src = clientSources.find((s) => s.type === type && String(s.id) === id);
          if (src) {
            setForm((p) => ({ ...p, dealId: src.dealId, partnerId: null, client: { ...p.client, name: src.company || "", contact: src.contact || "", email: src.email || "" } }));
            if (!form.title && src.title) setF("title", `${src.title} — 服務提案`);
          }
        }
      };

      // ── Partner CRUD ──
      const saveCurrentAsPartner = () => {
        if (!form.client.name.trim()) return;
        const exists = partners.some((p) => p.company === form.client.name.trim());
        if (exists) return;
        const newPartner = { id: Date.now(), company: form.client.name.trim(), contact: form.client.contact, email: form.client.email, created: today() };
        onPartnersChange([...partners, newPartner]);
        setForm((p) => ({ ...p, partnerId: newPartner.id }));
        setSourceKey(`partner:${newPartner.id}`);
        setShowAddPartner(false);
      };
      const removePartner = (pid) => {
        onPartnersChange(partners.filter((p) => p.id !== pid));
        if (sourceKey === `partner:${pid}`) setSourceKey("");
      };
      // ── Robust CSV parser (handles quoted fields with commas & newlines) ──
      const parseCSVLine = (line) => {
        const cols = []; let cur = ""; let inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQuote) {
            if (ch === '"' || ch === "\u201C" || ch === "\u201D") {
              if (i + 1 < line.length && (line[i + 1] === '"' || line[i + 1] === "\u201C" || line[i + 1] === "\u201D")) { cur += '"'; i++; }
              else inQuote = false;
            } else cur += ch;
          } else {
            if (ch === '"' || ch === "\u201C" || ch === "\u201D") inQuote = true;
            else if (ch === ",") { cols.push(cur.trim()); cur = ""; }
            else cur += ch;
          }
        }
        cols.push(cur.trim());
        return cols;
      };

      const csvInputRef = useRef(null);
      const csvClientRef = useRef(null);
      const [csvResult, setCsvResult] = useState(null);

      // ── Column header aliases (中英文 + 常見變體) ──
      const COL_ALIASES = {
        company: ["company", "公司", "外包公司", "廠商", "名稱", "公司名稱", "公司名"],
        contact: ["contact", "聯繫人", "窗口", "聯絡人", "姓名", "name", "負責人"],
        email: ["email", "e-mail", "信箱", "郵件", "mail", "電子郵件"],
        title: ["title", "職稱", "職位", "頭銜", "role"],
        channel: ["channel", "來源", "管道", "渠道", "source"],
        notes: ["notes", "備註", "note", "說明", "memo"],
        address: ["address", "地址", "addr"],
        phone: ["phone", "電話", "tel", "手機", "mobile"],
      };
      const findColIdx = (header, field) => header.findIndex((h) => COL_ALIASES[field]?.includes(h));

      const showCsvMsg = (ok, msg) => { setCsvResult({ ok, msg }); setTimeout(() => setCsvResult(null), 5000); };

      // ── Download sample CSV ──
      const downloadSampleCSV = (type) => {
        let content = "";
        if (type === "partner") {
          content = "公司,聯繫人,email,電話,地址,備註\n點石設計,王小明,wang@dianshi.com,02-2345-6789,台北市信義區信義路100號,UI/UX 設計合作夥伴\n光年科技,李大華,li@lightyear.tw,03-1234-5678,新竹市東區光復路200號,後端開發外包\n數位方舟,陳美玲,chen@ark.io,04-9876-5432,台中市西屯區市政路300號,行銷顧問公司";
        } else {
          content = "姓名,公司,職稱,來源,email,備註\n陳柏翰,旅遊新創 TripBuddy,Co-founder & CEO,LinkedIn,chen@tripbuddy.tw,對產品規格有興趣\n林雅婷,金融科技 FinFlow,Product Manager,AppWorks,lin@finflow.tw,AppWorks Demo Day 認識\n張凱文,健康科技 MedPlus,CTO,LinkedIn,chang@medplus.tw,已分享 PRD 文章";
        }
        const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = type === "partner" ? "外包夥伴_範例.csv" : "BD客戶_範例.csv";
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      };

      // ── Import partners from CSV ──
      const importPartnersFromCSV = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result;
          const lines = text.split(/\r?\n/).filter((l) => l.trim());
          if (lines.length < 2) { showCsvMsg(false, "CSV 檔案至少需要標題列 + 一筆資料"); return; }
          const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase().replace(/["""]/g, ""));
          const ci = findColIdx(header, "company");
          const coi = findColIdx(header, "contact");
          const ei = findColIdx(header, "email");
          const pi = findColIdx(header, "phone");
          const ai = findColIdx(header, "address");
          const ni = findColIdx(header, "notes");
          if (ci === -1) { showCsvMsg(false, "找不到「公司」欄位。請確認標題列包含：公司 / company / 廠商 / 名稱"); return; }
          const existingNames = new Set(partners.map((p) => p.company));
          let added = 0, skipped = 0;
          const newPartners = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            const company = cols[ci]?.trim();
            if (!company) continue;
            if (existingNames.has(company)) { skipped++; continue; }
            existingNames.add(company);
            newPartners.push({
              id: Date.now() + i, company,
              contact: coi >= 0 ? (cols[coi]?.trim() || "") : "",
              email: ei >= 0 ? (cols[ei]?.trim() || "") : "",
              phone: pi >= 0 ? (cols[pi]?.trim() || "") : "",
              address: ai >= 0 ? (cols[ai]?.trim() || "") : "",
              notes: ni >= 0 ? (cols[ni]?.trim() || "") : "",
              created: today(),
            });
            added++;
          }
          if (newPartners.length > 0) onPartnersChange([...partners, ...newPartners]);
          showCsvMsg(true, `匯入完成：新增 ${added} 筆外包夥伴${skipped > 0 ? `，略過 ${skipped} 筆重複` : ""}`);
        };
        reader.readAsText(file); e.target.value = "";
      };

      // ── Import BD leads from CSV ──
      const importLeadsFromCSV = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result;
          const lines = text.split(/\r?\n/).filter((l) => l.trim());
          if (lines.length < 2) { showCsvMsg(false, "CSV 檔案至少需要標題列 + 一筆資料"); return; }
          const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase().replace(/["""]/g, ""));
          const nameIdx = header.findIndex((h) => ["name", "姓名", "聯繫人", "窗口", "聯絡人", "負責人"].includes(h));
          const compIdx = findColIdx(header, "company");
          const titleIdx = findColIdx(header, "title");
          const chIdx = findColIdx(header, "channel");
          const emailIdx = findColIdx(header, "email");
          const notesIdx = findColIdx(header, "notes");
          if (nameIdx === -1 && compIdx === -1) { showCsvMsg(false, "找不到「姓名」或「公司」欄位。請確認標題列包含：姓名 / name / 公司 / company"); return; }
          const existingKeys = new Set((leads || []).map((l) => `${l.name}||${l.company}`));
          let added = 0, skipped = 0;
          const newLeads = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            const name = nameIdx >= 0 ? (cols[nameIdx]?.trim() || "") : "";
            const company = compIdx >= 0 ? (cols[compIdx]?.trim() || "") : "";
            if (!name && !company) continue;
            const key = `${name}||${company}`;
            if (existingKeys.has(key)) { skipped++; continue; }
            existingKeys.add(key);
            newLeads.push({
              name: name || "(未填)",
              company: company || "(未填)",
              title: titleIdx >= 0 ? (cols[titleIdx]?.trim() || "") : "",
              channel: chIdx >= 0 ? (cols[chIdx]?.trim() || "CSV 匯入") : "CSV 匯入",
              email: emailIdx >= 0 ? (cols[emailIdx]?.trim() || "") : "",
              notes: notesIdx >= 0 ? (cols[notesIdx]?.trim() || "") : "從 CSV 匯入",
              status: "identified",
              lastTouch: today(),
              role: "sophie",
              archived: false,
            });
            added++;
          }
          if (newLeads.length > 0 && typeof onLeadsImport === "function") onLeadsImport(newLeads);
          showCsvMsg(true, `匯入完成：新增 ${added} 筆 BD 對象${skipped > 0 ? `，略過 ${skipped} 筆重複` : ""}`);
        };
        reader.readAsText(file); e.target.value = "";
      };

      // ── Company profile editor ──
      const [showProfile, setShowProfile] = useState(false);
      const cp = companyProfile || {};
      const setCP = (k, v) => onCompanyProfileChange({ ...cp, [k]: v });
      const stampInputRef = useRef(null);
      const handleStampUpload = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        if (file.size > 500 * 1024) { alert("圖片大小不能超過 500KB"); return; }
        const reader = new FileReader();
        reader.onload = (ev) => setCP("stampImage", ev.target.result);
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      return (
        <div>
          {/* Company profile toggle */}
          <button onClick={() => setShowProfile(!showProfile)}
            style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", padding: "10px 14px", marginBottom: showProfile ? 0 : 14, borderRadius: showProfile ? "10px 10px 0 0" : 10, border: `1px solid ${C.border}`, borderBottom: showProfile ? "none" : `1px solid ${C.border}`, background: showProfile ? C.surface : "transparent", color: C.inkSoft, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: T, letterSpacing: ".04em" }}
            onMouseEnter={(e) => e.currentTarget.style.background = C.surface}
            onMouseLeave={(e) => { if (!showProfile) e.currentTarget.style.background = "transparent"; }}>
            <span style={{ transform: showProfile ? "rotate(90deg)" : "rotate(0)", transition: T, fontSize: 10 }}>▶</span>
            🏢 公司資訊 / 報價單署名設定
            <span style={{ flex: 1 }} />
            <span style={{ fontSize: 11, fontWeight: 400, color: C.inkMuted }}>{cp.name || "未設定"}</span>
          </button>
          {showProfile && (
            <div style={{ border: `1px solid ${C.border}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: 14, marginBottom: 14, background: C.surface }}>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px" }}>
                <Field label="公司 / 工作室名稱"><input style={inputStyle} value={cp.name || ""} onChange={(e) => setCP("name", e.target.value)} placeholder="輸入公司名稱" /></Field>
                <Field label="聯絡人（簽約代表）"><input style={inputStyle} value={cp.contact || ""} onChange={(e) => setCP("contact", e.target.value)} placeholder="負責人姓名" /></Field>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px" }}>
                <Field label="Email"><input style={inputStyle} type="email" value={cp.email || ""} onChange={(e) => setCP("email", e.target.value)} placeholder="email@example.com" /></Field>
                <Field label="電話"><input style={inputStyle} value={cp.phone || ""} onChange={(e) => setCP("phone", e.target.value)} placeholder="02-1234-5678" /></Field>
              </div>
              <Field label="地址"><input style={inputStyle} value={cp.address || ""} onChange={(e) => setCP("address", e.target.value)} placeholder="公司地址（選填，會顯示在報價單上）" /></Field>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: "0 14px" }}>
                <Field label="簽約方名稱（報價單底部簽名欄）"><input style={inputStyle} value={cp.signatory || ""} onChange={(e) => setCP("signatory", e.target.value)} placeholder="與公司名稱相同" /></Field>
                <Field label="網站"><input style={inputStyle} value={cp.website || ""} onChange={(e) => setCP("website", e.target.value)} placeholder="beyondspec.tw" /></Field>
              </div>
              <Field label="底部 Slogan"><input style={inputStyle} value={cp.slogan || ""} onChange={(e) => setCP("slogan", e.target.value)} placeholder="您的企業標語" /></Field>
              {/* Logo upload */}
              <Field label="系統 LOGO（顯示在頂部導航列）">
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  {cp.logoUrl ? (
                    <div style={{ position: "relative", display: "inline-block" }}>
                      <img src={cp.logoUrl} alt="LOGO" style={{ height: 40, borderRadius: 6, border: `1px solid ${C.border}` }} />
                      <button onClick={() => setCP("logoUrl", "")} style={{ position: "absolute", top: -6, right: -6, width: 18, height: 18, borderRadius: "50%", background: C.rose, color: "#fff", border: "none", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit" }}>×</button>
                    </div>
                  ) : null}
                  <input type="text" style={inputStyle} value={cp.logoUrl || ""} onChange={(e) => setCP("logoUrl", e.target.value)} placeholder="貼上 LOGO 圖片 URL（建議 PNG 透明背景）" />
                </div>
              </Field>
              {/* Stamp / seal upload */}
              <Field label="數位印章 / 簽章圖片">
                <input type="file" ref={stampInputRef} accept="image/png,image/jpeg,image/webp" onChange={handleStampUpload} style={{ display: "none" }} />
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  {cp.stampImage ? (
                    <div style={{ position: "relative", display: "inline-block" }}>
