              <div style={sectionLabel}>選擇未收款發票</div>
              {unpaidInvoices.length === 0
                ? <div style={{ fontSize: 13, color: C.inkMuted, textAlign: "center", padding: "8px 0" }}>目前沒有未收款發票，請改用手動輸入</div>
                : <select style={{ ...inputStyle, background: C.bg }} defaultValue="" onChange={e => handleInvoiceSelect(e.target.value)}>
                    <option value="" disabled>— 請選擇發票 —</option>
                    {unpaidInvoices.map(inv => {
                      const total = (inv.items || []).reduce((s, i) => s + (i.qty || 0) * (i.unitPrice || 0), 0) * (1 + (inv.tax || 0));
                      return <option key={inv.id} value={inv.id}>{inv.number} · {inv.client?.name} · NT$ {Math.round(total).toLocaleString()}</option>;
                    })}
                  </select>
              }
            </div>
          )}

          {/* 客戶選擇器 */}
          {mode === "from_contact" && (
            <div style={sectionStyle}>
              <div style={sectionLabel}>選擇客戶</div>
              {(contacts || []).length === 0
                ? <div style={{ fontSize: 13, color: C.inkMuted, textAlign: "center", padding: "8px 0" }}>目前沒有客戶資料，請改用手動輸入</div>
                : <select style={{ ...inputStyle, background: C.bg }} defaultValue="" onChange={e => handleContactSelect(e.target.value)}>
                    <option value="" disabled>— 請選擇客戶 —</option>
                    {(contacts || []).map(c => (
                      <option key={c.id} value={c.id}>{c.company || c.contact}{c.email ? ` · ${c.email}` : ""}</option>
                    ))}
                  </select>
              }
            </div>
          )}

          {/* 客戶資訊區塊 — 對齊 ContactForm 欄位 */}
          <div style={sectionStyle}>
            <div style={sectionLabel}>客戶資訊</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="公司名稱 *">
                <input type="text" style={inputStyle} value={local.clientName} onChange={e => setL("clientName", e.target.value)} placeholder="欠款公司名稱" />
              </Field>
              <Field label="聯絡人">
                <input type="text" style={inputStyle} value={local.contactName} onChange={e => setL("contactName", e.target.value)} placeholder="姓名" />
              </Field>
              <Field label="Email">
                <input type="email" style={inputStyle} value={local.contactEmail} onChange={e => setL("contactEmail", e.target.value)} placeholder="email@example.com" />
              </Field>
              <Field label="電話">
                <input type="text" style={inputStyle} value={local.contactPhone} onChange={e => setL("contactPhone", e.target.value)} placeholder="02-xxxx-xxxx" />
              </Field>
            </div>
          </div>

          {/* 帳款資訊 */}
          <div style={sectionStyle}>
            <div style={sectionLabel}>帳款資訊</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="發票 / 憑證編號">
                <input type="text" style={inputStyle} value={local.invoiceId} onChange={e => setL("invoiceId", e.target.value)} placeholder="INV-2026-001" />
              </Field>
              <Field label="應收總額 (NT$)">
                <input type="number" style={inputStyle} value={local.amount} onChange={e => setL("amount", e.target.value)} placeholder="0" min="0" />
              </Field>
              <Field label="原始約定付款日">
                <input type="date" style={inputStyle} value={local.dueDate} onChange={e => setL("dueDate", e.target.value)} />
              </Field>
              <Field label="備註">
                <input type="text" style={inputStyle} value={local.notes || ""} onChange={e => setL("notes", e.target.value)} placeholder="補充說明..." />
              </Field>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 4 }}>
            <Btn variant="ghost" onClick={onCancel}>取消</Btn>
            <Btn color={C.rose} onClick={saveObj}>建立催收案件</Btn>
          </div>
        </div>
      );
    };

    // ── AR Module Components ──
    const ArDashboard = ({ arCases, search, filter, onSelectCase, onSettings, arSettings }) => {
      const filtered = useMemo(() => {
        let res = arCases || [];
        if (filter !== "all") res = res.filter(c => c.status === filter);
        if (search) {
          const sq = search.toLowerCase();
          res = res.filter(c =>
            (c.clientName && c.clientName.toLowerCase().includes(sq)) ||
            (c.amount && c.amount.toString().includes(sq)) ||
            (c.invoiceId && c.invoiceId.toLowerCase().includes(sq)) ||
            (c.notes && c.notes.toLowerCase().includes(sq))
          );
        }
        return res;
      }, [arCases, search, filter]);

      const totalAmount = (arCases || []).reduce((sum, c) => sum + (c.status !== "resolved" ? (c.amount || 0) : 0), 0);
      const overdueAmount = (arCases || []).reduce((sum, c) => sum + (c.status && c.status.startsWith("overdue_") ? (c.amount || 0) : 0), 0);
      const unreadReplyCount = (arCases || []).filter(c => c.unreadReply === true).length;

      const dynamicAI = (c) => {
        const days = Math.floor((new Date() - new Date(c.dueDate)) / (1000 * 60 * 60 * 24));
        const sets = arSettings || { t1Days: 14, t2Days: 30 };
        return days > sets.t2Days ? { level: "high", text: "🔴 高度風險" }
          : days > sets.t1Days ? { level: "medium", text: "🟡 中度風險" }
            : { level: "low", text: "🟢 良好可控" };
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16, animation: "fadeIn 0.3s ease" }}>
          {/* AR Stats */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12, flex: 1 }}>
              <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: "16px 20px" }}>
                <div style={{ fontSize: 13, color: C.inkMuted, fontWeight: 600, letterSpacing: 1 }}>待收總額</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: C.ink, marginTop: 4 }}>NT$ {totalAmount.toLocaleString()}</div>
                  <div style={{ fontSize: 12, color: C.inkSoft }}>共 {(arCases || []).filter(c => c.status !== "resolved").length} 筆</div>
                </div>
              </div>
              <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.rose}40`, padding: "16px 20px" }}>
                <div style={{ fontSize: 13, color: C.rose, fontWeight: 600, letterSpacing: 1 }}>逾期催收</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: C.ink, marginTop: 4 }}>NT$ {overdueAmount.toLocaleString()}</div>
                  <div style={{ fontSize: 12, color: C.inkSoft }}>共 {(arCases || []).filter(c => c.status && c.status.startsWith("overdue_")).length} 筆</div>
                </div>
              </div>
              {unreadReplyCount > 0 && (
                <div className="castle-pulse" style={{ background: C.card, borderRadius: 12, border: `2px solid ${C.gold}60`, padding: "16px 20px", position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, ${C.gold}00, ${C.gold}80, ${C.gold}00)` }} />
                  <div style={{ fontSize: 13, color: C.gold, fontWeight: 600, letterSpacing: 1 }}>🔔 新客戶回覆</div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                    <div style={{ fontSize: 24, fontWeight: 800, color: C.ink, marginTop: 4 }}>{unreadReplyCount}</div>
                    <div style={{ fontSize: 12, color: C.inkSoft }}>件待查看</div>
                  </div>
                </div>
              )}
            </div>
            <button onClick={onSettings} style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: "transparent", color: C.inkMuted, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: T, display: "flex", alignItems: "center", gap: 6 }} onMouseEnter={(e) => { e.target.style.background = C.surface; e.target.style.color = C.ink; }} onMouseLeave={(e) => { e.target.style.background = "transparent"; e.target.style.color = C.inkMuted; }}>
              ⚙️ 催收規則設定
            </button>
          </div>

          {/* AR List */}
          <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1.1fr 1.3fr 80px", gap: 12, padding: "16px 20px", borderBottom: `1px solid ${C.borderHover}`, fontSize: 12, fontWeight: 700, color: C.inkMuted, letterSpacing: 1 }}>
              <div>案件 / 客戶</div>
              <div>金額</div>
              <div>約定日期</div>
              <div>狀態階段</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }} title="點擊以調整 T1/T2 判定天數">AI 風險分析 <span style={{ cursor: "pointer", background: C.surface, borderRadius: "50%", width: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }} onClick={onSettings}>❓</span></div>
              <div style={{ textAlign: "right" }}>操作</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column" }}>
              {filtered.length === 0 ? (
                <div style={{ padding: "40px 20px", textAlign: "center", color: C.inkMuted, fontSize: 14 }}>
                  該條件下沒有待收帳款記錄。
                </div>
              ) : (
                filtered.map((c, i) => {
                  const sObj = AR_STATUSES.find(s => s.id === c.status) || AR_STATUSES[0];
                  return (
                    <div key={c.id} style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1.1fr 1.3fr 80px", gap: 12, padding: "16px 20px", borderBottom: i < filtered.length - 1 ? `1px solid ${C.borderHover}` : "none", alignItems: "center", background: "transparent", transition: T }}
                      onMouseEnter={(e) => e.currentTarget.style.background = C.surface}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, display: "flex", alignItems: "center", gap: 6 }}>
                          {c.clientName}
                          {c.unreadReply && (
                            <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 11, fontWeight: 700, color: C.gold, background: `${C.gold}18`, border: `1px solid ${C.gold}40`, borderRadius: 6, padding: "2px 6px", animation: "pulseGlow 2s ease-in-out infinite" }}>
                              🔔 新回覆
                            </span>
                          )}
                        </div>
                        <div style={{ fontSize: 12, color: C.inkMuted, marginTop: 4 }}>發票: {c.invoiceId}</div>
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: C.ink }}>NT$ {(c.amount || 0).toLocaleString()}</div>
                      <div style={{ fontSize: 13, color: C.inkSoft }}>{c.dueDate}</div>
                      <div>
                        <span style={{ fontSize: 12, fontWeight: 600, color: sObj.color, background: `${sObj.color}15`, padding: "4px 8px", borderRadius: 6 }}>
                          {sObj.icon} {sObj.label}
                        </span>
                      </div>
                      <div>
                        {(() => {
                          const aiRisk = dynamicAI(c);
                          return (
                            <span style={{ fontSize: 12, color: aiRisk.level === "high" ? C.rose : aiRisk.level === "medium" ? C.gold : C.emerald, fontWeight: 600 }}>
                              {aiRisk.text}
                            </span>
                          );
                        })()}
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <Btn variant="ghost" size="sm" onClick={() => onSelectCase(c)}>詳情 ▸</Btn>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      );
    };

    // 催收階段對應的 Playbook 行動策略
    const PLAYBOOK_STAGE = {
      upcoming:   { title: "T0 預防提醒",  color: "#22D3EE", desc: "發票即將到期，主動友善提醒，防患未然。",           advice: "語氣：輕鬆友善，保護客戶關係" },
      overdue_t1: { title: "T1 溫和催收",  color: "#F5A623", desc: "逾期初期，以體諒語氣追蹤付款狀況。",             advice: "語氣：體諒理解，詢問是否有困難" },
      overdue_t2: { title: "T2 積極跟進",  color: "#FB923C", desc: "逾期超過 2 週，明確要求付款時程與書面承諾。",     advice: "語氣：堅定明確，要求具體還款日" },
      overdue_t3: { title: "T3 最後通牒",  color: "#F87171", desc: "逾期逾 1 個月，正式書面催告，預告法律行動。",    advice: "語氣：嚴正正式，說明後續法律後果" },
      legal:      { title: "⚖️ 法務程序",  color: "#A78BFA", desc: "進入法律追討，請配合存證信函或小額訴訟程序。",   advice: "行動：使用下方法務助手產生存證信函" },
      resolved:   { title: "✅ 已結案",    color: "#34D399", desc: "帳款已收回，案件圓滿結束。",                     advice: "案件已結案，無需發送催款通知" },
    };

    const ArDetailDrawer = ({ arCase, companyProfile, arSettings, emailTemplates, onClose, onUpdate, addLog, onSettings, workspaceId }) => {
      const [aiGenerating, setAiGenerating] = useState(false);
      const [generatedDraft, setGeneratedDraft] = useState(null);
      const [emailTemplate, setEmailTemplate] = useState("direct");
      // T-AR4: Auto-detect tone from case status
      useEffect(() => {
        if (!arCase) return;
        if (arCase.status === "upcoming" || arCase.status === "overdue_t1") setEmailTemplate("polite");
        else if (arCase.status === "overdue_t3" || arCase.status === "legal") setEmailTemplate("legal");
        else setEmailTemplate("direct");
      }, [arCase?.status]);
      const [pbRunning, setPbRunning] = useState(false);
      const [pbSent, setPbSent] = useState(false);
      const [pbError, setPbError] = useState(null);
      const { mobile } = useWindowSize();

      // 開啟 drawer 時自動清除「新回覆」未讀旗標
      useEffect(() => {
        if (arCase?.unreadReply) {
          onUpdate?.(arCase.id, { unreadReply: false });
        }
      }, [arCase?.id]);

      if (!arCase) return null;
      const sObj = AR_STATUSES.find(s => s.id === arCase.status);

      const handleAIAction = () => {
        setAiGenerating(true);
        setTimeout(() => {
          setAiGenerating(false);
          const stageMap = { "t1": "ar_upcoming", "t2": "ar_overdue_1", "t3": "ar_overdue_2", "legal": "ar_legal" };
          const stageKey = stageMap[arCase.aiStage] || "ar_upcoming";
          let baseDraft = emailTemplates?.find(t => t.id === stageKey)?.body || "";

          if (emailTemplate === "polite") {
            baseDraft = `親愛的 {{contact}} 您好，\n\n這是一封溫和的關懷信件。我們注意到您有一筆款項 NT$ {{amount}} (發票號碼：{{invoice}}) 於 {{dueDate}} 到期似乎尚未結清。\n\n若您這兩天已經安排匯款，煩請忽略此信，我們可能還在對帳中。若貴公司近期在資金週轉或流程上有任何需要協助的地方，也歡迎隨時與我們聯繫討論。\n\n👉 如需對帳或有任何疑問，請直接回覆此信件與我們的財務人員聯繫。\n\n祝商祺，\n{{company}} 敬上`;
          } else if (emailTemplate === "legal") {
            baseDraft = `【重要法務預告通知】\n\n致 {{contact}} 負責人/財務部門：\n\n本公司 {{company}} 依法通知，台端未付之款項新台幣 {{amount}} 元整 (憑證/發票：{{invoice}}，應付日期：{{dueDate}}) 至今已嚴重逾期。\n\n經多次善意提醒未果，為維護本公司權益，請務必於收到此信後 3 日內全額清償。否則本公司將不排除採取進一步法律行動 (包含但不限於寄發存證信函、聲請支付命令等)。請切勿自誤。\n\n👉 付款完畢請務必直接回覆本信件附上匯款單據。\n\n此致`;
          } else {
            // "direct" uses the configured baseDraft
            baseDraft += `\n\n👉 若您已付款或有任何疑問，請直接回覆本信件。`;
          }

          baseDraft = baseDraft.replace("{{company}}", companyProfile?.name || "本公司");
          baseDraft = baseDraft.replace(/{{contact}}/g, arCase.clientName || "客戶");
          baseDraft = baseDraft.replace(/{{invoice}}/g, arCase.invoiceId || "未知");
          baseDraft = baseDraft.replace(/{{amount}}/g, (arCase.amount || 0).toLocaleString());
          baseDraft = baseDraft.replace(/{{dueDate}}/g, arCase.dueDate || "未知");

          setGeneratedDraft(baseDraft);
        }, 1200);
      };


      const handleStartPlaybook = async () => {
        if (!generatedDraft) { alert("請先在上方生成 AI 草稿！"); return; }
        if (!arCase.contactEmail) { alert("此案件尚未填寫聯絡 Email，無法寄送。"); return; }
        setPbRunning(true);
        setPbError(null);
        const _wsId = workspaceId || "default";
        const subject = `【帳務通知】關於 ${arCase.invoiceId || arCase.clientName} 溝通事宜`;
        try {
          const res = await fetch("https://beyondspec.vercel.app/api/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              to: arCase.contactEmail,
              subject,
              body: generatedDraft,
              workspaceId: _wsId,
              caseId: String(arCase.id),
              fromName: companyProfile?.name || "帳務催收中心",
            }),
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.detail ? JSON.stringify(errData.detail) : `HTTP ${res.status}`);
          }
          const data = await res.json();
          setPbRunning(false);
          setPbSent(true);
          onUpdate(arCase.id, {
            history: [...(arCase.history || []), {
              date: new Date().toISOString().split("T")[0],
              action: `📧 催款通知已寄出 (Email)`,
              note: `SendGrid 寄出成功。AI 回覆監聽啟動，追蹤位址：${data.replyTo}`,
            }],
          });
          addLog?.("📧", "催款通知", `為 ${arCase.clientName} 發出催款信，AI 監聽啟動`, C.accent);
        } catch (err) {
          setPbRunning(false);
          setPbError(err.message || "寄送失敗，請稍後再試");
        }
      };

      const [legalWizardOpen, setLegalWizardOpen] = useState(false);
      const [legalStep, setLegalStep] = useState(0); // 0=資料填寫, 1=預覽草稿
      const [legalDraftText, setLegalDraftText] = useState(""); // editable draft for Step 2
      const [lawyerEmail, setLawyerEmail] = useState(""); // 律師 email for send
      const [legalForm, setLegalForm] = useState({
        senderAddress: companyProfile?.address || "",
        senderRepresentative: companyProfile?.representativeName || "",
        bankAccount: companyProfile?.bankAccount || "",
        recipientAddress: "",
        debtorRepresentative: "",
        debtorId: "",
        contractRef: arCase?.contractRef || "",
        penalty: "",
        extraNotes: ""
      });

      const generateLegalDraft = () => {
        const todayStr = new Date().toISOString().split("T")[0].replace(/-/g, "/");
        const historyText = (arCase.history || [])
          .map(h => `- ${h.date}: ${h.action} ${h.note ? `(${h.note})` : ""}`)
          .join("\n");
        const sender = companyProfile?.name || "本公司";
        const senderRep = legalForm.senderRepresentative ? `（代表人：${legalForm.senderRepresentative}）` : "";
        const debtorRep = legalForm.debtorRepresentative ? `（負責人：${legalForm.debtorRepresentative}）` : "";
        const debtorIdLine = legalForm.debtorId ? `統一編號/身分證：${legalForm.debtorId}` : "";
        const contractLine = legalForm.contractRef ? `合約/訂單編號：${legalForm.contractRef}` : "";
        const bankLine = legalForm.bankAccount ? `\n請匯款至：${legalForm.bankAccount}` : "";
        const overdueDays = arCase.dueDate
          ? Math.floor((new Date() - new Date(arCase.dueDate)) / 86400000)
          : 0;

        const cnNum = n => ["一","二","三","四","五","六","七","八","九","十"][n - 1] || String(n);
        let itemIdx = 3;
        let content =
`============================================================
存 證 信 函 草 稿
（供律師事務所審閱修潤後正式發文）
============================================================

寄件人：${sender}${senderRep}
地  址：${legalForm.senderAddress || "（請填入公司地址）"}

收件人：${arCase.clientName}${debtorRep}
地  址：${legalForm.recipientAddress || "（請填入債務人地址）"}
${debtorIdLine ? debtorIdLine + "\n" : ""}
發文日期：中華民國 ${todayStr}

------------------------------------------------------------
主  旨：催告台端清償積欠款項新臺幣 ${(arCase.amount || 0).toLocaleString()} 元整，請台端於期限內清償，否則本公司將依法追訴。

說  明：
一、 台端（${arCase.clientName}）與本公司（${sender}）因買賣/服務契約，台端應給付本公司新臺幣 ${(arCase.amount || 0).toLocaleString()} 元整，有發票號碼：${arCase.invoiceId}${contractLine ? "、" + contractLine : ""}為憑，約定付款日為 ${arCase.dueDate}。

二、 然迄今已逾約定付款期限 ${overdueDays > 0 ? overdueDays + " 天" : "數日"}，台端仍未依約清償，本公司已多次以書面、電子郵件催討（詳如後附歷程紀錄），台端均未予置理，顯已違約在先。`;

                  { id: "legal",  label: "法務警告", icon: "⚖️" },
                ];
                return (
                  <div style={{ background: `linear-gradient(135deg, ${C.surface}, ${C.bg})`, border: `2px solid ${C.accent}40`, borderRadius: 16, padding: 20, marginBottom: 24, position: "relative", overflow: "hidden" }}>
                    {/* Header */}
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
                      <span style={{ fontSize: 20, animation: "glow-pulse 2s infinite" }}>📬</span>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 800, color: C.ink }}>催款行動中心</div>
                        <div style={{ fontSize: 12, color: C.inkSoft }}>AI 診斷 → 生成草稿 → 確認寄出</div>
                      </div>
                    </div>

                    {/* ── STEP 1: AI 風險診斷 ── */}
                    <div style={{ marginBottom: 18 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                        <div style={{ width: 20, height: 20, borderRadius: "50%", background: `${riskColor}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>{riskIcon}</div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: C.inkMuted, letterSpacing: 0.5 }}>STEP 1 — AI 風險診斷</div>
                        <span style={{ fontSize: 10, color: C.accent, cursor: "pointer", marginLeft: "auto" }} onClick={onSettings} title="點擊修改 T1/T2 天數">⚙️ 設定</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px", borderRadius: 10, background: `${riskColor}10`, border: `1.5px solid ${riskColor}40` }}>
                        <div style={{ width: 4, borderRadius: 2, background: riskColor, alignSelf: "stretch", flexShrink: 0 }} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 800, color: riskColor, marginBottom: 3 }}>{riskIcon} {aiRisk.text}</div>
                          <div style={{ fontSize: 12, color: C.inkSoft }}>{stage.desc}</div>
                          <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 3 }}>💡 {stage.advice}</div>
                        </div>
                      </div>
                    </div>

                    {/* ── Legal / Resolved / Normal branches ── */}
                    {arCase.status === "legal" ? (
                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 0 }}>
                          <div style={{ width: 20, height: 20, borderRadius: "50%", background: `${C.violet}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>⚖️</div>
                          <div style={{ fontSize: 11, fontWeight: 700, color: C.inkMuted, letterSpacing: 0.5 }}>STEP 2 — 法務程序</div>
                        </div>
                        <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "14px 16px", borderRadius: 10, background: `${C.violet}10`, border: `1.5px solid ${C.violet}40` }}>
                          <span style={{ fontSize: 28 }}>⚖️</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: C.violet }}>進入法務程序模式</div>
                            <div style={{ fontSize: 12, color: C.inkSoft, marginTop: 3 }}>系統將協助你整理存證信函所需資料，並產出律師事務所可直接使用的完整案件包。</div>
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4, padding: "0 2px" }}>
                          {["① 點擊下方按鈕，開啟存證信函助手", "② 補充債務人地址、代表人等資訊", "③ 預覽草稿確認後，一鍵匯出律師案件包（.txt）", "④ 可選擇直接用信箱寄送至律師事務所"].map((step, i) => (
                            <div key={i} style={{ fontSize: 12, color: C.violet, fontWeight: 600, padding: "4px 0" }}>{step}</div>
                          ))}
                        </div>
                        <button onClick={() => { setLegalStep(0); setLegalWizardOpen(true); }}
                          style={{ width: "100%", padding: "14px", borderRadius: 10, border: `2px solid ${C.violet}`,
                            background: `linear-gradient(135deg, ${C.violet}20, ${C.violet}10)`,
                            color: C.violet, fontSize: 15, fontWeight: 800, cursor: "pointer",
                            display: "flex", justifyContent: "center", alignItems: "center", gap: 8, transition: T }}
                          onMouseEnter={e => e.currentTarget.style.background = `${C.violet}25`}
                          onMouseLeave={e => e.currentTarget.style.background = `linear-gradient(135deg, ${C.violet}20, ${C.violet}10)`}>
                          ⚖️ 開啟存證信函助手・整理律師案件包
                        </button>
                      </div>
                    ) : arCase.status === "resolved" ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderRadius: 8, background: `${C.emerald}10`, border: `1px solid ${C.emerald}40` }}>
                        <span style={{ fontSize: 16 }}>✅</span>
                        <div style={{ fontSize: 13, fontWeight: 700, color: C.emerald }}>案件已結案，無需發送催款通知</div>
                      </div>
                    ) : (
                      <>
                        {/* ── STEP 2: 草稿生成 ── */}
                        <div style={{ marginBottom: 16 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                            <div style={{ width: 20, height: 20, borderRadius: "50%", background: `${C.accent}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>📝</div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: C.inkMuted, letterSpacing: 0.5 }}>STEP 2 — 草稿生成</div>
                          </div>

                          {/* T-AR4: Tone pills (auto-selected from status, user can override) */}
                          {!generatedDraft && (
                            <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
                              {TONE_OPTIONS.map(t => (
                                <button key={t.id} onClick={() => setEmailTemplate(t.id)}
                                  style={{ padding: "5px 12px", borderRadius: 8, border: emailTemplate === t.id ? `2px solid ${C.accent}` : `1px solid ${C.border}`, background: emailTemplate === t.id ? `${C.accent}15` : C.surface, color: emailTemplate === t.id ? C.accent : C.inkMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", transition: T }}>
                                  {t.icon} {t.label}
                                </button>
                              ))}
                              <span style={{ fontSize: 10, color: C.inkMuted, alignSelf: "center", marginLeft: 4 }}>已依階段自動選取，可手動切換</span>
                            </div>
                          )}

                          {!generatedDraft ? (
                            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                              <button onClick={handleAIAction} style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: C.accent, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "center", alignItems: "center", gap: 8, transition: T }}>
                                {aiGenerating ? "⏳ 讀取範本引擎中..." : "✨ 展開生成 AI 草稿"}
                              </button>
                              {/* Legal wizard ONLY available in legal stage (方案A — 階段感設計) */}
                            </div>
                          ) : (
                            <div style={{ animation: "fadeIn .5s ease" }}>
                              <textarea value={generatedDraft} onChange={(e) => setGeneratedDraft(e.target.value)}
                                style={{ width: "100%", height: 180, padding: 12, background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.ink, fontSize: 13, lineHeight: 1.5, resize: "vertical", fontFamily: "inherit" }} />
                              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                                <button onClick={() => { navigator.clipboard?.writeText(generatedDraft); alert("已複製信件內容！"); }} style={{ padding: "6px 14px", borderRadius: 8, border: "none", background: C.emerald, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>📋 複製</button>
                                <button onClick={() => setGeneratedDraft(null)} style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${C.border}`, background: "transparent", color: C.inkMuted, fontSize: 12, cursor: "pointer" }}>↺ 重新生成</button>
                              </div>
                            </div>
                          )}
                        </div>

                        {/* ── STEP 3: 確認寄出 ── */}
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, opacity: generatedDraft ? 1 : 0.35 }}>
                            <div style={{ width: 20, height: 20, borderRadius: "50%", background: generatedDraft ? `${C.emerald}20` : `${C.inkMuted}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>📤</div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: C.inkMuted, letterSpacing: 0.5 }}>STEP 3 — 確認寄出</div>
                          </div>
                          {!pbSent ? (
                            <>
                              <button onClick={handleStartPlaybook} disabled={pbRunning || !canSend}
                                style={{ width: "100%", padding: "13px", borderRadius: 8, border: "none",
                                  background: !canSend ? `${C.inkMuted}40` : pbRunning ? C.inkMuted : C.accent,
                                  color: !canSend ? C.inkMuted : "#fff", fontSize: 14, fontWeight: 800,
                                  cursor: (!canSend || pbRunning) ? "not-allowed" : "pointer", transition: T,
                                  display: "flex", justifyContent: "center", alignItems: "center", gap: 8 }}>
                                {pbRunning ? "📤 寄送中，請稍候..." : !generatedDraft ? "請先完成 STEP 2 生成草稿" : "📤 確認寄出・啟動 AI 回覆監聽"}
                              </button>
                              {pbError && (
                                <div style={{ marginTop: 8, padding: "10px 14px", borderRadius: 8, background: `${C.rose}12`, border: `1px solid ${C.rose}40`, color: C.rose, fontSize: 12, fontWeight: 600 }}>
                                  ⚠️ 寄送失敗：{pbError}
                                </div>
                              )}
                            </>
                          ) : (
                            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderRadius: 8, background: `${C.emerald}10`, border: `1px solid ${C.emerald}40` }}>
                              <span style={{ fontSize: 16 }}>🟢</span>
                              <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: C.emerald }}>催款通知已發出・AI 監聽已啟動</div>
                              <button onClick={() => { setPbSent(false); setGeneratedDraft(null); setPbError(null); }}
                                style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, border: `1px solid ${C.emerald}40`, background: "transparent", color: C.emerald, cursor: "pointer", fontWeight: 600 }}>重新發送</button>
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                );
              })()}

              {/* History Timeline */}
              <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
                <h4 style={{ fontSize: 14, color: C.ink, fontWeight: 700, margin: 0 }}>📜 案件歷程</h4>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                {arCase.history && [...arCase.history].reverse().map((h, i) => (
                  <div key={i} style={{ display: "flex", gap: 16, position: "relative", paddingBottom: 24 }}>
                    {i !== arCase.history.length - 1 && <div style={{ position: "absolute", left: 7, top: 24, bottom: -8, width: 2, background: C.border }} />}
                    <div style={{ width: 16, height: 16, borderRadius: "50%", background: C.surface, border: `3px solid ${C.accent}`, flexShrink: 0, marginTop: 4, zIndex: 1 }} />
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>{h.action}</div>
                      <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 2 }}>{h.date}{h.time ? ` ${h.time}` : ""}</div>
                      {h.note && <div style={{ fontSize: 12, color: C.inkSoft, marginTop: 6, background: C.surface, padding: "8px 12px", borderRadius: 8 }}>{h.note}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* T-AR2 + T-AR3: Footer with pill status buttons (v2.87) */}
            <div style={{ padding: "14px 24px", borderTop: `1px solid ${C.border}`, background: C.card }}>
              <div style={{ fontSize: 11, color: C.inkMuted, fontWeight: 600, marginBottom: 8 }}>案件狀態</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {AR_STATUSES.map(s => (
                  <button key={s.id} onClick={() => onUpdate(arCase.id, { status: s.id })}
                    style={{ padding: "7px 12px", borderRadius: 10, border: arCase.status === s.id ? `2px solid ${s.color}` : `1px solid ${C.border}`, background: arCase.status === s.id ? `${s.color}15` : C.surface, color: arCase.status === s.id ? s.color : C.inkMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: T }}>
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Overlays — Legal Wizard (全螢幕 overlay，不再被 Drawer 限制) */}
            {legalWizardOpen && (
              <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", justifyContent: "center", alignItems: "center", padding: mobile ? 0 : 24 }}>
                <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)", animation: "fadeIn .2s ease" }} onClick={() => { setLegalWizardOpen(false); setLegalStep(0); }} />
                <div style={{ position: "relative", width: mobile ? "100%" : "min(720px, 92vw)", background: C.card, borderRadius: mobile ? 0 : 20, border: mobile ? "none" : `1px solid ${C.violet}30`, boxShadow: "0 32px 80px rgba(0,0,0,0.6)", display: "flex", flexDirection: "column", overflow: "hidden", animation: "scaleUp .3s cubic-bezier(.175, .885, .32, 1.275)", maxHeight: mobile ? "100%" : "92vh" }}>

                  {/* Modal Header — 更寬敞的 header */}
                  <div style={{ padding: "20px 28px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: `linear-gradient(135deg, ${C.violet}08, ${C.violet}04)` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 12, background: `${C.violet}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>⚖️</div>
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: C.ink, letterSpacing: "-.01em" }}>存證信函助手</div>
                        <div style={{ fontSize: 11, color: C.inkSoft, marginTop: 2 }}>整合催收紀錄，產出可直接送律師事務所的完整案件包</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      {/* Step indicator */}
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        {["資料填寫", "預覽確認"].map((label, i) => (
                          <React.Fragment key={i}>
                            {i > 0 && <div style={{ width: 20, height: 2, background: legalStep >= i ? C.violet : C.border, borderRadius: 1 }} />}
                            <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "5px 12px", borderRadius: 20,
                              background: legalStep === i ? `${C.violet}20` : "transparent",
                              border: legalStep === i ? `1.5px solid ${C.violet}` : `1px solid ${legalStep > i ? `${C.violet}40` : C.border}`,
                              fontSize: 11, fontWeight: legalStep === i ? 700 : 400,
                              color: legalStep === i ? C.violet : legalStep > i ? `${C.violet}90` : C.inkMuted }}>
                              <span style={{ width: 18, height: 18, borderRadius: "50%", background: legalStep >= i ? C.violet : C.border, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700 }}>
                                {legalStep > i ? "✓" : i + 1}
                              </span>
                              {label}
                            </div>
                          </React.Fragment>
                        ))}
                      </div>
                      <button onClick={() => { setLegalWizardOpen(false); setLegalStep(0); }} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.inkSoft, cursor: "pointer", fontSize: 16, padding: "6px 10px", borderRadius: 8, lineHeight: 1, transition: T }}>✕</button>
                    </div>
                  </div>

                  {/* Step 0: 資料填寫 */}
                  {legalStep === 0 && (
                    <div style={{ padding: mobile ? "20px 20px" : "28px 32px", overflowY: "auto", flex: 1, display: "flex", flexDirection: "column", gap: 0 }}>
                      {/* Auto-filled case summary — 案件資訊卡 */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 28, padding: "16px 20px", background: `linear-gradient(135deg, ${C.surface}, ${C.violet}06)`, borderRadius: 12, border: `1px solid ${C.border}` }}>
                        <div><div style={{ fontSize: 10, color: C.inkMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: ".08em" }}>債務人</div><div style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>{arCase.clientName}</div></div>
                        <div><div style={{ fontSize: 10, color: C.inkMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: ".08em" }}>欠款金額</div><div style={{ fontSize: 14, fontWeight: 700, color: C.rose }}>NT$ {(arCase.amount || 0).toLocaleString()}</div></div>
                        <div><div style={{ fontSize: 10, color: C.inkMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: ".08em" }}>催收歷程</div><div style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>{(arCase.history || []).length} 筆</div></div>
                      </div>

                      {/* Section: 債權人資訊 */}
                      <div style={{ marginBottom: 28 }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: C.violet, marginBottom: 16, display: "flex", alignItems: "center", gap: 8, paddingBottom: 8, borderBottom: `1px solid ${C.violet}15` }}>
                          <span style={{ width: 24, height: 24, borderRadius: 6, background: `${C.violet}12`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🏢</span>
                          債權人（你的公司）資訊
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: 16 }}>
                          <Field label="公司地址 *">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.violet} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.senderAddress} onChange={e => setLegalForm({ ...legalForm, senderAddress: e.target.value })} placeholder="台北市○○區○○路○號" />
                          </Field>
                          <Field label="代表人姓名 *">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.violet} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.senderRepresentative} onChange={e => setLegalForm({ ...legalForm, senderRepresentative: e.target.value })} placeholder="代表人/負責人姓名" />
                          </Field>
                          <Field label="收款銀行帳號（供存證信函載明）">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.violet} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.bankAccount} onChange={e => setLegalForm({ ...legalForm, bankAccount: e.target.value })} placeholder="例：中國信託 822-1234567890" />
                          </Field>
                          <Field label="合約/訂單編號">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.violet} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.contractRef} onChange={e => setLegalForm({ ...legalForm, contractRef: e.target.value })} placeholder="如有合約號可填入" />
                          </Field>
                        </div>
                      </div>

                      {/* Section: 債務人資訊 */}
                      <div style={{ marginBottom: 28 }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: C.rose, marginBottom: 16, display: "flex", alignItems: "center", gap: 8, paddingBottom: 8, borderBottom: `1px solid ${C.rose}15` }}>
                          <span style={{ width: 24, height: 24, borderRadius: 6, background: `${C.rose}12`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>👤</span>
                          債務人補充資訊
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: 16 }}>
                          <Field label="債務人登記地址 *">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.rose} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.recipientAddress} onChange={e => setLegalForm({ ...legalForm, recipientAddress: e.target.value })} placeholder="對方營業登記或聯絡地址" />
                          </Field>
                          <Field label="負責人/當事人姓名">
                            <input type="text" style={{ width: "100%", boxSizing: "border-box", padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontSize: 13, outline: "none", transition: T }}
                              onFocus={e => e.target.style.borderColor = C.rose} onBlur={e => e.target.style.borderColor = C.border}
                              value={legalForm.debtorRepresentative} onChange={e => setLegalForm({ ...legalForm, debtorRepresentative: e.target.value })} placeholder="公司負責人或個人姓名" />
                          </Field>
                          <Field label="統一編號 / 身分證字號">

    const WorkspaceMembers = ({ workspaceId }) => {
      const [members, setMembers] = useState([]);
      const [wsOwner, setWsOwner] = useState("");
      const [newEmail, setNewEmail] = useState("");
      const [inviteMsg, setInviteMsg] = useState(null);

      const normMember = (m) => typeof m === "string" ? { email: m, name: "", picture: "", roleId: null, joinedAt: "" } : m;

      useEffect(() => {
        if (!workspaceId) return;
        const unsub = db.collection("workspaces").doc(workspaceId).onSnapshot(snap => {
          if (snap.exists) {
            const data = snap.data();
            setMembers((data.members || []).map(normMember));
            setWsOwner(data.owner || "");
          }
        });
        return unsub;
      }, [workspaceId]);

      const memberEmails = members.map(m => m.email);

      const addMember = async () => {
        const email = newEmail.trim().toLowerCase();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setInviteMsg("⚠️ 請輸入有效的 Email 地址"); setTimeout(() => setInviteMsg(null), 3000); return; }
        if (memberEmails.includes(email)) { setInviteMsg("⚠️ 此成員已在工作台中"); setTimeout(() => setInviteMsg(null), 3000); return; }
        if (members.length >= 6) { setInviteMsg("⚠️ 工作台最多 6 位成員"); setTimeout(() => setInviteMsg(null), 3000); return; }
        try {
          const newMember = { email, name: "", picture: "", roleId: null, joinedAt: new Date().toISOString() };
          await db.collection("workspaces").doc(workspaceId).update({
            members: firebase.firestore.FieldValue.arrayUnion(newMember),
            memberEmails: firebase.firestore.FieldValue.arrayUnion(email)
          });
          setNewEmail("");
          setInviteMsg(`✅ 已邀請 ${email}！請傳送這個連結給對方：beyondspec.tw/business\n對方用此 Google 帳號登入即可看到共享資料。`);
          setTimeout(() => setInviteMsg(null), 8000);
        } catch (e) {
          console.error("Failed to add member:", e);
          setInviteMsg("❌ 邀請失敗：" + (e.message || "請重試"));
          setTimeout(() => setInviteMsg(null), 3000);
        }
      };

      const removeMember = async (email) => {
        if (members.length <= 1 || email === wsOwner) return;
        try {
          const newMembers = members.filter(m => m.email !== email);
          await db.collection("workspaces").doc(workspaceId).update({
            members: newMembers,
            memberEmails: firebase.firestore.FieldValue.arrayRemove(email)
          });
        } catch (e) {
          console.error("Failed to remove member:", e);
        }
      };

      return (
        <HoverCard style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <h3 style={{ color: C.ink, margin: 0, fontSize: 15, fontWeight: 700 }}>✉️ 邀請成員</h3>
            <span style={{ fontSize: 12, color: C.inkMuted, background: C.bg, padding: "3px 10px", borderRadius: 20 }}>{members.length}/6</span>
          </div>
          <p style={{ color: C.inkMuted, fontSize: 12, margin: "0 0 12px", lineHeight: 1.6 }}>
            輸入同事的 Google Email，對方登入後即可協作。加入後可在上方角色卡片指派身份。
          </p>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <input value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="name@gmail.com" onKeyDown={e => e.key === "Enter" && addMember()}
              style={{ flex: 1, padding: "9px 14px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.ink, fontSize: 13, outline: "none" }} />
            <button onClick={addMember} disabled={members.length >= 6} style={{ padding: "9px 18px", background: members.length >= 6 ? C.border : C.accent, color: "#fff", border: "none", borderRadius: 8, cursor: members.length >= 6 ? "not-allowed" : "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>+ 邀請</button>
          </div>
          {inviteMsg && (
            <div style={{ padding: "10px 14px", background: inviteMsg.startsWith("✅") ? "rgba(52,211,153,.12)" : inviteMsg.startsWith("⚠️") ? "rgba(251,191,36,.12)" : "rgba(244,63,94,.12)", borderRadius: 8, marginBottom: 10, fontSize: 12, color: C.ink, lineHeight: 1.6, whiteSpace: "pre-line" }}>
              {inviteMsg}
            </div>
          )}
          {/* Compact member list — no role dropdown (handled by RolesView above) */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {members.map((member) => {
              const isOwner = member.email === wsOwner;
              const isMe = member.email === _currentUser?.email;
              const displayName = member.name || member.email.split("@")[0];
              return (
                <div key={member.email} title={member.email} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 10px", background: C.bg, borderRadius: 20, border: `1px solid ${C.border}`, fontSize: 12, color: C.ink }}>
                  {member.picture ? (
                    <img src={member.picture} alt="" referrerPolicy="no-referrer" style={{ width: 20, height: 20, borderRadius: "50%", objectFit: "cover" }} onError={e => { e.target.style.display = "none"; }} />
                  ) : (
                    <div style={{ width: 20, height: 20, borderRadius: "50%", background: `hsl(${(member.email || "").charCodeAt(0) * 7 % 360}, 55%, 45%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{(member.email || "?")[0].toUpperCase()}</div>
                  )}
                  <span style={{ fontWeight: 500 }}>{displayName}</span>
                  {isOwner && <span style={{ fontSize: 10, color: C.gold }}>👑</span>}
                  {isMe && <span style={{ fontSize: 10, color: C.accent }}>(你)</span>}

                    <button onClick={() => removeMember(member.email)} title="移除成員" style={{ background: "transparent", border: "none", color: C.rose, cursor: "pointer", fontSize: 11, padding: 0, lineHeight: 1 }}>✕</button>
                  )}
                </div>
              );
            })}
          </div>
        </HoverCard>
      );

              </div>
            )}
            {tab === "contacts" && (
              <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", gap: 12, marginBottom: 20 }}>
                <SearchBar value={contactSearch} onChange={setContactSearch} placeholder="搜尋客戶..." />
                <FilterPills options={CONTACT_FILTERS} active={contactFilter} onSelect={setContactFilter} />
              </div>
            )}
            {tab === "meetings" && meetings.length > 0 && (
              <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", gap: 12, marginBottom: 20 }}>
                <SearchBar value={meetingSearch} onChange={setMeetingSearch} placeholder="搜尋會議..." />
              </div>
            )}
            {tab === "docs" && userDocs.length > 0 && (
              <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", gap: 12, marginBottom: 20 }}>
                <SearchBar value={docSearch} onChange={setDocSearch} placeholder="搜尋文件..." />
              </div>
            )}

            {/* Content — animated tab transitions */}
            <div key={tab} className="castle-tab-content">
              {tab === "pipeline" && <PipelineView deals={deals} roles={activeRoles} onArchive={archiveDeal} onUpdate={updateDeal} onStageChange={changeStage} expandedId={expandedDealId} onExpand={setExpandedDealId} emailTemplates={emailTemplates} onEmailTemplatesChange={setEmailTemplates} />}
              {tab === "tasks" && <TasksView tasks={tasks} deals={deals.filter((d) => !d.archived)} roles={activeRoles} onEdit={(t) => { setEditItem(t); setModal("editTask"); }} onArchive={archiveTask} onStatusChange={changeTaskStatus} search={taskSearch} filter={taskFilter} />}
              {tab === "bd" && <BDTrackerView leads={leads} roles={activeRoles} onEdit={(l) => { setEditItem(l); setModal("editLead"); }} onArchive={archiveLead} onConvert={convertLead} onStatusChange={changeLeadStatus} />}
              {tab === "proposals" && <ProposalsView proposals={proposals} deals={deals.filter((d) => !d.archived)} onAdd={() => setModal("addProposal")} onEdit={(p) => { setEditItem(p); setModal("editProposal"); }} onPreview={(p) => setPreviewProposal(p)} onDelete={deleteProposal} onStatusChange={changeProposalStatus} search={proposalSearch} filter={proposalFilter} />}
              {tab === "invoices" && <InvoicesView invoices={invoices} deals={deals.filter((d) => !d.archived)} proposals={proposals} onAdd={() => setModal("addInvoice")} onEdit={(inv) => { setEditItem(inv); setModal("editInvoice"); }} onStatusChange={changeInvoiceStatus} onDelete={deleteInvoice} search={invoiceSearch} filter={invoiceFilter} />}
              {tab === "ar" && <ArDashboard arCases={arCases} search={arSearch} filter={arFilter} onSelectCase={(c) => setActiveArCase(c)} onSettings={() => setModal("arSettings")} arSettings={arSettings} />}
              {tab === "contacts" && <ContactsView contacts={aggregatedContacts} deals={deals} proposals={proposals} invoices={invoices} leads={leads} manualContacts={manualContacts} arCases={arCases} onAddManual={() => setModal("addContact")} onEditManual={(c) => { setEditItem(c); setModal("editContact"); }} onDeleteManual={deleteManualContact} onImportCSV={importContactsCSV} search={contactSearch} filter={contactFilter} />}
              {tab === "meetings" && <MeetingsView meetings={meetings} deals={deals.filter((d) => !d.archived)} onAdd={() => setModal("addMeeting")} onEdit={(m) => { setEditItem(m); setModal("editMeeting"); }} onComplete={completeMeeting} onCreateTasks={createTasksFromMeeting} search={meetingSearch} />}
              {tab === "analytics" && <AnalyticsView deals={deals} roles={roles} goals={goals} onGoalsChange={setGoals} />}
              {tab === "docs" && <DocumentsView userDocs={userDocs} onAddDoc={addUserDoc} onDeleteDoc={deleteUserDoc} onEditDoc={editUserDoc} showAddForm={modal === "addDoc"} onCloseForm={() => setModal(null)} search={docSearch} />}
              {tab === "roles" && (<div>
                <RolesView roles={roles} onAdd={() => setModal("addRole")} onEdit={(r) => { setEditItem(r); setModal("editRole"); }} onArchive={archiveRole}
                  members={_wsMembers} onRoleAssign={_updateMemberRole} />
                {_currentWorkspaceId && <div style={{ marginTop: 20 }}><WorkspaceMembers workspaceId={_currentWorkspaceId} /></div>}
              </div>)}
            </div>
          </div>

          {/* Modals */}
          {modal === "addDeal" && <Modal title="新增案件" onClose={() => setModal(null)}><DealForm roles={activeRoles} allDeals={deals} onSave={addDeal} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editDeal" && editItem && <Modal title="編輯案件" onClose={() => { setModal(null); setEditItem(null); }}><DealForm deal={editItem} roles={activeRoles} allDeals={deals} onSave={updateDeal} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {modal === "addTask" && <Modal title="新增任務" onClose={() => setModal(null)}><TaskForm deals={deals.filter((d) => !d.archived)} roles={activeRoles} onSave={addTask} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editTask" && editItem && <Modal title="編輯任務" onClose={() => { setModal(null); setEditItem(null); }}><TaskForm task={editItem} deals={deals.filter((d) => !d.archived)} roles={activeRoles} onSave={updateTask} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {modal === "addLead" && <Modal title="新增 BD 對象" onClose={() => setModal(null)}><LeadForm roles={activeRoles} onSave={addLead} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editLead" && editItem && <Modal title="編輯 BD 對象" onClose={() => { setModal(null); setEditItem(null); }}><LeadForm lead={editItem} roles={activeRoles} onSave={updateLead} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {modal === "addRole" && <Modal title="新增角色" onClose={() => setModal(null)}><RoleForm onSave={addRole} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editRole" && editItem && <Modal title="編輯角色" onClose={() => { setModal(null); setEditItem(null); }}><RoleForm role={editItem} onSave={updateRole} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {modal === "addArCase" && <Modal title="💰 新增催收案件" onClose={() => setModal(null)}><ArCaseForm contacts={aggregatedContacts} invoices={invoices} onSave={addArCase} onCancel={() => setModal(null)} /></Modal>}
          {modal === "arSettings" && <Modal title="⚙️ 催收系統設定" onClose={() => setModal(null)}><ArSettingsForm settings={arSettings} emailTemplates={emailTemplates} onSave={(s, newTpls) => { setArSettings(s); setEmailTemplates(newTpls); setModal(null); addLog("⚙️", "更新設定", "催收階段規則與範本已更新", C.accent); }} onCancel={() => setModal(null)} /></Modal>}
          {/* P0: Proposal Modals */}
          {modal === "addProposal" && <Modal title="新增報價單" wide={780} onClose={() => setModal(null)}><ProposalForm deals={deals.filter((d) => !d.archived)} leads={leads} partners={partners} onPartnersChange={setPartners} onLeadsImport={(newLeads) => { const mapped = newLeads.map((l, i) => ({ ...l, id: nLead.current++ })); setLeads((p) => [...p, ...mapped]); addLog("📁", "CSV 匯入 BD", `新增 ${mapped.length} 筆`, C.violet); }} companyProfile={companyProfile} onCompanyProfileChange={setCompanyProfile} serviceTemplates={serviceTemplates} onServiceTemplatesChange={setServiceTemplates} noteTemplates={noteTemplates} onNoteTemplatesChange={setNoteTemplates} onSave={addProposal} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editProposal" && editItem && <Modal title="編輯報價單" wide={780} onClose={() => { setModal(null); setEditItem(null); }}><ProposalForm proposal={editItem} deals={deals.filter((d) => !d.archived)} leads={leads} partners={partners} onPartnersChange={setPartners} onLeadsImport={(newLeads) => { const mapped = newLeads.map((l, i) => ({ ...l, id: nLead.current++ })); setLeads((p) => [...p, ...mapped]); addLog("📁", "CSV 匯入 BD", `新增 ${mapped.length} 筆`, C.violet); }} companyProfile={companyProfile} onCompanyProfileChange={setCompanyProfile} serviceTemplates={serviceTemplates} onServiceTemplatesChange={setServiceTemplates} noteTemplates={noteTemplates} onNoteTemplatesChange={setNoteTemplates} onSave={updateProposal} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {/* P0: Invoice Modals */}
          {modal === "addInvoice" && <Modal title="新增發票" wide onClose={() => setModal(null)}><InvoiceForm deals={deals.filter((d) => !d.archived)} proposals={proposals} onSave={addInvoice} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editInvoice" && editItem && <Modal title="編輯發票" wide onClose={() => { setModal(null); setEditItem(null); }}><InvoiceForm invoice={editItem} deals={deals.filter((d) => !d.archived)} proposals={proposals} onSave={updateInvoice} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {/* P1: Meeting Modals */}
          {modal === "addContact" && <Modal title="新增客戶" onClose={() => setModal(null)}><ContactForm onSave={addManualContact} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editContact" && editItem && <Modal title="編輯客戶" onClose={() => { setModal(null); setEditItem(null); }}><ContactForm contact={editItem} onSave={editManualContact} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {modal === "addMeeting" && <Modal title="新增會議紀錄" wide onClose={() => setModal(null)}><MeetingForm deals={deals.filter((d) => !d.archived)} onSave={addMeeting} onCancel={() => setModal(null)} /></Modal>}
          {modal === "editMeeting" && editItem && <Modal title="編輯會議紀錄" wide onClose={() => { setModal(null); setEditItem(null); }}><MeetingForm meeting={editItem} deals={deals.filter((d) => !d.archived)} onSave={updateMeeting} onCancel={() => { setModal(null); setEditItem(null); }} /></Modal>}
          {/* Proposal Preview */}
          {previewProposal && <ProposalPreview proposal={previewProposal} companyProfile={companyProfile} onClose={() => setPreviewProposal(null)} />}

          {/* Confirm Modal */}
          {confirmAction && <ConfirmModal title={confirmAction.title} message={confirmAction.message} onConfirm={confirmAction.onConfirm} onCancel={() => setConfirmAction(null)} danger />}

          {/* Lost Reason Modal */}
          {lostReasonModal && <LostReasonModal dealName={lostReasonModal.dealName} onConfirm={confirmLostDeal} onCancel={() => setLostReasonModal(null)} />}

          {/* AR Detail Drawer */}
          {activeArCase && <ArDetailDrawer arCase={activeArCase} companyProfile={companyProfile} arSettings={arSettings} emailTemplates={emailTemplates} addLog={addLog} onClose={() => setActiveArCase(null)} onUpdate={updateArCase} onSettings={() => setModal("arSettings")} workspaceId={_currentWorkspaceId} />}

          {/* v2.5: Workspace Picker Modal — shown when user belongs to multiple workspaces */}
          {wsPicker && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.75)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 10001 }}>
              <div style={{ background: C.card, border: `1px solid ${C.borderHover}`, borderRadius: 18, padding: mobile ? 24 : 32, maxWidth: 520, width: "92%", animation: "drawerFadeIn .2s ease" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 24 }}>🏰</span>
                  <h3 style={{ color: C.ink, margin: 0, fontSize: 18, fontWeight: 800 }}>選擇工作台</h3>
                </div>
                <p style={{ color: C.inkMuted, fontSize: 13, lineHeight: 1.6, marginBottom: 20 }}>
                  你的帳號屬於多個工作台，請選擇要進入的工作台。每個工作台的案件、任務、文件等資料獨立管理。
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {wsPicker.workspaces.map((ws) => (
                    <button key={ws.id} onClick={() => activateWorkspace(ws.id, wsPicker.user)}
                      style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", background: C.surface, border: `1.5px solid ${ws.isOwner ? C.accent + "40" : C.border}`, borderRadius: 12, cursor: "pointer", textAlign: "left", transition: T, fontFamily: "inherit" }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.background = C.cardHover; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = ws.isOwner ? C.accent + "40" : C.border; e.currentTarget.style.background = C.surface; }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: ws.isOwner ? `${C.accent}20` : `${C.gold}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
                        {ws.isOwner ? "👑" : "👥"}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ws.name}</div>
                        <div style={{ fontSize: 12, color: C.inkMuted, marginTop: 2 }}>
                          {ws.isOwner ? "你是擁有者" : `擁有者：${ws.owner}`} · {ws.memberCount} 位成員
                        </div>
                      </div>
                      <span style={{ fontSize: 16, color: C.inkMuted }}>→</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Migration Modal */}
          {showMigration && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
              <div style={{ background: C.surface, borderRadius: 16, padding: 32, maxWidth: 480, width: "90%" }}>
                <h3 style={{ color: C.ink, margin: "0 0 12px" }}>📦 匯入本機資料</h3>
                <p style={{ color: C.inkMuted, fontSize: 14, lineHeight: 1.6 }}>
                  偵測到你的瀏覽器中有舊資料（客戶、報價、發票等）。要匯入到雲端工作台嗎？匯入後所有團隊成員都能看到這些資料。
                </p>
                <div style={{ display: "flex", gap: 12, marginTop: 20 }}>
                  <button onClick={() => { migrateLocalToFirestore(); setShowMigration(false); }} style={{ flex: 1, padding: "10px 0", background: C.accent, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600 }}>
                    匯入資料
                  </button>
                  <button onClick={() => setShowMigration(false)} style={{ flex: 1, padding: "10px 0", background: "transparent", color: C.inkMuted, border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer" }}>
                    從空白開始
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Login Help Modal */}
          {showLoginHelp && !user && <LoginHelpModal onClose={() => setShowLoginHelp(false)} mobile={mobile} onGoogleLogin={handleGoogleLogin} />}

          {/* Version Changelog */}
          <ChangelogModal open={changelogOpen} onClose={() => setChangelogOpen(false)} />

          {/* Undo Toast */}
          {toast && <UndoToast message={toast.message} onUndo={toast.undo ? () => { toast.undo(); setToast(null); } : null} onDismiss={() => setToast(null)} />}

          {/* Command Palette */}
          <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} onAction={handleCommand} deals={deals} tasks={tasks} leads={leads} proposals={proposals} invoices={invoices} meetings={meetings} roles={roles} userDocs={userDocs} />

          {/* Activity Log Sidebar */}
          <ActivityLog log={activityLog} open={logOpen} onClose={() => setLogOpen(false)} />

          {/* 🏰 Castle Parade — walks across footer */}
          <CastleParade />
          {/* 🎬 Story Stage — characters walk in, act out scenes, walk away */}
          <StoryStage />

          {/* Footer — pushed to bottom */}
          <div style={{ borderTop: `1px solid ${C.border}`, padding: mobile ? "14px 18px" : "18px 36px", textAlign: "center", marginTop: "auto", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 4, left: "50%", transform: "translateX(-50%)", opacity: 0.3 }}>
              <AmbientStars width={300} height={30} />
            </div>
            <span style={{ fontSize: 12, color: C.inkMuted, cursor: "pointer", transition: "color .2s", position: "relative", zIndex: 1 }} onClick={() => setChangelogOpen(true)} onMouseEnter={(e) => e.target.style.color = C.accent} onMouseLeave={(e) => e.target.style.color = C.inkMuted} title="點擊查看版本更新紀錄">{companyProfile?.name || "業務管理系統"} v{VERSION}</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CastleDashboard));
  </script>
</body>

</html>
