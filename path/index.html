.doc-template-box .dt-header button:hover{background:rgba(255,255,255,.15);color:#fff}
.doc-template-box pre{padding:20px;margin:0;font-size:13px;line-height:1.9;font-family:var(--font-mono,'SF Mono',monospace);color:rgba(255,255,255,.75);overflow-x:auto;overflow-y:auto;white-space:pre-wrap;max-height:340px}
.doc-template-box pre::-webkit-scrollbar{width:5px}
.doc-template-box pre::-webkit-scrollbar-track{background:transparent}
.doc-template-box pre::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.doc-template-box pre::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.3)}
.doc-template-box pre .hl{color:var(--primary)}
.doc-template-box pre .req-mark{color:var(--rose)}
.doc-template-box pre .comment{color:rgba(255,255,255,.3);font-style:italic}
.di-upload-zone{background:var(--primary-light);border:2px dashed rgba(124,92,252,.25);border-radius:16px;padding:28px 24px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.di-upload-zone:hover{border-color:var(--primary);background:rgba(124,92,252,.08);border-style:solid}
.di-upload-zone .uz-icon{margin-bottom:8px;opacity:.6;line-height:1;color:var(--primary)}
.di-upload-zone .uz-title{font-size:15px;font-weight:600;color:var(--ink)}
.di-upload-zone .uz-hint{font-size:13px;color:var(--ink-muted);margin-top:4px}
.di-btn-gold{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px 28px;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.2px;background:var(--primary);color:#fff;box-shadow:0 4px 20px var(--primary-glow);margin-top:20px}
.di-btn-gold:hover{background:var(--primary-hover);transform:translateY(-2px);box-shadow:0 8px 32px var(--primary-glow)}
.di-btn-gold:disabled{opacity:.35;cursor:not-allowed;transform:none}
.question-counter{font-size:var(--text-sm);color:var(--ink-muted);font-weight:600;margin-bottom:12px}
.question-text{font-size:var(--text-lg);font-weight:500;line-height:1.7;color:var(--ink);margin-bottom:24px}
.option-button{display:inline-flex;align-items:center;justify-content:center;min-width:52px;height:52px;padding:10px 20px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--bg-card);color:var(--ink-sec);font-weight:600;font-size:var(--text-base);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);font-family:inherit;margin:0 6px 10px 0}
.option-button:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);transform:translateY(-1px)}
.option-button:active{transform:translateY(0);box-shadow:none}
.options-row{display:flex;gap:6px;flex-wrap:wrap}
.options-column{display:flex;flex-direction:column;gap:8px}
.options-column .option-button{width:100%;justify-content:flex-start;text-align:left;padding:12px 20px;height:auto}
.back-nav{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink-muted);background:none;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.01em}
.back-nav:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.back-nav svg{width:16px;height:16px}

/* ===== LAB FORM (Problem 3) ===== */
.lab-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lab-form-grid .full-width{grid-column:1/-1}
.lab-section-divider{grid-column:1/-1;border-top:1px solid var(--border);padding-top:16px;margin-top:4px}
.lab-section-label{font-size:var(--text-sm);color:var(--primary);font-weight:600;margin-bottom:4px}

/* ===== CHIP GROUPS ===== */
.chip-group{display:flex;gap:8px;flex-wrap:wrap}

/* ===== LAB SELECT CARDS ===== */
.lab-step-section{margin-bottom:24px}
.lab-step-label{display:block;font-size:var(--text-sm);font-weight:700;color:var(--ink);margin-bottom:12px}
.lab-card-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.lab-select-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--r-lg);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s}
.lab-select-card:hover{border-color:var(--primary);box-shadow:var(--shadow-card);transform:translateY(-2px)}
.lab-select-card.active{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 1px var(--primary)}
.lab-select-card.sm{padding:16px 12px}
.lab-card-icon{color:var(--primary);margin-bottom:10px;display:flex;justify-content:center}
.lab-card-icon.sm{margin-bottom:6px}
.lab-card-icon svg{width:28px;height:28px}
.lab-card-title{font-size:var(--text-base);font-weight:700;color:var(--ink);margin-bottom:4px}
.lab-card-desc{font-size:var(--text-xs);color:var(--ink-muted)}
.lab-progress-steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:28px}
.lab-progress-dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:all .2s}
.lab-progress-dot.done{background:var(--primary)}
.lab-progress-dot.active{background:var(--primary);box-shadow:0 0 0 4px var(--primary-light)}
.lab-progress-line{width:40px;height:2px;background:var(--border);transition:all .2s}
.lab-progress-line.done{background:var(--primary)}

/* ===== FORM INPUTS ===== */
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg-input);color:var(--ink);font-size:var(--text-base);font-family:inherit;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.form-input::placeholder{color:var(--ink-placeholder)}

/* ===== SETTINGS PAGE (Problem 5) ===== */
.settings-section{margin-bottom:8px}
.settings-section-title{font-size:var(--text-sm);font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-label{font-size:var(--text-base);font-weight:600;color:var(--ink)}
.settings-value{font-size:var(--text-sm);color:var(--ink-muted);margin-top:4px}
.divider{height:0;margin:20px 0}
.btn-small{padding:6px 14px;font-size:var(--text-xs)}
.status-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);margin-right:6px}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pricing-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;text-align:center;transition:all .2s}
.pricing-card:hover{box-shadow:var(--shadow-lg)}
.pricing-card.highlighted{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.pricing-name{font-size:var(--text-lg);font-weight:700;color:var(--ink);margin-bottom:8px}
.pricing-price{font-size:var(--text-2xl);font-weight:800;color:var(--primary);margin-bottom:16px}
.pricing-features{list-style:none;text-align:left;margin-bottom:20px}
.pricing-features li{padding:6px 0;font-size:var(--text-sm);color:var(--ink-sec);border-bottom:1px solid var(--border)}
.pricing-features li:last-child{border:none}
.pricing-features li::before{content:'✓ ';color:var(--primary);font-weight:700}

/* Enhanced interactive feedback */
.btn { position: relative; overflow: hidden; }
.btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.2s; }
.btn:active::after { background: rgba(0,0,0,.05); }

/* Smoother card interactions */
.aside-card { transition: all .25s cubic-bezier(.4,0,.2,1); }
.aside-card:hover { box-shadow: var(--shadow-lg); }

/* Better focus states for accessibility */
.btn:focus-visible, .nav-item:focus-visible, .chip:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* Stat card number animation */
.stat-value { transition: transform 0.2s; }
.stat-card:hover .stat-value { transform: scale(1.05); }

  /* ===== LAB MODULE CSS ===== */
  /* Gold → Purple color mapping for dashboard integration */
  /* Lab uses these variables internally; we map them to the app's purple theme */
  #labContainer {
    --gold: var(--primary);
    --gold-light: var(--primary-hover);
    --gold-soft: var(--primary-light);
    --gold-med: rgba(124,92,252,.14);
    --gold-glow: var(--primary-glow);
    --ink-soft: var(--ink-sec);
    --ink-dim: var(--ink-muted);
    --bg: var(--bg-app);
    --bg-warm: var(--bg-hover);
    --border-s: var(--border);
    --shadow-s: var(--shadow-sm);
    --shadow-m: var(--shadow-card);
    --shadow-l: var(--shadow-xl);
    --r: 20px;
    --r-pill: 100px;
    --ease: cubic-bezier(.16,1,.3,1);
    --font-display: 'Inter', -apple-system, sans-serif;
    --font-body: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --amber: #F0A05A;
    --violet: var(--primary);
  }

/* ===== HEADER ===== */
#labContainer .header{
  padding: clamp(24px, 4vw, 40px) clamp(20px, 4vw, 48px) clamp(20px, 3vw, 32px);
  text-align: center;
  position: relative;
}
#labContainer .header::after{
  content:'';display:block;width:60px;height:1px;background:var(--primary);opacity:.2;margin:20px auto 0;
}
#labContainer .header .breadcrumb{
  font-size:13px; color: var(--ink-dim); margin-bottom: 12px; letter-spacing: .5px;
}
#labContainer .header .breadcrumb a{ color: var(--primary); text-decoration: none; }
#labContainer .header .breadcrumb a:hover{ text-decoration: underline; }
#labContainer .header h1{
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.3px;
}
#labContainer .header h1 span{ color: var(--primary); }
#labContainer .header .subtitle{
  font-size: 14px; color: var(--ink-muted); margin-top: 6px;
  font-weight: 450;
  max-width: 520px; margin-left: auto; margin-right: auto;
}
#labContainer .header .badge{
  display: inline-block;
  background: var(--primary-light);
  border: 1px solid var(--primary-light);
  color: var(--primary);
  font-size:13px; font-weight: 600;
  padding: 4px 14px; border-radius: var(--r-pill);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 10px;
}

/* ===== LAYOUT ===== */
#labContainer .wrap{ max-width: 760px; margin: 0 auto; padding: 0 clamp(16px, 4vw, 32px) 80px; }

/* ===== CARD ===== */
#labContainer .card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 28px 24px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  text-align: left;
}
#labContainer .card:hover{ box-shadow: var(--shadow-lg); }
#labContainer .card-header{
  display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px;
  text-align: left;
}
#labContainer .card-icon{
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  background: var(--primary-light); border: none;
}
#labContainer .card-header h2{
  font-size: 18px; font-weight: 700; letter-spacing: -.2px; margin: 2px 0 0;
}
#labContainer .card-header .step-label{
  font-size:13px; color: var(--primary); font-weight: 600;
  letter-spacing: .5px; text-align: left;
}
#labContainer .card .desc{
  font-size: 14px; color: var(--ink-muted); margin-bottom: 24px; line-height: 1.7; text-align: left;
}

/* ===== FORM ===== */
#labContainer label{
  display: block; font-size: 14px; font-weight: 700; color: var(--ink); margin: 16px 0 6px; letter-spacing: .01em;
}
#labContainer label:first-of-type{ margin-top: 0; }
#labContainer .req{ color: var(--rose); }
#labContainer input, #labContainer textarea, #labContainer select{
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border-s); border-radius: var(--r-sm);
  padding: 13px 16px; color: var(--ink);
  font-size: 15px; font-family: var(--font-body);
  outline: none; transition: all .2s;
}
#labContainer input:focus, #labContainer textarea:focus, #labContainer select:focus{
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
#labContainer textarea{ resize: vertical; min-height: 72px; }

/* ===== CHIPS ===== */
#labContainer .chip-row{ display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
#labContainer .chip{
  padding: 10px 20px; border-radius: 24px;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border-s);
  background: var(--bg-card);
  transition: all .25s cubic-bezier(.4,0,.2,1);
  user-select: none; -webkit-user-select: none;
  outline: none; -webkit-tap-highlight-color: transparent;
}
#labContainer .chip:hover{ border-color: var(--primary); color: var(--primary); }
#labContainer .chip.sel{
  background: var(--primary); border-color: var(--primary); color: #fff;
  box-shadow: 0 2px 12px rgba(124,92,252,.2);
  font-weight: 600;
}
.age-chip-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.age-chip-label{font-size:12px;color:var(--ink-muted);opacity:.7;font-weight:400;white-space:nowrap}

/* ===== BUTTONS ===== */
#labContainer .btn{
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 28px; border: none; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 600; font-family: var(--font-body);
  cursor: pointer; transition: all .25s cubic-bezier(.4,0,.2,1);
  letter-spacing: .2px;
}
#labContainer .btn-primary{
  background: var(--primary); color: #fff;
  box-shadow: 0 4px 20px rgba(124,92,252,.2);
}
#labContainer .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,92,252,.25); }
#labContainer .btn-primary:disabled{ opacity: .35; cursor: not-allowed; transform: none; }
#labContainer .btn-gold{
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
#labContainer .btn-gold:hover{ background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 32px var(--primary-glow); }
#labContainer .btn-ghost{
  background: transparent; color: var(--ink-soft);
  border: 1.5px solid var(--border-s);
  padding: 12px 24px;
}
#labContainer .btn-ghost:hover{ border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
#labContainer .btn-row{ display: flex; gap: 12px; margin-top: 32px; justify-content: flex-end; flex-wrap: wrap; padding-top: 20px; border-top: 1px solid var(--border); }

/* ===== UPLOAD ===== */
#labContainer .upload-zone{
  background: var(--primary-light);
  border: 2px dashed rgba(124,92,252,.25);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
}
#labContainer .upload-zone:hover{ border-color: var(--primary); background: rgba(124,92,252,.08); border-style: solid; }
#labContainer .upload-zone .uz-icon{ margin-bottom: 8px; opacity: .6; line-height: 1; color: var(--primary); }
#labContainer .upload-zone .uz-title{ font-size: 15px; font-weight: 600; color: var(--ink); }
#labContainer .upload-zone .uz-hint{ font-size:13px; color: var(--ink-muted); margin-top: 4px; }

#labContainer .file-preview{
  background: var(--bg);
  border: 1.5px solid var(--border-s);
  border-radius: var(--r-sm);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  transition: border-color .2s;
}
#labContainer .file-preview:hover{ border-color: var(--primary-light); }
#labContainer .file-preview .fp-icon{
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--primary-light); border: 1px solid var(--primary-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--primary);
}
#labContainer .file-preview .fp-name{ font-size: 14px; font-weight: 600; color: var(--ink); }
#labContainer .file-preview .fp-meta{ font-size:13px; color: var(--ink-dim); margin-top: 1px; }

/* ===== TEMPLATE DISPLAY ===== */
#labContainer .template-box{
  background: #1A1A2E;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 12px;
}
#labContainer .template-box .tb-header{
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: rgba(255,255,255,.05);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
#labContainer .template-box .tb-header span{
  font-size:13px; font-family: var(--font-mono); color: rgba(255,255,255,.5);
}
#labContainer .template-box pre{
  padding: 20px; margin: 0;
  font-size:13px; line-height: 1.9;
  font-family: var(--font-mono);
  color: rgba(255,255,255,.75);
  overflow-x: auto;
  white-space: pre-wrap;
}
#labContainer .template-box pre .hl{ color: var(--primary); }
#labContainer .template-box pre .req-mark{ color: var(--rose); }
#labContainer .template-box pre .comment{ color: rgba(255,255,255,.3); font-style: italic; }

/* ===== CALIBRATION SLIDERS — 重設計 ===== */
#labContainer .cal-group{ margin-bottom: 28px; }
#labContainer .cal-group h3{
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
#labContainer .cal-group h3 svg{ opacity: .55; flex-shrink: 0; }
#labContainer .cal-group .cg-desc{ font-size:13px; color: var(--ink-muted); margin-bottom: 14px; line-height: 1.5; }

#labContainer .slider-card{
  display: grid;
  grid-template-columns: 10px 1fr;
  align-items: start;
  gap: 0 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 8px;
  transition: border-color .25s, box-shadow .25s;
  position: relative;
  overflow: hidden;
}
#labContainer .slider-card:hover{
  border-color: rgba(124,92,252,.4);
  box-shadow: 0 2px 12px rgba(124,92,252,.06);
}
#labContainer .sc-dot{
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--border-s);
  margin-top: 4px; background: var(--bg);
  transition: all .2s;
  flex-shrink: 0;
}
#labContainer .slider-card:hover .sc-dot{ border-color: var(--primary); background: var(--primary-light); }

#labContainer .slider-card .sc-body{ min-width: 0; }
#labContainer .slider-card .sc-top{ display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
#labContainer .slider-card .sc-label{ font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
#labContainer .slider-card .sc-hint{ font-size:13px; color: var(--ink-dim); margin-bottom: 10px; line-height: 1.5; }

/* track 區 */
#labContainer .sc-track-row{ display: flex; align-items: center; gap: 10px; }
#labContainer .sc-track-wrap{ flex: 1; position: relative; height: 20px; display: flex; align-items: center; }
#labContainer .sc-track-bg{
  width: 100%; height: 3px; border-radius: 2px;
  background: var(--border-s); position: relative;
}
#labContainer .sc-track-fill{
  position: absolute; left: 0; top: 0; height: 100%;
  border-radius: 2px;
  background: var(--primary);
  transition: width .12s;
  pointer-events: none;
}
#labContainer .sc-thumb{
  position: absolute; width: 14px; height: 14px; border-radius: 50%;
  background: var(--primary); border: 2.5px solid var(--bg-card);
  box-shadow: 0 1px 6px rgba(124,92,252,.5);
  transform: translateX(-50%);
  pointer-events: none; top: 50%; margin-top: -7px;
  transition: left .12s;
}
#labContainer input[type=range].sc-input{
  position: absolute; inset: 0;
  -webkit-appearance: none; width: 100%;
  opacity: 0; cursor: pointer; height: 100%;
  margin: 0; z-index: 2;
}
#labContainer .sc-val{
  font-size: 13px; font-weight: 700;
  font-family: var(--font-mono);
  min-width: 36px; text-align: right;
  color: var(--primary);
}

/* conf-badge */
#labContainer .conf-badge{
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px 7px; border-radius: 4px;
  font-size:13px; font-weight: 700; letter-spacing: .3px;
  white-space: nowrap; flex-shrink: 0;
}
#labContainer .conf-high{ background: rgba(10,143,108,.08); color: var(--teal); }
#labContainer .conf-med{ background: rgba(196,132,29,.08); color: var(--amber); }
#labContainer .conf-low{ background: rgba(201,61,84,.08);  color: var(--rose);  }

/* ===== REGION CARDS ===== */
#labContainer .region-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
#labContainer .region-card{
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all .2s ease;
  display: flex; align-items: center; gap: 10px;
  user-select: none; -webkit-user-select: none; outline: none; -webkit-tap-highlight-color: transparent;
}
#labContainer .region-card:hover{ border-color: var(--primary); background: var(--primary-light); }
#labContainer .region-card.sel{ border-color: var(--primary); background: var(--primary-light); }
#labContainer .region-card .r-flag{ font-size: 20px; flex-shrink: 0; line-height: 1; }
#labContainer .region-card .r-name{ font-size: 13px; font-weight: 700; color: var(--ink); }
#labContainer .region-card .r-sub{ font-size:13px; color: var(--ink-dim); }
#labContainer .region-card .r-check{
  margin-left: auto; flex-shrink: 0;
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border-s);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#labContainer .region-card.sel .r-check{ background: var(--primary); border-color: var(--primary); }
#labContainer .region-card.sel .r-name{ color: var(--primary); }

#labContainer .sr-chip{
  padding: 8px 16px; border-radius: var(--r-sm);
  font-size:13px; cursor: pointer;
  border: 1.5px solid var(--border-s);
  background: var(--bg-card);
  transition: all .25s cubic-bezier(.4,0,.2,1);
  user-select: none; -webkit-user-select: none; outline: none; -webkit-tap-highlight-color: transparent;
}
#labContainer .sr-chip:hover{ border-color: var(--primary); }
#labContainer .sr-chip.sel{ background: var(--primary); border-color: var(--primary); color: #fff; }

/* ===== PROGRESS ===== */
#labContainer .prog-wrap{ margin: 20px 0; }
#labContainer .prog-top{ display: flex; justify-content: space-between; font-size:13px; color: var(--ink-dim); margin-bottom: 6px; }
#labContainer .prog-bar{ height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
#labContainer .prog-fill{
  height: 100%; border-radius: 2px; transition: width .4s cubic-bezier(.16,1,.3,1);
  background: var(--primary);
  position: relative; overflow: hidden;
}
#labContainer .prog-fill::after{
  content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background: rgba(255,255,255,.25);
  animation: progShine 1.5s infinite;
}
@keyframes progShine { to { left: 100%; } }
@keyframes pulse { 0%,100%{box-shadow:0 4px 20px var(--primary-glow)} 50%{box-shadow:0 4px 32px var(--primary-glow),0 0 0 8px rgba(124,92,252,.1)} }

/* ===== PERSONA MINI CARDS ===== */
.persona-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
#labContainer .persona-mini{
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 14px; font-size:13px;
}
#labContainer .persona-mini .pm-name{ font-weight: 700; font-size: 14px; margin-bottom: 2px; display:flex; align-items:center; gap:7px; }
#labContainer .pm-initial{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--primary-light); border:1px solid var(--primary-light); color:var(--primary); font-size:13px; font-weight:700; flex-shrink:0; }
#labContainer .persona-mini .pm-demo{ color: var(--ink-dim); font-size:13px; }
#labContainer .persona-mini .pm-tags{ display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
#labContainer .persona-mini .pm-tag{
  background: var(--bg-warm); padding: 2px 8px; border-radius: 4px;
  font-size:13px; color: var(--ink-dim);
}

/* ===== RESEARCH LOG ===== */
#labContainer .log-area{
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  max-height: 360px; overflow-y: auto;
  padding: 16px;
  transition: max-height .3s ease;
}
#labContainer .log-area.expanded{ max-height: none; }
#labContainer .log-expand-btn{
  display: block; width: 100%; padding: 8px;
  background: var(--bg-warm); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--r-sm) var(--r-sm);
  font-size:13px; color: var(--ink-dim); cursor: pointer;
  text-align: center; transition: color .2s;
}
#labContainer .log-expand-btn:hover{ color: var(--primary); }
#labContainer .log-entry{ padding: 12px 0; border-bottom: 1px solid var(--border); }
#labContainer .log-entry:last-child{ border: none; }
/* Chat bubble style for interview log */
#labContainer .log-persona-header{
  font-size:13px; padding: 8px 0 4px; color: var(--ink);
  border-top: 1px solid var(--border); margin-top: 4px;
}
#labContainer .log-persona-header:first-child{ border-top: none; margin-top: 0; }
#labContainer .log-chat{ padding: 4px 0; }
#labContainer .log-chat-q{
  font-size:13px; color: var(--primary); font-weight: 600;
  margin-bottom: 3px; padding-left: 12px;
  border-left: 2px solid var(--primary-light);
}
#labContainer .log-chat-a{
  font-size:13px; color: var(--ink-soft); line-height: 1.7;
  padding-left: 12px; margin-bottom: 6px;
}
#labContainer .log-chat-followup .log-chat-q{ border-left-color: var(--violet); }
#labContainer .log-chat-followup .log-chat-a{ color: var(--ink-dim); font-style: italic; }
#labContainer .log-q{ font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 4px; display:flex; align-items:center; gap:7px; }
#labContainer .log-q-icon{ display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:4px; background:rgba(124,92,252,.15); color:var(--primary); font-size:13px; font-weight:800; letter-spacing:.3px; flex-shrink:0; }
#labContainer .log-a{ font-size: 13px; color: var(--ink); line-height: 1.8; }
#labContainer .log-tags{ display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
#labContainer .ltag{ font-size:13px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
#labContainer .ltag-quant{ background: rgba(108,75,219,.08); color: var(--violet); }
#labContainer .ltag-qual{ background: var(--primary-light); color: var(--primary); }
#labContainer .ltag-culture{ background: rgba(196,132,29,.08); color: var(--amber); }

/* ===== RESULTS ===== */
#labContainer .metrics-row{ display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
#labContainer .metric-card{
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 18px; text-align: center;
}
#labContainer .metric-card .mc-val{ font-size: 32px; font-weight: 800; font-family: var(--font-display); line-height: 1; }
#labContainer .metric-card .mc-label{ font-size:13px; color: var(--ink-dim); margin-top: 4px; }
#labContainer .metric-card .mc-conf{ font-size:13px; margin-top: 2px; }

/* (Legacy cross-tbl removed — no longer used) */

   REPORT PAGE — Full Redesign
   ═══════════════════════════════════════════ */

/* ── Hero ── */

  margin-bottom: 16px;
}
#labContainer .rpt-hero-meta{
  display: flex; align-items: center; gap: 8px;

  width: 6px; height: 6px; border-radius: 50%;

}
#labContainer .rpt-hero-product{
  font-family: var(--font-display);

/* ── Summary ── */
#labContainer .rpt-summary{

#labContainer .rd-score{

/* ── Qual voices ── */

#labContainer .rv-avatar{

}
#labContainer .rv-name{ font-size: 13px; font-weight: 700; color: var(--ink); }
#labContainer .rv-tag{

}
#labContainer .tc-a{
  font-size:13px; color: var(--ink-soft); line-height: 1.7;
  padding-left: 10px;
}
#labContainer .tc-followup .tc-q{ color: var(--violet); border-left-color: rgba(108,75,219,.3); font-size:13px; }
#labContainer .tc-followup .tc-a{ font-style: italic; color: var(--ink-dim); font-size:13px; }

/* ── Verdict ── */
#labContainer .rpt-verdict{
  background: var(--primary-light);
  border: 1px solid rgba(124,92,252,.12);
  border-radius: var(--r);
  padding: 28px 28px;
  margin-bottom: 16px;
  text-align: center;
  position: relative; overflow: hidden;
}
#labContainer .rpt-verdict::before{
  content:''; position: absolute; top:0; left:50%; transform: translateX(-50%);
  width: 60px; height: 3px; border-radius: 2px;
  background: var(--primary);
}
#labContainer .rpt-verdict .rv-label{
  font-size:13px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--primary); margin-bottom: 10px;
}
#labContainer .rpt-verdict .rv-text{
  font-family: var(--font-display);
  font-size: clamp(17px, 3vw, 21px); font-weight: 700;
  color: var(--ink); line-height: 1.5;
}
#labContainer .rpt-verdict .rv-sub{
  font-size: 14px; color: var(--ink-soft); margin-top: 10px; line-height: 1.7;
  max-width: 560px; margin-left: auto; margin-right: auto;
}

/* ── AI Summary dots ── */
#labContainer .ai-sum-dot{
  width: 6px; height: 6px; background: var(--primary); border-radius: 50%;
  animation: aiSumPulse 1.4s ease infinite;
}
#labContainer .ai-sum-dot:nth-child(2){ animation-delay: .2s; }
#labContainer .ai-sum-dot:nth-child(3){ animation-delay: .4s; }
@keyframes aiSumPulse {
  0%, 80%, 100% { opacity: .3; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Upsell ── */
#labContainer .rpt-upsell{
  display: flex; align-items: center; gap: 16px;
  background: rgba(124,92,252,.06);
  border: 1px solid var(--primary-light);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 16px;
}
#labContainer .rpt-upsell-icon{ flex-shrink: 0; }
#labContainer .rpt-upsell-body{ flex: 1; min-width: 0; }
#labContainer .rpt-upsell-title{ font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
#labContainer .rpt-upsell-desc{ font-size:13px; color: var(--ink-soft); line-height: 1.6; }
@media(max-width:640px){
  .rpt-upsell { flex-direction: column; text-align: center; }
  #labContainer .rpt-upsell .btn{ width: 100%; justify-content: center; }
}

/* ── Footer ── */
#labContainer .rpt-footer{
  display: flex; gap: 10px; justify-content: center;
  padding: 8px 0 32px; flex-wrap: wrap;
}

/* ── Audience Type Toggle ── */
#labContainer .aud-type-toggle{
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 18px;
}
#labContainer .att-option{
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--ink-dim);
  transition: all .25s var(--ease);
  user-select: none; -webkit-user-select: none; outline: none; -webkit-tap-highlight-color: transparent;
}
#labContainer .att-option:hover{ border-color: var(--primary-light); }
#labContainer .att-option.sel{
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
#labContainer .att-option svg{ opacity: .6; flex-shrink: 0; }
#labContainer .att-option.sel svg{ opacity: 1; color: var(--primary); }
@media(max-width:480px){ .aud-type-toggle { grid-template-columns: 1fr; } }

.hidden { display: none !important; }
#labContainer [id^="phase-"]{ transition: opacity .2s ease; }

/* ── History ── */
#labContainer .history-card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px; margin-bottom: 6px;
  transition: border-color .2s;
}
#labContainer .history-card:hover{ border-color: var(--primary-light); }

/* ── Toast ── */
#labContainer .toast{
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 12px 24px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 500; z-index: 9999;
  opacity: 0; transition: all .3s var(--ease); pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
#labContainer .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

/* 折疊展開動畫 */
#labContainer #calBody{
  overflow: hidden;
  transition: all .35s cubic-bezier(.16,1,.3,1);
}
#labContainer #calToggleIcon.open{
  transform: rotate(180deg);
}

/* 人數末卡 chip 樣式覆寫 */
#labContainer #sizeChips .chip{
  border-radius: var(--r-sm);
  transition: all .25s var(--ease);
  min-width: 80px;
}
#labContainer #sizeChips .chip.sel{
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 4px 16px var(--primary-glow);
  transform: translateY(-2px);
}
#labContainer #sizeChips .chip.sel div{ color: #fff !important; opacity: 1 !important; }

/* ===== MICRO-INTERACTIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
#labContainer .card{ animation: fadeUp .5s var(--ease) both; }
#labContainer .card:nth-child(2){ animation-delay: .05s; }
#labContainer .card:nth-child(3){ animation-delay: .1s; }
#labContainer .rpt-section{ animation: fadeUp .4s var(--ease) both; }
#labContainer .rpt-section:nth-child(2){ animation-delay: .1s; }
#labContainer .rpt-section:nth-child(3){ animation-delay: .15s; }
#labContainer .rpt-section:nth-child(4){ animation-delay: .2s; }
#labContainer .rpt-section:nth-child(5){ animation-delay: .25s; }
#labContainer .rpt-section:nth-child(6){ animation-delay: .3s; }

/* Focus visible (keyboard navigation) */
#labContainer *:focus-visible{
  outline: 2px solid var(--primary);
  outline-offset: 2px;
  border-radius: 4px;
}
#labContainer button:focus-visible, #labContainer .btn:focus-visible{
  outline: 2px solid var(--primary);
  outline-offset: 3px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .header h1 { font-size: 24px; }
  #labContainer .metrics-row{ grid-template-columns: 1fr 1fr; }
  #labContainer .persona-grid{ grid-template-columns: 1fr; }
  #labContainer .region-grid{ grid-template-columns: 1fr 1fr; }

  #labContainer .rv-avatar{ width: 28px; height: 28px; font-size:13px; }
  #labContainer .rpt-insight{ grid-template-columns: 30px 1fr; gap: 10px; }
  #labContainer .ri-icon{ width: 30px; height: 30px; }
  #labContainer .rpt-action{ grid-template-columns: 48px 1fr; gap: 10px; }
  #labContainer .rpt-footer{ flex-direction: column; align-items: stretch; }
  #labContainer .rpt-footer .btn{ justify-content: center; }
  #labContainer .chip{ padding: 8px 14px; font-size:13px; }

}
@media (max-width: 380px) {

/* ===== NEW LAB STYLES (Dashboard-unified) ===== */
/* ===== LAB STEPS BAR ===== */
.lab-steps {
  margin: 0 0 24px;
  padding: 18px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}

.steps-track {
  display: flex;
  align-items: center;
  gap: 0;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;
}

.step-line {
  flex: 1;
  height: 2px;
  background: var(--border);
  margin: 0 12px;
  min-width: 24px;
  transition: background .3s;
}

.step-line.done {
  background: var(--primary);
}

.step-item .dot {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size:13px;
  color: var(--ink-muted);
  transition: all .3s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0;
}

.step-item .step-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-muted);
  white-space: nowrap;
  transition: color .3s;
}

.step-item .dot.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(124,92,252,.25);
}

.step-item .dot.done {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.step-item .dot.active + .step-label,
.step-item .dot.done + .step-label {
  color: var(--primary);
  font-weight: 700;
}

.step-item:has(.dot.done) + .step-line,
.step-item:has(.dot.active) + .step-line {
  background: var(--primary);
}

.lab-content-container {
  padding: 0;
}

.card-more-wrap {

  opacity: 0; transition: opacity .15s ease;

.diag-card:hover .card-more-wrap,
.card:hover .card-more-wrap,

  background: var(--bg-card); cursor: pointer;
  display: flex; align-items: center; justify-content: center;

  font-size: 16px; line-height: 1;

.card-more-menu.open { display: block; }

  function loadTheme() {
    const saved = localStorage.getItem('bp_theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('bp_theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('bp_theme', 'dark');
    }
    renderThemeToggle();
  }

  function renderThemeToggle() {
    const el = document.getElementById('themeToggle');
    if (!el) return;
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    el.innerHTML = '<button class="theme-toggle-btn" onclick="app.toggleTheme()" title="' + (isDark ? '切換淺色模式' : '切換深色模式') + '">' +
      (isDark
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'

  function navClick(e, moduleId) {
    e.preventDefault();
    // Remove focus to prevent caret flash
    if (document.activeElement) document.activeElement.blur();
    navigate(moduleId);
  }

  function navigate(moduleId) {
    // Clear soul text timer when leaving home
    if(window._soulTimer) { clearInterval(window._soulTimer); window._soulTimer = null; }
    state.currentModule = moduleId;
    renderSidebar();
    renderModule(moduleId);
    // 切換頁面時捲到頂部
    const main = document.getElementById('main');
    if (main) main.scrollTo({top:0, behavior:'smooth'});
  }

  // Navigate to Lab with PATH diagnosis context (auto-populate weak dimension)
  function navigateLabWithPath(weakDim, scores) {
    if (typeof scores === 'string') { try { scores = JSON.parse(scores); } catch(e) { scores = {}; } }
    navigate('lab');
    setTimeout(() => {
      // Auto-select research type based on weak dimension
      const rtMap = {P:'pain',A:'concept',T:'concept',H:'compete'};
      const rt = rtMap[weakDim] || 'concept';
      S.rt = rt;
      document.querySelectorAll('#rtChips .chip').forEach(c => c.classList.toggle('sel', c.dataset.v === rt));
      toggleDynFields();
      // Pre-fill hypothesis
      const hypoMap = {
        P: `目標用戶正在經歷的痛點真實存在，且嚴重到願意為解法付費（PATH P分 ${Math.round(scores.P||0)}/100）`,
        A: `我能精準觸達目標受眾群體，他們有清楚的共同特徵與需求（PATH A分 ${Math.round(scores.A||0)}/100）`,
        T: `目標用戶願意為這個產品付費，定價模式合理（PATH T分 ${Math.round(scores.T||0)}/100）`,
        H: `我的解法相比現有替代方案有明顯差異化（PATH H分 ${Math.round(scores.H||0)}/100）`,
      };
      const hypoEl = document.getElementById('hypo');
      if (hypoEl) hypoEl.value = hypoMap[weakDim] || hypoMap['A'];
      S.hypo = hypoEl ? hypoEl.value : '';
      // Show PATH context banner
      const phaseA = document.getElementById('phase-0');
      if (phaseA && !phaseA.querySelector('.path-context-banner')) {
        const banner = document.createElement('div');
        banner.className = 'path-context-banner';
        banner.style.cssText = 'background:var(--primary-light);border:1px solid rgba(124,92,252,.2);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--ink-sec);display:flex;align-items:center;gap:8px;';
        const dimNames = {P:'問題驗證',A:'受眾輪廓',T:'牽引力',H:'執行力'};
        banner.innerHTML = `${ICONS.zap} <span>來自 PATH 診斷——最弱維度：<strong style="color:var(--primary)">${dimNames[weakDim]}（${Math.round(scores[weakDim]||0)}/100）</strong>，研究類型與假設已自動設定</span>`;
        phaseA.insertBefore(banner, phaseA.firstChild);
      }
      showToast('已載入 PATH 診斷資訊');
    }, 150);
  }

  function drawMiniRadar(canvasId, scores) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const cssSize = 180;
    canvas.width = cssSize * dpr;
    canvas.height = cssSize * dpr;
    canvas.style.width = cssSize + 'px';
    canvas.style.height = cssSize + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const cx = cssSize / 2, cy = cssSize / 2;
    const radius = 60;
    const dims = ['P','A','T','H'];
    const dimLabels = {P:'P',A:'A',T:'T',H:'H'};
    const angles = dims.map((_, i) => (Math.PI * 2 * i / 4) - Math.PI / 2);

    // Grid rings
    ctx.strokeStyle = 'rgba(0,0,0,.06)';
    ctx.lineWidth = 0.5;
    for (let r = 1; r <= 4; r++) {
      ctx.beginPath();
      const rr = radius * r / 4;
      angles.forEach((a, i) => {
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.stroke();
    }
    // Axes
    angles.forEach(a => {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
      ctx.stroke();
    });

    // Data polygon
    ctx.beginPath();
    dims.forEach((dim, i) => {
      const val = Math.max(0, Math.min(100, scores[dim] || 0)) / 100;
      const x = cx + Math.cos(angles[i]) * radius * val;
      const y = cy + Math.sin(angles[i]) * radius * val;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(124, 92, 252, 0.15)';
    ctx.fill();
    ctx.strokeStyle = '#7C5CFC';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Data points
    dims.forEach((dim, i) => {
      const val = Math.max(0, Math.min(100, scores[dim] || 0)) / 100;
      const x = cx + Math.cos(angles[i]) * radius * val;
      const y = cy + Math.sin(angles[i]) * radius * val;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#7C5CFC';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    });

    // Labels
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labelDist = radius + 18;
    dims.forEach((dim, i) => {
      const x = cx + Math.cos(angles[i]) * labelDist;
      const y = cy + Math.sin(angles[i]) * labelDist;
      ctx.font = '700 12px system-ui';
      ctx.fillStyle = '#7C5CFC';
      ctx.fillText(dimLabels[dim], x, y);
    });
  }

  function resetQuizState() {
    state.quizState = {
      type: null,
      currentDim: 0,

      answers: {},
      scores: {},
      productName: '',
      results: null,
      rediagId: null
    };

  // Re-diagnose: keep same product name & type, re-take quiz, update same record
  function rediagnose() {
    const prevType = state.quizState.type;
    const prevName = state.quizState.productName;
    // Find the diagnosis id — check if we're viewing a saved one
    let diagId = state.quizState.rediagId;
    if (!diagId) {
      // Find by matching productName + most recent
      const match = [...state.diagnoses].reverse().find(d => d.productName === prevName);
      if (match) diagId = match.id;
    }
    state.quizState = {
      type: prevType,
      currentDim: 0,
      currentQuestion: 0,
      answers: {},
      scores: {},
      productName: prevName,
      results: null,
      rediagId: diagId || null
    };
    state.currentModule = 'diagnose';
    renderDiagnose();
  }

  function expandQuizCard(type) {
    // Collapse all first
    ['standard','ai'].forEach(t => {
      const card = document.getElementById('quizCard-' + t);
      const input = document.getElementById('quizInput-' + t);
      if (card) card.classList.remove('expanded');
      if (input) input.style.display = 'none';
    });
    // Expand selected
    const card = document.getElementById('quizCard-' + type);
    const input = document.getElementById('quizInput-' + type);
    if (card) card.classList.add('expanded');
    if (input) {
      input.style.display = 'block';
      setTimeout(() => document.getElementById('diagName-' + type)?.focus(), 100);
    }

  function startQuizFromCard(type) {
    const nameEl = document.getElementById('diagName-' + type);
    const name = nameEl?.value?.trim();
    if (!name) { showToast('請填寫產品名稱'); nameEl?.focus(); return; }
    state.quizState.type = type;
    state.quizState.currentDim = 0;
    state.quizState.currentQuestion = 0;
    state.quizState.answers = {};
    state.quizState.scores = {};
    state.quizState.productName = name;
    renderDiagnose();
  }

  function startQuiz(type) {
    // Legacy — redirect to inline card expansion
    expandQuizCard(type);
  }

  function startQuizWithName() {
    // Legacy compat — try both card types
    const stdEl = document.getElementById('diagName-standard');
    const aiEl = document.getElementById('diagName-ai');
    if (stdEl?.value?.trim()) startQuizFromCard('standard');
    else if (aiEl?.value?.trim()) startQuizFromCard('ai');
  }

  function answerQuestion(score) {
    const questions = QUESTIONS[state.quizState.type];
    const currentQ = questions[state.quizState.currentQuestion];
    const qKey = `${state.quizState.currentQuestion}`;

    state.quizState.answers[qKey] = score;

    const dimCode = currentQ.dim;
    if (!state.quizState.scores[dimCode]) {
      state.quizState.scores[dimCode] = [];
    }
    state.quizState.scores[dimCode].push(score);

    // Visual feedback on selected option
    const btns = document.querySelectorAll('.option-button');
    btns.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
    const selectedIdx = currentQ.opts.findIndex(o => o.s === score);
    if (btns[selectedIdx]) {
      btns[selectedIdx].style.opacity = '1';
      btns[selectedIdx].style.borderColor = 'var(--primary)';
      btns[selectedIdx].style.background = 'var(--primary-light)';
    }

    setTimeout(() => {
      if (state.quizState.currentQuestion < questions.length - 1) {
        state.quizState.currentQuestion++;

        const newDim = questions[state.quizState.currentQuestion].dim;
        if (newDim !== currentQ.dim) {
          const newDimIndex = DIMENSIONS.findIndex(d => d.id === newDim);
          state.quizState.currentDim = newDimIndex;
        }

        renderDiagnose();
      } else {
        showQuizResults();
      }
    }, 500);
  }

  function showQuizResults() {
    /* 計分：每維度 5 題 × 1-4 分 = 5~20 → 正規化 0-100 */
    const normalized = {};
    const dims = ['P', 'A', 'T', 'H'];
    dims.forEach(dim => {
      const scores = state.quizState.scores[dim] || [];
      const raw = scores.reduce((a, b) => a + b, 0); // 5~20
      const normalized_score = ((raw - 5) / 15) * 100;
      normalized[dim] = Math.max(0, Math.min(100, Math.round(normalized_score)));
    });

    const total = Math.round((normalized.P + normalized.A + normalized.T + normalized.H) / 4);

    let pathType = '萌芽探索者';
    if (total > 25) pathType = '摸索前進者';
    if (total > 50) pathType = '蓄勢待發者';
    if (total > 75) pathType = '準備起飛者';

    state.quizState.results = { normalized, total, pathType };

    const content = document.getElementById('content');
    const diagProdName = state.quizState.productName || '產品';

    // 找最弱和最強維度
    const dimEntries = Object.entries(normalized);
    const weakest = dimEntries.reduce((a, b) => a[1] < b[1] ? a : b);
    const strongest = dimEntries.reduce((a, b) => a[1] > b[1] ? a : b);
    const weakDim = DIMENSIONS.find(d => d.id === weakest[0]);

    // 每個維度的具體行動建議
    const dimAdvice = generateDimAdvice(normalized, state.quizState.scores);

    function scoreColor(s) {

    content.innerHTML = `
      <div style="margin-bottom:12px">

      <!-- ═══ HERO: Score + Radar side by side ═══ -->
      <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;margin-bottom:28px">
        <!-- Left: Score hero — compact column -->
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:32px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow-card)">

          <div style="font-size:56px;font-weight:800;color:${scoreColor(total)};line-height:1;margin-bottom:6px">${total}</div>
          <div style="display:inline-flex;align-items:center;padding:5px 16px;border-radius:20px;background:${scoreBg(total)};color:${scoreColor(total)};font-size:13px;font-weight:700;margin-bottom:28px">${pathType}</div>
          <!-- 4-dim mini bars -->
          <div style="width:100%">
            ${dims.map(dim => {
              const d = DIMENSIONS.find(x => x.id === dim);
              const s = normalized[dim];
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <span style="font-size:13px;font-weight:800;color:${scoreColor(s)};width:14px;letter-spacing:.5px">${d.id}</span>
                <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
                  <div style="height:100%;width:${s}%;background:${scoreColor(s)};border-radius:3px;transition:width .6s"></div>
                </div>
                <span style="font-size:13px;font-weight:700;color:${scoreColor(s)};width:30px;text-align:right">${s}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
        <!-- Right: Radar chart — more room -->
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:16px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-card);min-height:360px">
          <canvas id="radarChart" width="380" height="380"></canvas>

      <!-- ═══ Kill / Pivot / Persevere Verdict ═══ -->

        const vIcons = {
          kill: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',

        return `

        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">

          </div>
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
              <span style="font-size:13px;font-weight:800;letter-spacing:1.5px;color:${c};text-transform:uppercase">${vLabels[v.verdict]}</span>
              <span style="font-size:13px;padding:2px 8px;border-radius:100px;background:${c}18;color:${c};font-weight:600">${confLabels[v.confidence]}</span>

        </div>
        <p style="font-size:14px;color:var(--ink-sec);line-height:1.8;margin:0 0 14px">${v.reason}</p>
        <div style="padding:14px 18px;background:var(--bg-card);border-radius:var(--r-md);border:1px solid var(--border)">
          <div style="font-size:13px;font-weight:700;color:${c};letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase">建議行動</div>
          <div style="font-size:14px;color:var(--ink);line-height:1.7">${v.action}</div>
        </div>
        ${v.pivotHint ? '<div style="margin-top:12px;font-size:13px;color:var(--ink-muted);font-style:italic">' + v.pivotHint + '</div>' : ''}
      </div>`;
      })()}

      <!-- ═══ Type Description with colored accent ═══ -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:22px 24px;margin-bottom:24px;box-shadow:var(--shadow-card);display:flex;gap:16px;align-items:flex-start">
        <div style="width:38px;height:38px;border-radius:10px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${ICONS.zap}
        </div>
        <div style="flex:1">
          <h2 style="margin:0 0 8px;font-size:15px;font-weight:700">總體評估</h2>
          <p style="color:var(--ink-sec);margin:0;line-height:1.75;font-size:13px">${getPathTypeDescription(pathType, diagProdName, weakDim, strongDim, normalized)}</p>
        </div>
      </div>

      <!-- ═══ Section Label ═══ -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
        <div style="font-size:14px;font-weight:700;color:var(--ink-sec);letter-spacing:.3px">各維度分析</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <!-- ═══ 4-Dim Advice Cards (2×2 grid) ═══ -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px">
      ${dims.map(dim => {
        const d = DIMENSIONS.find(x => x.id === dim);
        const s = normalized[dim];
        const advice = dimAdvice[dim];
        const isWeak = dim === weakest[0];
        const isStrong = dim === strongest[0];
        const accentBorder = '';
        return `
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:22px 22px 20px;box-shadow:var(--shadow-card);${accentBorder}">
          <!-- Card header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:10px;background:${scoreBg(s)};color:${scoreColor(s)};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                ${dimIcons[dim]}
              </div>
              <div>
                <div style="font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:6px">${d.id} · ${d.name}${isWeak ? '<span style="font-size:13px;padding:1px 6px;border-radius:6px;background:'+scoreBg(s)+';color:'+scoreColor(s)+';font-weight:600">最弱</span>' : ''}${isStrong ? '<span style="font-size:13px;padding:1px 6px;border-radius:6px;background:'+scoreBg(s)+';color:'+scoreColor(s)+';font-weight:600">最強</span>' : ''}</div>
                <div style="font-size:13px;color:${scoreColor(s)};font-weight:600;margin-top:1px">${scoreLabel(s)}</div>
              </div>
            </div>
            <span style="font-weight:800;font-size:26px;color:${scoreColor(s)};line-height:1">${s}</span>
          </div>
          <!-- Score bar -->
          <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:14px">
            <div style="height:100%;width:${s}%;background:${scoreColor(s)};border-radius:2px"></div>
          </div>
          <!-- Summary -->
          <p style="color:var(--ink-sec);font-size:13px;line-height:1.7;margin:0 0 14px">${advice.summary}</p>
          <!-- Action items -->
          <div style="border-top:1px solid var(--border);padding-top:12px">
            <div style="font-size:13px;font-weight:700;color:var(--ink-muted);letter-spacing:.3px;margin-bottom:8px;text-transform:uppercase">下一步</div>
            ${advice.actions.map(a => `<div style="font-size:13px;margin-bottom:6px;padding-left:14px;color:var(--ink-sec);line-height:1.7;position:relative"><span style="position:absolute;left:0;color:${scoreColor(s)};font-weight:700;font-size:14px">›</span>${a}</div>`).join('')}
          </div>
        </div>`;
      }).join('')}
      </div>

      <!-- ═══ CTA ═══ -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:20px 24px;box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px">下一步：用 Lab 深入驗證</div>
          <div style="font-size:13px;color:var(--ink-muted)">針對最弱維度「${weakDim.name}」進行 AI 模擬用戶訪談</div>
        </div>
        <div style="display:flex;gap:10px;flex-shrink:0">
          <button class="btn btn-primary" onclick="app.navigateLabWithPath('${weakest[0]}', '${JSON.stringify(normalized).replace(/"/g, '&quot;')}')">
            驗證「${weakDim.name}」 ${ICONS.arrowRight}
          </button>
          <button class="btn btn-secondary" onclick="app.rediagnose()">
            重新診斷
          </button>
          <button class="btn btn-secondary" onclick="app.navigate('diagnose')">
            ← 返回列表
          </button>
        </div>
      </div>
    `;

    setTimeout(() => drawRadarChart('radarChart', normalized), 100);

    // Only save if this is a fresh quiz completion (not just viewing a historical report)
    const isViewing = state.quizState._viewOnly;
    const verdictData = getVerdict(normalized, total, weakDim, strongDim);
    if (!isViewing) {
      const rediagId = state.quizState.rediagId;
      if (rediagId) {
        // Re-diagnosing: update existing record
        const existing = state.diagnoses.find(x => x.id === rediagId);
        if (existing) {
          existing.type = state.quizState.type;
          existing.date = new Date().toISOString();
          existing.scores = normalized;
          existing.rawScores = JSON.parse(JSON.stringify(state.quizState.scores));
          existing.total = total;
          existing.pathType = pathType;
          existing.verdict = verdictData.verdict;
          existing.verdictTitle = verdictData.title;
        }
      } else {
        // New diagnosis
        const diagnosis = {
          id: 'diag_' + Date.now(),
          type: state.quizState.type,
          date: new Date().toISOString(),
          scores: normalized,
          rawScores: JSON.parse(JSON.stringify(state.quizState.scores)),
          total: total,
          pathType: pathType,
          productName: state.quizState.productName || '',
          verdict: verdictData.verdict,
          verdictTitle: verdictData.title
        };
        state.diagnoses.push(diagnosis);
      }
      saveState();
    }
  }

  // ══════ Kill / Pivot / Persevere 決策引擎 ══════
  function getVerdict(normalized, total, weakDim, strongDim) {
    const P = normalized.P, A = normalized.A, T = normalized.T, H = normalized.H;
    const weakScore = normalized[weakDim.id];
    const strongScore = normalized[strongDim.id];
    const dimBelow30 = ['P','A','T','H'].filter(d => normalized[d] < 30).length;
    const dimBelow50 = ['P','A','T','H'].filter(d => normalized[d] < 50).length;
    const dimAbove70 = ['P','A','T','H'].filter(d => normalized[d] >= 70).length;
    const gap = strongScore - weakScore;

    // ── KILL conditions ──
    // P < 20: 如果問題根本不存在，其他都沒意義
    if (P < 20) return {
      verdict: 'kill', confidence: 'high',
      title: '建議重新定義問題',
      reason: '問題驗證分數極低（' + P + ' 分），代表你還沒有找到一個值得解決的問題。其他維度的投入在此基礎上都是風險。',
      action: '暫停所有開發，花一週時間做 5-10 場用戶訪談，確認問題是否真實存在。如果多數人對問題無感，考慮換一個問題方向。',
      pivotHint: null
    };
    // 3+維度 < 30: 全面薄弱
    if (dimBelow30 >= 3) return {
      verdict: 'kill', confidence: 'high',
      title: '建議回到原點重新構想',
      reason: '四個維度中有 ' + dimBelow30 + ' 個低於 30 分，代表這個產品概念在多個面向都缺乏基礎。',
      action: '不要硬推——與其修補一個搖搖欲墜的概念，不如歸零思考：你最想為誰解決什麼問題？從這個問題重新出發。',
      pivotHint: null
    };
    // Total < 20
    if (total < 20) return {
      verdict: 'kill', confidence: 'high',
      title: '建議暫停並重新思考',
      reason: '綜合評分只有 ' + total + ' 分，四個維度都需要大幅加強。',
      action: '這個階段最有價值的事不是做產品，而是做調研。花兩週去理解你的目標市場、用戶、競品，再重新構想產品。',
      pivotHint: null
    };

    // ── PIVOT conditions ──
    const pivotDims = {P:'問題方向',A:'受眾定義',T:'市場策略',H:'執行策略'};
    const pivotActions = {
      P: '你的受眾和市場有潛力，但核心問題定義有問題。去跟現有受眾聊，找出他們「真正在花時間/金錢解決」的問題，而不是你假設的問題。',
      A: '問題可能是真的，但你在跟錯的人說話。重新審視：誰是「最痛」而且「最願意付費」的那群人？可能比你想的更窄。',
      T: '產品本身有價值，但賽道定位或市場切入點需要調整。回到 P+A 的洞察，重新推導你該站的賽道，找到拉力最強的細分市場。',
      H: '市場方向對了，但執行條件不足。盤點你的資源、背景與人脈，找到合適的策略夥伴或團隊成員來補足落地能力。'
    };

    // 有一個維度 < 30 但其他 >= 50: 典型 pivot 信號
    if (weakScore < 30 && dimAbove70 >= 1) return {
      verdict: 'pivot', confidence: 'high',
      title: '建議調整「' + weakDim.name + '」方向',
      reason: '你的「' + strongDim.name + '」有 ' + strongScore + ' 分的基礎，但「' + weakDim.name + '」只有 ' + weakScore + ' 分——落差 ' + gap + ' 分。核心價值在，但這個弱點會阻止你進入市場。',
      action: pivotActions[weakDim.id],
      pivotHint: '保留「' + strongDim.name + '」的優勢，重新設計「' + weakDim.name + '」的策略'
    };
    // Gap > 40 between strongest & weakest
    if (gap > 40) return {
      verdict: 'pivot', confidence: 'medium',
      title: '建議調整「' + weakDim.name + '」',
      reason: '維度落差過大（' + strongDim.name + ' ' + strongScore + ' 分 vs ' + weakDim.name + ' ' + weakScore + ' 分）。不平衡的產品概念很難存活——最弱的環節會拖垮整體。',
      action: pivotActions[weakDim.id],
      pivotHint: '集中 2 週時間專攻「' + weakDim.name + '」，然後重新跑一次 PATH 看是否改善'
    };
    // 2+ dimensions < 50 but total 25-50
    if (dimBelow50 >= 2 && total >= 25 && total <= 50) return {
      verdict: 'pivot', confidence: 'medium',
      title: '建議調整策略再前進',
      reason: '有 ' + dimBelow50 + ' 個維度低於 50 分，產品需要方向性調整才能進入下一階段。但你有「' + strongDim.name + '」（' + strongScore + ' 分）作為基礎，不需要從零開始。',
      action: '優先補強' + ['P','A','T','H'].filter(d => normalized[d] < 50).map(d => '「' + pivotDims[d] + '」').join('和') + '。建議用 Audience Lab 深入驗證最弱的維度。',
      pivotHint: null
    };

    // ── PERSEVERE conditions ──
    // Total >= 70 or 3+ dims >= 70
    if (total >= 70 || dimAbove70 >= 3) return {
      verdict: 'persevere', confidence: 'high',
      title: '數據支持你——全力衝',
      reason: '四維基礎紮實' + (weakScore < 60 ? '，但「' + weakDim.name + '」（' + weakScore + ' 分）仍有提升空間' : '') + '。你已經通過概念階段，應該進入市場驗證。',
      action: '用 Audience Lab 做一輪完整的用戶模擬驗證（Tier 2），取得 UPS 分數。同時可以開始準備 MVP 上線或 landing page 測試。',
      pivotHint: null
    };
    // Total 50-70, relatively balanced
    if (total >= 50 && gap <= 30) return {
      verdict: 'persevere', confidence: 'medium',
      title: '方向正確——持續驗證',
      reason: '綜合 ' + total + ' 分，四維相對均衡。你有足夠的基礎繼續推進，但仍需要更多驗證來增強信心。',
      action: '建議進入 Audience Lab 做 Tier 2 驗證，重點觀察「' + weakDim.name + '」在模擬用戶中的反應，同時驗證你的核心假設。',
      pivotHint: null
    };
    // Default: Pivot (middle ground)
    return {
      verdict: 'pivot', confidence: 'low',
      title: '需要更多驗證才能判斷',
      reason: '綜合 ' + total + ' 分，有一些基礎但也有明顯弱點。現階段數據不足以做出強判斷，需要 Tier 2 的深度驗證。',
      action: '最有價值的下一步是用 Audience Lab 模擬用戶驗證，尤其針對「' + weakDim.name + '」。Tier 2 的結果會讓判斷更清晰。',
      pivotHint: null
    };
  }

  function getPathTypeDescription(type, prodName, weakDim, strongDim, scores) {
    const desc = {
      '萌芽探索者': `${prodName} 還在最早期——大部分維度都處於假設階段，缺乏真實驗證。你的當務之急不是寫程式或做產品，而是走出去跟 5 個以上的目標用戶深度對話，確認這個問題是否真的存在、是否有人願意付費解決。`,

  function drawRadarChart(canvasId, scores) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.parentElement.clientWidth - 24;
    const cssSize = Math.min(cssW, 380);
    canvas.style.width = cssSize + 'px';
    canvas.style.height = cssSize + 'px';
    canvas.width = cssSize * dpr;
    canvas.height = cssSize * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const centerX = cssSize / 2;
    const centerY = cssSize / 2;
    const radius = cssSize * 0.32; // bigger polygon ratio
    const dims = ['P', 'A', 'T', 'H'];
    const dimLabels = {P:'問題驗證',A:'受眾輪廓',T:'牽引力',H:'執行力'};
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    // Grid rings — dotted style for elegance
    for (let i = 1; i <= 4; i++) {
      const r = (radius / 4) * i;
      ctx.strokeStyle = isDark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
      ctx.lineWidth = 1;
      ctx.setLineDash(i < 4 ? [3, 4] : []);
      ctx.beginPath();
      dims.forEach((_, idx) => {
        const angle = (idx / dims.length) * Math.PI * 2 - Math.PI / 2;
        const x = centerX + Math.cos(angle) * r;
        const y = centerY + Math.sin(angle) * r;
        if (idx === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Axis lines — subtle
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
    ctx.lineWidth = 1;
    dims.forEach((_, idx) => {
      const angle = (idx / dims.length) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
      ctx.stroke();
    });

    // Data polygon — gradient fill
    const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
    grad.addColorStop(0, 'rgba(124, 92, 252, 0.22)');
    grad.addColorStop(1, 'rgba(124, 92, 252, 0.06)');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#7C5CFC';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    dims.forEach((dim, idx) => {
      const angle = (idx / dims.length) * Math.PI * 2 - Math.PI / 2;
      const value = (scores[dim] || 0) / 100;
      const x = centerX + Math.cos(angle) * radius * value;
      const y = centerY + Math.sin(angle) * radius * value;
      if (idx === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Data points — clean dots with glow
    dims.forEach((dim, idx) => {
      const angle = (idx / dims.length) * Math.PI * 2 - Math.PI / 2;
      const value = (scores[dim] || 0) / 100;
      const x = centerX + Math.cos(angle) * radius * value;
      const y = centerY + Math.sin(angle) * radius * value;
      // Glow
      ctx.fillStyle = 'rgba(124,92,252,.15)';
      ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
      // White ring
      ctx.fillStyle = isDark ? '#1A1A24' : '#fff';
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
      // Dot
      ctx.fillStyle = '#7C5CFC';
      ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
    });

    // Labels — positioned outside with score as accent badge
    dims.forEach((dim, idx) => {
      const angle = (idx / dims.length) * Math.PI * 2 - Math.PI / 2;
      const labelDist = radius + 34;
      let x = centerX + Math.cos(angle) * labelDist;
      let y = centerY + Math.sin(angle) * labelDist;

      const sv = scores[dim] || 0;
      const sColor = sv >= 75 ? '#2DBDA8' : sv >= 50 ? '#F0A05A' : '#E8627C';

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Score value (prominent)
      ctx.fillStyle = sColor;
      ctx.font = '800 18px Inter';
      ctx.fillText(sv, x, y - 8);

      // Dim letter + name in single line
      ctx.fillStyle = isDark ? 'rgba(255,255,255,.5)' : '#6E6E82';
      ctx.font = '600 11px Inter';
      ctx.fillText(dim + ' ' + dimLabels[dim], x, y + 10);
    });
  }

// ═══════════════════════════════════════════
// 研究品質分數 Research Quality Score (RQS)
// ═══════════════════════════════════════════
// RQS 衡量的是「你在這次研究中，方法論上做對了多少事」。
// 它不是統計學的信賴區間（CI），也不是預測精度（accuracy）。
// 合成用戶不是真人隨機抽樣，無法計算傳統 CI。
//
// RQS 基於四項可量化的研究方法品質因子：
//
// 1. 樣本規模 — 合成回應分布穩定度
//    16→73  32→76  64→79  128(Pro)→85
//
// 2. 產品資訊完整度 — AI 模擬品質取決於可用上下文量
//    六項：名稱、描述、痛點、定價、競品、受眾
//    0→0  1→0.5  2→1.2  3→2  4→2.8  5→3.5  6→4
//
// 3. 受眾精準度 — 人物誌越具體，模擬越貼近目標族群
//    五維：地域、年齡、職業、收入、生命週期
//    0→0  1→0.5  2→1  3→1.6  4→2.2  5→3
//
// 4. 真人校準 — 唯一能提升「真實可信度」的因子
//    真人訪談資料提供 ground truth，讓 AI 結果有校準基準
//    0人→0  1-4人→1  5-9→3  10-19→5  20-30→7  30+→8
//
// Cap 設計：
//   Free 無真人: cap 85    Free 有真人: cap 93
//   Pro  無真人: cap 92    Pro  有真人: cap 100
//
// 理論上限：128人(85)+6項(4)+5維(3)+30真人(8)=100
// ═══════════════════════════════════════════

function calcAccuracy(opts){
  const o=Object.assign({
    sampleSize: S.aud?.sampleSize||16,
    product: S.product||{},
    aud: S.aud||{},
    region: S.region,
    isPro: false,
    realCount: S.realInterview?.validCount||0
  }, opts||{});

  // ── Factor 1: Sample Size Base ──
  const sampleBase = o.sampleSize>=128?85 : o.sampleSize>=64?79 : o.sampleSize>=32?76 : 73;

  // ── Factor 2: Product Data Completeness ──
  const p=o.product;
  const prodFieldCount=[p.name,p.desc,p.problem,p.pricing,p.compete,p.audience].filter(Boolean).length;
  const prodBonusMap=[0, 0.5, 1.2, 2.0, 2.8, 3.5, 4.0];
  const prodBonus=prodBonusMap[prodFieldCount]||0;

  // ── Factor 3: Audience Precision ──
  const a=o.aud;
  let audDimCount=0;
  if(o.region) audDimCount++;
  if(a.age && a.age.length>0 && a.age.length<=3) audDimCount++;
  if(a.jobs && a.jobs.length>0 && a.jobs.length<=3) audDimCount++;
  if(a.income && a.income.length>0 && a.income.length<=3) audDimCount++;
  if(a.life && a.life.length>0 && a.life.length<=3) audDimCount++;
  const audBonusMap=[0, 0.5, 1.0, 1.6, 2.2, 3.0];
  const audBonus=audBonusMap[audDimCount]||0;

  // ── Factor 4: Real Interview Calibration ──
  const rc=o.realCount;
  const realBonus=rc>=30?8 : rc>=20?7 : rc>=10?5 : rc>=5?3 : rc>=1?1 : 0;
  const hasReal=rc>0;

  // ── Composite ──
  const raw=sampleBase+prodBonus+audBonus+realBonus;
  // Cap 根據方案 + 是否有真人資料
  const cap=o.isPro?(hasReal?100:92):(hasReal?93:85);
  const floor=75;
  const rqs=Math.min(cap, Math.max(floor, Math.round(raw*10)/10));

  // ── Range (±1.5) ──
  const lo=Math.max(floor, Math.round((rqs-1.5)*10)/10);
  const hi=Math.min(cap, Math.round((rqs+1.5)*10)/10);

  // 理論上限
  const proMax=hasReal?100:92;

  // 因子列表
  const factors=[
    {name:'樣本規模', val:sampleBase, max:85, desc:o.sampleSize+'人'},
    {name:'產品資料', val:prodBonus, max:4, desc:prodFieldCount+'/6 項'},
    {name:'受眾精準度', val:audBonus, max:3, desc:audDimCount+'/5 項'}
  ];
  if(hasReal){
    factors.push({name:'真人校準', val:realBonus, max:8, desc:rc+'人'});
  }

  return {
    rqs, lo, hi,
    range: `${Math.round(lo)}–${Math.round(hi)}`,
    sampleBase, prodBonus: Math.round(prodBonus*10)/10,
    audBonus: Math.round(audBonus*10)/10,
    realBonus, realCount:rc, hasReal,
    prodFieldCount, prodFieldTotal:6,
    audDimCount, audDimTotal:5,
    proMax,
    accuracy: rqs, // 向下相容
    factors
  };
}

      showToast('請填寫你 vs 競品的核心差異');document.getElementById('compDiff')?.focus();return;
    }
    if(S.rt==='retain' && !S.product.retainContext){
      showToast('留存驗證需要描述用戶的使用情境');document.getElementById('retainContext')?.focus();return;
    }
  }
  // Phase B → C 驗證
  if(n===2){
    if(!S.region){showToast('請先選擇目標市場地域');return;}
    startResearch();return;
  }
  // Phase D — 報告頁（研究完成後跳轉）
  if(n===3){
    curPhase=3;
    PH.forEach((p,i)=>document.getElementById(p).classList.toggle('hidden',i!==3));
    renderSteps();renderResults();saveResearch();
    scrollContentTop();
    return;
  }
  // Phase 過渡動畫
  const current=document.getElementById(PH[curPhase]);
  if(current) current.style.opacity='0';
  setTimeout(()=>{
    curPhase=n;
    PH.forEach((p,i)=>{
      const el=document.getElementById(p);
      el.classList.toggle('hidden',i!==n);
      if(i===n){ el.classList.remove('phase-enter'); void el.offsetWidth; el.classList.add('phase-enter'); }
    });
    renderSteps();
    if(n===1) { updateAccuracyPanel(); updateSampleNote(S.aud.sampleSize||16); }
    scrollContentTop();
  },150);
}

function procFile(f){
  const ext=f.name.split('.').pop().toLowerCase();
  if(!['md','pdf','docx','txt'].includes(ext)){showToast('不支援此格式，請上傳 .md .pdf .docx .txt');return;}
  S.file={name:f.name,size:f.size,ext};
  const icons={md:'md',pdf:'pdf',docx:'doc',txt:'txt'};
  const sz=f.size<1048576?(f.size/1024).toFixed(1)+' KB':(f.size/1048576).toFixed(1)+' MB';
  const docSvg=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
  document.getElementById('fpIcon').innerHTML=docSvg;
  document.getElementById('fpName').textContent=f.name;
  document.getElementById('fpMeta').textContent=`${ext.toUpperCase()} · ${sz}`;
  document.getElementById('filePrev').classList.remove('hidden');
  document.getElementById('uploadZone').style.display='none';
  const r=new FileReader();
  r.onload=e=>{S.product=parseBrief(e.target.result);S.product._file=f.name;
    // 顯示解析結果摘要
    const parsed=[S.product.name,S.product.problem,S.product.pricing,S.product.audience,S.product.compete].filter(Boolean).length;
    const metaEl=document.getElementById('fpMeta');
    if(metaEl) metaEl.textContent=`${ext.toUpperCase()} · ${sz} · 解析到 ${parsed} 個欄位`;
    showProdCompletenessHint();updateAccuracyPanel();
  };
  if(ext==='md'||ext==='txt'){
    r.readAsText(f);
  } else if(ext==='pdf'||ext==='docx'){
    // PDF/DOCX：嘗試用 readAsText 提取可讀部分（純文字 layer）
    const r2=new FileReader();
    r2.onload=e=>{
      // 從 binary 中提取可見 ASCII/UTF 文字片段
      const raw=e.target.result;
      let extracted='';
      // DOCX 是 zip，內含 XML；PDF 有文字 stream。嘗試粗提取。
      const chunks=raw.match(/[\u4e00-\u9fff\u3400-\u4dbfa-zA-Z0-9\s\-\:\.\,\;\!\?\(\)\[\]\/\*\#]{8,}/g);
      if(chunks) extracted=chunks.join('\n');
      if(extracted.length>50){
        S.product=parseBrief(extracted);S.product._file=f.name;
        const parsed=[S.product.name,S.product.problem,S.product.pricing,S.product.audience,S.product.compete].filter(Boolean).length;
        const metaEl=document.getElementById('fpMeta');
        if(metaEl) metaEl.textContent=`${ext.toUpperCase()} · ${sz} · 解析到 ${parsed} 個欄位`;
        showProdCompletenessHint();updateAccuracyPanel();
      } else {
        // 提取失敗，提示用戶改用 .md
        S.product={name:f.name.replace(/\.[^.]+$/,''),desc:'',_file:f.name};
        const metaEl=document.getElementById('fpMeta');
        if(metaEl) metaEl.innerHTML=`${ext.toUpperCase()} · ${sz} · <span style="color:var(--amber)">建議改用 .md 或 .txt 格式以獲得最佳解析</span>`;
      }
    };
    r2.readAsText(f);
  } else {
    S.product={name:f.name.replace(/\.[^.]+$/,''),desc:'',_file:f.name};
  }
}

function rmFile(){S.file=null;S.product={};document.getElementById('filePrev').classList.add('hidden');document.getElementById('uploadZone').style.display='';document.getElementById('fileIn').value='';}

function parseCSV(text){
  // 簡易 CSV parser，處理逗號、引號
  const lines=[];
  let cur='',inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){
      if(inQ&&text[i+1]==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(c===','&&!inQ){
      row.push(cur.trim());cur='';
    } else if((c==='\n'||(c==='\r'&&text[i+1]==='\n'))&&!inQ){
      if(c==='\r')i++;
      row.push(cur.trim());
      if(row.some(c=>c!==''))lines.push(row);
      row=[];cur='';
    } else {
      cur+=c;
    }
  }
  row.push(cur.trim());
  if(row.some(c=>c!==''))lines.push(row);
  return lines;
}

function processRealData(rows){
  // rows[0] = header IDs, rows[1] = header labels (optional), rows[2+] = data
  if(rows.length<2) return {valid:0,total:0,data:[],quantCols:[],qualCols:[]};

  const headers=rows[0];
  // 判斷第二行是否為說明行（非數據）
  let dataStart=1;
  const secondRow=rows[1]||[];
  const looksLikeLabel=secondRow.some(c=>/受訪者|年齡|性別|職業|地區|意願|程度|反應/.test(c));
  if(looksLikeLabel)dataStart=2;

  // 識別量化欄位（含 _score 或值全是 0-10 數字）
  const quantCols=[];
  const qualCols=[];
  const metaCols=['respondent_id','age','gender','occupation','region'];
  headers.forEach((h,i)=>{
    if(metaCols.includes(h))return;
    if(/_score$/.test(h)){quantCols.push({idx:i,name:h});}
    else{qualCols.push({idx:i,name:h});}
  });

  const parsed=[];
  let validCount=0;
  for(let r=dataStart;r<rows.length;r++){
    const row=rows[r];
    if(!row||row.length<3)continue;
    // 檢查是否有足夠的有效填答（至少填了 3 個欄位）
    const filled=row.filter((c,i)=>i>0&&c&&c!==''&&!/^「/.test(c)).length;
    if(filled<3)continue;

    const entry={
      id:row[headers.indexOf('respondent_id')]||`R${r}`,
      age:row[headers.indexOf('age')]||'',
      gender:row[headers.indexOf('gender')]||'',
      occupation:row[headers.indexOf('occupation')]||'',
      region:row[headers.indexOf('region')]||'',
      quant:{},
      qual:{},
    };
    quantCols.forEach(qc=>{
      const v=parseFloat(row[qc.idx]);
      if(!isNaN(v)&&v>=0&&v<=10)entry.quant[qc.name]=v;
    });
    qualCols.forEach(qc=>{
      const v=(row[qc.idx]||'').trim();
      if(v&&!/^「/.test(v))entry.qual[qc.name]=v;
    });
    // 至少要有一個量化分數或一段質性回答
    if(Object.keys(entry.quant).length>0||Object.keys(entry.qual).length>0){
      parsed.push(entry);
      validCount++;
    }
  }

  return {valid:validCount,total:rows.length-dataStart,data:parsed,quantCols,qualCols};
}
