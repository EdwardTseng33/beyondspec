function procRealFile(f){
  const ext=f.name.split('.').pop().toLowerCase();
  if(!['csv','xlsx','xls'].includes(ext)){showToast('請上傳 .csv 或 .xlsx 格式');return;}

  const sz=f.size<1048576?(f.size/1024).toFixed(1)+' KB':(f.size/1048576).toFixed(1)+' MB';
  document.getElementById('realFpName').textContent=f.name;
  document.getElementById('realFpMeta').textContent=`${ext.toUpperCase()} · ${sz} · 解析中…`;
  document.getElementById('realFilePrev').classList.remove('hidden');
  document.getElementById('realUploadZone').style.display='none';

  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=e=>{
      const rows=parseCSV(e.target.result);
      finishRealParse(rows,f,sz,ext);
    };
    reader.readAsText(f);
  } else {
    // XLSX — 使用 SheetJS
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        if(typeof XLSX==='undefined'){
          // 動態載入 SheetJS
          const script=document.createElement('script');
          script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          script.onload=()=>{
            const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const data=XLSX.utils.sheet_to_json(ws,{header:1});
            finishRealParse(data,f,sz,ext);
          };
          script.onerror=()=>{showToast('無法載入 XLSX 解析器，請改用 .csv 格式');rmRealFile();};
          document.head.appendChild(script);
        } else {
          const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1});
          finishRealParse(data,f,sz,ext);
        }
      }catch(err){showToast('XLSX 解析失敗，請檢查檔案格式');console.error(err);rmRealFile();}
    };
    reader.readAsArrayBuffer(f);
  }
}

function finishRealParse(rows,f,sz,ext){
  const result=processRealData(rows);
  S.realInterview={validCount:result.valid,rows:result.data,file:f.name};

  const meta=document.getElementById('realFpMeta');
  meta.textContent=`${ext.toUpperCase()} · ${sz} · ${result.valid} / ${result.total} 筆有效`;

  // 顯示摘要
  const summary=document.getElementById('realDataSummary');
  if(result.valid>0){
    const acc=calcAccuracy();
    const bonus=acc.realBonus;
    let quantSummary='';
    if(result.quantCols.length>0){
      // 計算各量化欄位的真人平均
      const quantAvgs=result.quantCols.map(qc=>{
        const vals=result.data.map(d=>d.quant[qc.name]).filter(v=>v!==undefined);
        const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
        return {name:qc.name.replace(/_score$/,'').replace(/_/g,' '),avg:avg.toFixed(1),n:vals.length};
      }).filter(q=>q.n>0);
      if(quantAvgs.length>0){
        quantSummary=`<div style="margin-top:10px;font-size:12px;color:var(--ink-dim)">` +
          quantAvgs.map(q=>`<span style="display:inline-block;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin:2px 3px">${q.name} <strong style="color:var(--teal)">${q.avg}</strong></span>`).join('') +
          `</div>`;
      }
    }
    summary.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div style="font-size:20px;font-weight:800;color:var(--teal)">${result.valid} 人</div>
        <div style="font-size:13px;color:var(--ink-sec)">有效回應 · RQS <strong>+${bonus}</strong></div>
      </div>
      <div style="font-size:12px;color:var(--ink-dim);line-height:1.5">
        ${result.quantCols.length} 個量化題 · ${result.qualCols.length} 個質性題
        ${result.valid<5?'<span style="color:var(--gold);margin-left:6px">建議補充至 5 人以上，目前 RQS 加成有限</span>':''}
      </div>
      ${quantSummary}
    `;
    summary.style.display='block';
  } else {
    summary.innerHTML=`<div style="font-size:13px;color:var(--gold)">未偵測到有效回應。請確認檔案格式符合模板要求，且至少有 3 個欄位填寫完整。</div>`;
    summary.style.display='block';
  }
  updateAccuracyPanel();
}

function parseBrief(t){
  const g=l=>{for(const p of[new RegExp(`\\*\\*${l}\\*\\*[：:]\\s*(.+)`,'i'),new RegExp(`${l}[：:]\\s*(.+)`,'i')]){const m=t.match(p);if(m)return m[1].trim();}return '';};
  const gs=h=>{const m=t.match(new RegExp(`##\\s*${h}[^\\n]*\\n([\\s\\S]*?)(?=\\n##|$)`,'i'));return m?m[1].trim():'';};
  const stageRaw = g('目前階段')||'';
  const stageMap = {'概念':'concept','mvp':'mvp','MVP':'mvp','beta':'beta','Beta':'beta','已上線':'live','上線':'live'};
  const parsedStage = Object.keys(stageMap).find(k=>stageRaw.toLowerCase().includes(k.toLowerCase()));
  return{name:g('產品名稱')||'未命名',desc:g('一句話描述')||'',audience:g('主要受眾')||gs('目標受眾')||'',pricing:gs('定價模式')||'',compete:gs('競品')||'',problem:gs('解決的問題')||'',stage:parsedStage?stageMap[parsedStage]:''};
}

const TPL=`# 產品簡報（Product Brief）\n\n## 基本資訊 *\n- **產品名稱**：\n- **一句話描述**：\n- **產品類型**：App / SaaS / 服務 / 硬體\n- **目前階段**：概念 / MVP / Beta / 已上線\n\n## 目標受眾 *\n- **主要受眾**：\n- **地理範圍**：\n- **收入區間**：\n\n## 解決的問題 *\n（描述痛點，越具體越好）\n\n## 產品核心功能\n## 定價模式\n## 競品 / 替代方案\n## 已有的驗證數據（如有）\n## 你最想知道的事\n`;
function dlTemplate(){const b=new Blob([TPL],{type:'text/markdown'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='product-brief.md';a.click();URL.revokeObjectURL(u);}
function cpTemplate(){navigator.clipboard.writeText(TPL).then(()=>{event.target.textContent='✓ 已複製';setTimeout(()=>event.target.textContent='複製',1200);});}

  S.cal={...S.region.cal};
  document.querySelectorAll('.region-card').forEach(c=>c.classList.remove('sel'));

    `<div class="sr-chip" id="srChipAll" onclick="app.togSubAll()">${allLabel}<br><span style="font-size:13px;opacity:.6">全部區域</span></div>` +
    S.region.subs.map(sr=>`
    <div class="sr-chip" id="srChip-${sr.id}" onclick="app.togSub(this,'${sr.id}')">${sr.name}<br><span style="font-size:13px;opacity:.6">${sr.desc}</span></div>
  `).join('');
  renderCal();
}

function togSubAll(){
  const allChip=document.getElementById('srChipAll');
  const allIds=S.region.subs.map(s=>s.id);
  const isAllSelected=allIds.every(id=>S.subRegions.includes(id));
  if(isAllSelected){
    // 取消全選
    S.subRegions=[];
    allChip.classList.remove('sel');
    S.region.subs.forEach(sr=>{
      const c=document.getElementById('srChip-'+sr.id);
      if(c)c.classList.remove('sel');
    });
  }else{
    // 全選
    S.subRegions=[...allIds];
    allChip.classList.add('sel');
    S.region.subs.forEach(sr=>{
      const c=document.getElementById('srChip-'+sr.id);
      if(c)c.classList.add('sel');
    });
  }
}

function togSub(el,id){
  el.classList.toggle('sel');
  if(S.subRegions.includes(id))S.subRegions=S.subRegions.filter(x=>x!==id);
  else S.subRegions.push(id);
  // 同步全域 chip 狀態
  const allIds=S.region.subs.map(s=>s.id);
  const allChip=document.getElementById('srChipAll');
  if(allChip){
    if(allIds.every(id=>S.subRegions.includes(id))) allChip.classList.add('sel');
    else allChip.classList.remove('sel');
  }
}

          <div class="sc-top">

          <div class="sc-track-row">
            <div class="sc-track-wrap" id="tw_${it.k}">

                <div class="sc-track-fill" id="tf_${it.k}" style="width:${pct}%"></div>
              </div>
              <div class="sc-thumb" id="th_${it.k}" style="left:${pct}%"></div>
              <input type="range" class="sc-input" min="0" max="${it.max}" value="${v}"
                oninput="(function(el,k,max,neg){
                  const val=+el.value;
                  S.cal[k]=val;
                  const p=Math.round(val/max*100);
                  document.getElementById('tf_'+k).style.width=p+'%';
                  document.getElementById('th_'+k).style.left=p+'%';
                  document.getElementById('cv_'+k).textContent=neg?'-'+val+'%':val;
                })(this,'${it.k}',${it.max},${isNeg})">
            </div>
            <div class="sc-val" id="cv_${it.k}">${fmt(v)}</div>
          </div>
        </div>
      </div>`;
    }).join('');
  });
}

// ── OCEAN 五大人格模型 ──
// O=開放性 C=盡責性 E=外向性 A=親和性 N=神經質
// 每個維度 1-100，影響量化分數和質性語氣
function generateOCEAN(age, jobCat, lifeLabel){
  // 基礎隨機（40-70 區間）+ 職業/年齡/生命週期偏移
  const base=()=>RI(40,70);
  let O=base(), C=base(), E=base(), A=base(), N=base();
  // 職業偏移
  if(jobCat==='tech'||jobCat==='creative') O+=RI(5,15); // 科技/創意 → 高開放性
  if(jobCat==='gov') C+=RI(5,12); // 公職 → 高盡責性
  if(jobCat==='self') O+=RI(5,10), N+=RI(3,8); // 創業者 → 高開放、高壓力
  if(jobCat==='medical') C+=RI(5,10), A+=RI(5,10); // 醫療 → 高盡責、高親和
  // 年齡偏移
  if(age<25) O+=RI(3,8), N+=RI(3,8); // 年輕 → 高開放、高神經質
  if(age>45) C+=RI(3,8), E-=RI(3,8); // 年長 → 高盡責、低外向
  // 生命週期
  if(lifeLabel==='有幼兒'||lifeLabel==='有學齡兒') N+=RI(3,8), C+=RI(3,5);
  if(lifeLabel==='空巢') A+=RI(5,10), N-=RI(3,8);
  return{O:Math.min(100,Math.max(1,O)),C:Math.min(100,Math.max(1,C)),E:Math.min(100,Math.max(1,E)),A:Math.min(100,Math.max(1,A)),N:Math.min(100,Math.max(1,N))};
}
// OCEAN → 行為標籤（用在 persona card 和質性引擎裡）
function oceanToTraits(o){
  const tags=[];
  if(o.O>=65) tags.push('早鳥嘗試者'); else if(o.O<=35) tags.push('習慣依賴型');
  if(o.C>=65) tags.push('謹慎評估者'); else if(o.C<=35) tags.push('衝動決策型');
  if(o.E>=65) tags.push('口碑驅動'); else if(o.E<=35) tags.push('獨立判斷型');
  if(o.A>=65) tags.push('從眾傾向'); else if(o.A<=35) tags.push('特立獨行');
  if(o.N>=65) tags.push('價格敏感'); else if(o.N<=35) tags.push('風險容忍型');
  // 台灣文化特質
  if(o.A>=60 && o.E>=50) tags.push('LINE群組活躍');
  if(o.C>=60 && o.N>=55) tags.push('重視CP值');
  return tags.slice(0,3); // 最多3個標籤
}
// OCEAN → 溝通風格
function oceanToCom(o){
  if(o.A>=65 && o.E<=40) return '委婉迴避型';
  if(o.E>=65 && o.A<=45) return '直接爽快型';
  if(o.E<=35 && o.N>=55) return '沉默觀察型';
  if(o.E>=55 && o.A>=55) return '社交驗證型';
  if(o.C>=60 && o.N>=50) return '精打細算型';
  return R(['委婉迴避型','直接爽快型','社交驗證型','精打細算型']);
}
const R=a=>a[Math.floor(Math.random()*a.length)];
const RI=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

// 根據受眾設定解析可用職業池（加上 cat 欄位）
function resolveJobs(){
  const jobs=S.aud.jobs.length>0 ? S.aud.jobs : Object.keys(TW.jobMap);
  let pool=[];
  jobs.forEach(k=>{ if(TW.jobMap[k]) pool=pool.concat(TW.jobMap[k].map(j=>({...j,cat:k}))); });
  return pool.length>0 ? pool : [{t:'上班族',i:'40-60K',cat:'trad'}];
}

// 根據年齡設定解析年齡範圍
function resolveAge(){
  const ages=S.aud.age.length>0 ? S.aud.age : ['25-35','35-45'];
  const bucket=R(ages); // 從選定的區間隨機選一個
  const [lo,hi]=TW.ageMap[bucket]||[25,45];
  return RI(lo,hi);
}

// 根據性別設定決定性別
function resolveGender(i, total){
  const bias=S.aud.genderBias;
  if(bias==='male') return Math.random()>.2 ? '男' : '女';
  if(bias==='female') return Math.random()>.2 ? '女' : '男';
  if(bias==='balanced') return i < Math.floor(total/2) ? '男' : '女';
  return Math.random()>.5 ? '女' : '男'; // any
}

// 解析收入影響訂閱態度
function resolveSubAtt(){
  const inc=S.aud.income;
  if(inc.includes('100-200k')||inc.includes('over200k')) return Math.random()>.3?'接受':'抗拒';
  if(inc.includes('under30k')) return Math.random()>.8?'接受':'抗拒';
  return Math.random()>.55?'接受':'抗拒';
}

// 生命週期標籤
function resolveLifeLabel(){
  const life=S.aud.life;
  if(life.length===0) return '';
  return TW.lifeLabel[R(life)]||'';
}

function parseCustomQuestions(){
  const raw=(document.getElementById('customQInput')?.value||'').trim();
  if(!raw) return [];
  return raw.split('\n').filter(l=>l.trim()).map((line,i)=>{
    const isQuant=line.trim().startsWith('[Q]');
    const isQual=line.trim().startsWith('[A]');
    const text=line.replace(/^\[Q\]\s*|\[A\]\s*/,'').trim();
    return{q:text,t:isQuant?'quant':'qual',d:text.slice(0,8)+'...'};
  });
}

// ── 質性回答引擎 ── 依受訪者職業/地區/特質/生命週期生成個性化回答
function genAns(p,q){
  if(q.t==='quant'){
    // ── 維度種子——不同維度有不同的基礎偏移 ──
    const dimSeed=(q.d||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%5-2;
    let b=RI(3,8)+dimSeed;

    // ── persona 個體差異 ──
    b+=((p.id*7+13)%5)-2;

    // ── 產品文件影響分數（核心修正）──
    const prod=S.product||{};
    // 有明確痛點描述 → 痛點/概念/行動相關維度加分
    if(prod.problem && (q.d.includes('痛點')||q.d.includes('意願')||q.d.includes('行動')||q.d.includes('導入')||q.d.includes('衝擊')))
      b+=RI(1,2);
    // 沒有痛點描述 → 這些維度扣分（概念模糊）
    if(!prod.problem && (q.d.includes('意願')||q.d.includes('行動')||q.d.includes('導入')))
      b-=1;
    // 有定價資訊 → 價格/CP值/付費相關維度更穩定（不扣分或小加分）
    if(prod.pricing && (q.d.includes('價')||q.d.includes('付')||q.d.includes('CP')||q.d.includes('預算')))
      b+=1;
    // 沒有定價 → 這些維度不確定性高，分散
    if(!prod.pricing && (q.d.includes('價')||q.d.includes('CP')||q.d.includes('TCO')))
      b-=RI(0,1);
    // 有競品描述 → 差異化/轉換/優勢維度加分
    if(prod.compete && (q.d.includes('差異')||q.d.includes('轉換')||q.d.includes('優勢')||q.d.includes('競品')))
      b+=1;
    // 有受眾描述 → 推薦/NPS 維度加分（定位清晰）
    if(prod.audience && (q.d.includes('推薦')||q.d.includes('NPS')||q.d.includes('價值')))
      b+=RI(0,1);
    // 產品描述完整度 bonus（欄位越多越完整，基礎信心越高）
    const completeness=[prod.name,prod.desc,prod.problem,prod.pricing,prod.compete,prod.audience].filter(Boolean).length;
    if(completeness>=4 && (q.d.includes('意願')||q.d.includes('推薦'))) b+=1;
    if(completeness<=1) b-=1; // 文件幾乎空白，所有維度下壓

    // ── 溝通風格 ──
    if(p.com==='委婉迴避型'||p.com==='技術審慎型')b+=1;
    if(p.com==='直接爽快型'||p.com==='直接務實型')b-=RI(0,1);

    // ── 付費/預算類維度 ──
    if((q.d.includes('付')||q.d.includes('預算')||q.d.includes('CP')||q.d.includes('TCO')||q.d.includes('ROI'))&&p.subAtt==='抗拒')b-=2;

    // ── OCEAN 人格影響 ──
    if(p.ocean){
      if(p.ocean.O>=65) b+=1;   // 高開放性 → 更願意嘗試
      if(p.ocean.O<=35) b-=1;   // 低開放性 → 抗拒新事物
      if(p.ocean.C>=65 && (q.d.includes('意願')||q.d.includes('推薦'))) b-=1; // 高盡責 → 更謹慎
      if(p.ocean.N>=65 && (q.d.includes('價')||q.d.includes('付')||q.d.includes('CP'))) b-=1; // 高神經質 → 價格焦慮
      if(p.ocean.E>=65 && q.d.includes('推薦')) b+=1; // 高外向 → 更願意推薦
    }
    // ── 特質（從 OCEAN 衍生）──
    if(p.traits.includes('謹慎評估者'))b-=1;
    if(p.traits.includes('早鳥嘗試者'))b+=1;
    if(p.traits.includes('價格敏感')&&q.d.includes('價'))b-=1;

    // ── B2B 角色差異 ──
    if(S.audType==='b2b'){
      if(p.companySize==='large'||p.companySize==='enterprise')b-=1;
      if(p.roleKey==='finance')b-=RI(1,2);
      if(p.roleKey==='champion')b+=1;
      if(p.roleKey==='end_user'&&(q.d.includes('上手')||q.d.includes('直覺')))b+=RI(0,1);
      if(p.roleKey==='decision_maker'&&q.d.includes('ROI'))b-=1; // CEO 對 ROI 更嚴格
    }

    // ── 期望指標影響（用戶越關注的維度，評分越嚴格）──
    const metricDimMap={
      nps:['NPS','推薦','B2B NPS'],
      intent:['意願','行動','導入','POC','採用'],
      pain:['痛點','衝擊','急迫','強度'],
      switch:['轉換','遷移','鎖定','阻力'],
      viral:['推薦','口碑','NPS'],
      culture:['文化','在地','CP值'],
    };
    const selectedMetrics=S.metrics||[];
    for(const m of selectedMetrics){
      const dims=metricDimMap[m]||[];
      if(dims.some(kw=>q.d.includes(kw))){
        b-=1; // 關注的維度更嚴格——模擬「高期望 = 更挑剔」
        break;
      }
    }

    // ── 對抗性 persona（skeptic）──
    if(p.skeptic){
      b-=RI(2,3); // skeptics 整體分數下調 2-3 分
    }

    // ── 文化校正 ──
    b-=Math.round(S.cal.positivity/10);
    b=Math.max(1,Math.min(10,b));
    return{score:b,text:`${b}/10`,t:'quant'};
  }

  // ── B2B 質性引擎 ──
  if(S.audType==='b2b' && p.roleKey){
    const b2bVoice = {
      decision_maker: ()=>R([

      finance: ()=>R([
        `我的角色是控管成本。${S.product.problem?'需求面可以讓業務部門去評估，':''}我看的是——年度TCO是多少？隱藏成本在哪裡？${p.sizeCtx?` ${p.empCount}人規模的公司，`:''}每一筆IT支出都要過我這關。`,

      champion: ()=>R([

    const voice=(b2bVoice[p.roleKey]||b2bVoice.evaluator)();
    const comWrap=p.com==='技術審慎型'?t=>t+' 不過這些都要經過測試才知道。'
      :p.com==='成本導向型'?t=>t+' 總之，成本是關鍵。'

    // B2B skeptic 質性修飾
    const b2bSkeptic = p.skeptic ? (t) => {

  }

  // 地域語氣（台灣北/南/竹科 + 香港 + 澳門）
  const northernFlair = ['台北','新北','基隆','桃園'].some(c=>p.loc.includes(c));

  const accent = sgFlair ? R(['Actually hor，','Honestly ah，','Wah，','Eh actually，']) :
                 myFlair ? R(['其實啦，','老實講啦，','怎麼說呢，','吃飯先講啦，']) :

                 R(['嗯，','這樣說好了，','其實，']);

  // 職業視角（以 jobCat 作為 key，對應 TW.jobMap 的類別）
  const jobLens = {

    self: ()=>R([
      `${accent}接案${p.age-25}年，工具選擇我很快決定。${S.product.problem?'這個痛點我太有感了，一直找不到夠好的解法。':'市場上已經有幾個類似的，你跟他們有什麼不同？'}`,

    ]),
    creative: ()=>R([
      `${accent}作為${p.job}，我比一般人更在意介面和體驗。${S.product.desc?'第一印象還不錯，但細節決定一切。':'光聽說明還想不到具體怎麼用在我的工作流程裡。'}`,
      `${accent}台灣設計圈圈子小，${S.cal.social>60?'大家用什麼工具傳播很快，口碑比廣告重要多了。':'通常我自己試了覺得好，才會跟同行推薦。'}${S.product.problem?'這個問題在設計工作上確實存在。':''}`,
      `${accent}${p.subAtt==='抗拒'?'接案收入不穩定，月費工具我傾向用免費版撐著，真的必要才升級。':'設計師工具我不太省，好用就付。'}有沒有提供作品集展示或分享功能？`,
    ]),
  };

  // 用 p.jobCat 直接查表，找不到就用 null（進 fallback）
  const jobVoice = (jobLens[p.jobCat] || null)?.();

  // 特質影響
  const traitMod = p.traits.includes('謹慎評估者') ? R([
    `不過我做決定前通常要看過評價和比較過幾個選項。`,
    `我會想先了解有沒有免費試用，或者看看有沒有退款保障。`,
  ]) : p.traits.includes('早鳥嘗試者') ? R([
    `這種新工具我通常會第一時間試試，不怕踩坑。`,
    `反正試試看，不行再說，這類東西我通常直接上。`,
  ]) : p.traits.includes('CP值達人') ? R([
    `不過說到底，要讓我掏錢，CP值要說服我。`,
    `有沒有年繳折扣或早鳥方案？這些細節我會注意。`,
  ]) : '';

  // 溝通風格修飾
  const styleWrap = p.com==='委婉迴避型'
    ? t=>`${t}（停頓）⋯⋯應該是這樣。`
    : p.com==='直接回饋型'
    ? t=>`${t} 就這樣。`
    : t=>t;

  // 生命週期語境
  const lifeCtx = p.lifeLabel==='有幼兒（0–6歲）' ? `以現在有小孩的狀況來說，`
    : p.lifeLabel==='單身上班族' ? `一個人生活，不需要跟另一半商量，`
    : p.lifeLabel==='空巢／退休' ? `退休後時間比較多，`
    : '';

  // 文化訊號
  const cultureNote = S.cal.ptt>50?'PTT 輿論可能影響此回答'
    : S.cal.face>60?'面子文化可能壓抑了真實負面態度'
    : S.cal.line>70?'LINE 群組口碑可能影響決策'
    : '';

  // 產品資訊快取（讓 fallback 引用完整欄位）
  const prod=S.product||{};
  const hasCompete=!!prod.compete, hasPricing=!!prod.pricing, hasAudience=!!prod.audience;
  const compSnip=hasCompete?prod.compete.slice(0,18):'';
  const priceSnip=hasPricing?prod.pricing.slice(0,18):'';

  // 組合回答（fallback pool 引用完整產品資料）
  const fallbackPool = [
    `${accent}${lifeCtx}${prod.problem?`我之前有想過「${prod.problem.slice(0,16)}」這個問題，但一直沒找到合適的工具。`:'這個方向我覺得有機會，但還需要看看實際操作起來怎樣。'}${p.traits[0]==='口碑驅動'||S.cal.social>65?' 我習慣先問問身邊有沒有人試過，再決定要不要花時間。':''}`,
    `${accent}${lifeCtx}說真的，${p.job}這份工作讓我接觸過不少類似定位的工具。${hasCompete?`你提到的「${compSnip}...」我有聽過，你跟他們差在哪？`:'大多用了一、兩個月就沒繼續了。'}${prod.problem?'你說的需求是真實的，關鍵是執行面有沒有做到位。':'要說服我切換，需要更具體的理由。'}`,
    `${accent}${lifeCtx}${hasPricing?`你們的定價「${priceSnip}...」——${p.subAtt==='抗拒'?'這個價位我要考慮一下。':'我可以接受，重點是持續有在更新。'}`:`${p.subAtt==='抗拒'?'我對月費制比較謹慎——怕又是一個付了不用的。':'訂閱OK，前提是服務要持續進化。'}`}${prod.problem?' 問題本身我認可，重點是完成度。':''}`,
    `${accent}${p.lifeLabel?`以我現在${p.lifeLabel}的狀況，`:''}${R([`時間比金錢更稀缺，工具複雜一點點我就會放棄。`,`我每天已經在用${RI(4,9)}個工具，多一個的理由要夠強。`,`新功能我通常要試過才知道好不好用，光看說明不夠。`])}${prod.problem?'不過這個痛點我確實有，如果真的解決了，費用不是問題。':''}`,
    `${accent}我在${p.loc}，${p.age}歲，${p.job}。${hasAudience?`你說目標受眾是「${prod.audience.slice(0,14)}...」——我${prod.audience.toLowerCase().includes(p.job.slice(0,2))?'確實符合':'不太確定自己算不算核心用戶'}。`:(prod.problem?`「${prod.problem.slice(0,18)}」——這句話說到我了。`:'這個定位有點模糊，目標用戶到底是誰？')}${p.com==='沉默觀察型'?' 我通常觀望再決定。':' 有試用的話我可以直接試。'}`,
    `${accent}台灣的數位工具市場很特別。${S.cal.cvs>60?'超商、LINE、行動支付——這三個沒串好，很多人第一關就卡住。':S.cal.line>70?'LINE的整合在台灣幾乎是標配。':''}${prod.problem?'不過你說的問題是真實的，這個市場有缺口。':''}${hasCompete?` 跟「${compSnip}...」比，你的差異化要說清楚。`:''}`,
  ];
  const baseText = jobVoice || (fallbackPool[p.id % fallbackPool.length]);

  // 對抗性 persona（skeptic）質性修飾——增加懷疑、抗拒、批判語氣
  const skepticWrap = p.skeptic ? (t) => {
    const skepticPrefix = R([
      '坦白說我對這類產品已經有點免疫了。',
      '我之前踩過太多坑，現在看到新工具第一反應是懷疑。',
      '不好意思，我先潑個冷水——',
      '我先說結論：我目前沒有換工具的打算。',
      '聽起來很美好，但我的經驗告訴我要保留。',
    ]);
    const skepticSuffix = R([
      ' 除非你能證明跟我現在用的有本質差距，不然我不太會動。',
      ' 市場上說自己「革命性」的產品太多了，真正留下來的沒幾個。',
      ' 我建議你們先想清楚，為什麼已經有人在做了，你們還要做？',
      ' 我會觀望至少半年，看看第一批用戶的評價再說。',
      ' 說實在的，解決我10%的痛點不足以讓我花這個錢。',
      ' 你要說服我的不是功能多好，而是為什麼我「現在」就要換。',
    ]);
    return skepticPrefix + ' ' + t + skepticSuffix;
  } : t => t;

  const finalText = styleWrap(skepticWrap(baseText + (traitMod?' '+traitMod:'')));
  return{text:finalText, t:'qual', culture:cultureNote};
}

// ========================================
// RESEARCH EXECUTION
// ========================================
async function startResearch(){
  try{
  curPhase=2;
  PH.forEach((p,i)=>document.getElementById(p).classList.toggle('hidden',i!==2));
  renderSteps();
  scrollContentTop();

  const n=S.aud.sampleSize||16;
  const mkFn=S.audType==='b2b'?mkB2BPersona:mkPersona;
  S.personas=[];for(let i=0;i<n;i++)S.personas.push(mkFn(i,n));
  // 對抗性驗證：標記 ~20% personas 為 skeptic（拒絕者/懷疑者）
  const skepticCount = Math.max(2, Math.round(n * 0.2));
  const skepticIndices = [];
  while(skepticIndices.length < skepticCount) {
    const ri = Math.floor(Math.random() * n);
    if(!skepticIndices.includes(ri)) skepticIndices.push(ri);
  }
  skepticIndices.forEach(si => {
    S.personas[si].skeptic = true;
    S.personas[si].traits = [...S.personas[si].traits.slice(0,1), '對新產品持保留態度'];
  });
  const qs=getQuestions(S.rt);

  const audSummary=[...new Set(S.aud.age)].join('、')||'各年齡';
  // 讀取核心假設
  const hypoEl=document.getElementById('hypo');
  if(hypoEl && hypoEl.value) S.hypo=hypoEl.value;
  document.getElementById('execDesc').textContent=`正在對「${S.product.name||S.file?.name||'產品'}」執行 ${S.rt} 研究，${n} 位合成用戶（${audSummary} 歲・${S.region?.name||'台灣'}）`;

  // Show personas
  const pg=document.getElementById('personaGrid');
  document.getElementById('personaWrap').classList.remove('hidden');
  const show=Math.min(6,n);
  pg.innerHTML=S.personas.slice(0,show).map(p=>`
    <div class="persona-mini">
      <div class="pm-name"><span class="pm-initial">${p.initial}</span>${p.name}</div>
      <div class="pm-demo">${p.age}歲 ${p.gender}｜${p.job}｜${p.loc}</div>
      <div class="pm-tags">
        ${p.lifeLabel?`<span class="pm-tag" style="background:rgba(124,92,252,.12);color:var(--gold)">${p.lifeLabel}</span>`:''}
        ${p.roleFocus?`<span class="pm-tag" style="background:rgba(108,75,219,.08);color:var(--violet)">${p.roleFocus.split('、')[0]}</span>`:''}
        ${p.traits.map(t=>`<span class="pm-tag">${t}</span>`).join('')}
        <span class="pm-tag" style="background:rgba(10,143,108,.08);color:var(--teal)">${p.com}</span>
        ${p.ocean?`<span class="pm-tag" style="background:rgba(124,92,252,.08);color:var(--gold);font-family:var(--font-mono);font-size:13px;letter-spacing:.3px">O${Math.round(p.ocean.O/10)} C${Math.round(p.ocean.C/10)} E${Math.round(p.ocean.E/10)} A${Math.round(p.ocean.A/10)} N${Math.round(p.ocean.N/10)}</span>`:''}
      </div>
    </div>
  `).join('')+(n>show?`<div class="persona-mini" style="display:flex;align-items:center;justify-content:center;color:var(--ink-dim)">+${n-show} 位</div>`:'');

  document.getElementById('logWrap').classList.remove('hidden');
  const log=document.getElementById('logArea');log.innerHTML='';

  // ── 對話式訪談引擎（每個 persona 獨立 3-4 輪 Q&A）──
  const allR=[];
  S.interviews=[]; // 儲存完整對話記錄
  const totalSteps=n*qs.length;let done=0;

  // 生成追問（根據前一個回答內容決定）
  function genFollowUp(prevAns, q, p){
    if(q.t==='quant') return null;
    const followUps=[
      {cond:()=>prevAns.text.includes('月費')||prevAns.text.includes('訂閱'),
       q:'你對月費制具體的猶豫點是什麼？有什麼方式可以說服你？',d:'定價阻力追問'},
      {cond:()=>prevAns.text.includes('競品')||prevAns.text.includes('類似'),
       q:'你用過的類似產品具體是哪個？它最大的優缺點？',d:'競品深探'},
      {cond:()=>prevAns.text.includes('不確定')||prevAns.text.includes('觀望'),
       q:'什麼條件達成你就會從觀望變成行動？',d:'轉化觸發點'},
      {cond:()=>prevAns.text.includes('朋友')||prevAns.text.includes('PTT')||prevAns.text.includes('LINE'),
       q:'你通常在哪些管道獲取這類產品的資訊？最信任哪個來源？',d:'資訊管道偏好'},
      {cond:()=>prevAns.text.includes('痛點')||prevAns.text.includes('問題'),
       q:'這個問題在你日常生活中大概多久遇到一次？影響程度？',d:'痛點頻率深探'},
      {cond:()=>p.ocean&&p.ocean.N>=60,
       q:'如果這個工具出了問題或不符預期，你會怎麼做？',d:'風險態度'},
      {cond:()=>p.ocean&&p.ocean.O>=65,
       q:'如果可以改一個功能，你最想要什麼？',d:'創新期望'},
    ];
    const match=followUps.find(f=>f.cond());
    return match?{q:match.q,t:'qual',d:match.d,isFollowUp:true}:null;
  }

  // AI 引擎上下文
  const aiAvailable = window.PATH_AI && (window.PATH_AI.getState().isAvailable || window.PATH_AI.getConfig().devMode);
  let aiUsedCount = 0, aiFallbackCount = 0;

  // 逐 persona 進行對話
  for(const p of S.personas){
    const transcript=[];
    log.innerHTML+=`<div class="log-persona-header"><span class="pm-initial" style="width:18px;height:18px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--gold-soft);border:1px solid var(--gold-med);color:var(--gold);vertical-align:-3px">${p.initial}</span> <strong>${p.name}</strong> <span style="color:var(--ink-dim);font-size:13px">${p.age}歲 ${p.job} ${p.loc}</span>${aiAvailable?'<span style="font-size:13px;color:var(--gold);background:rgba(124,92,252,.12);padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:700;letter-spacing:.5px">AI</span>':''}</div>`;

    // 準備 AI 上下文（per-persona，只建立一次）
    const aiCtx = aiAvailable ? {
      persona: { name:p.name, age:p.age, gender:p.gender, job:p.job, jobCat:p.jobCat, loc:p.loc, lifeLabel:p.lifeLabel, com:p.com, traits:p.traits, ocean:p.ocean, roleKey:p.roleKey, roleFocus:p.roleFocus, skeptic:!!p.skeptic },
      product: S.product,
      stage: S.stage,
      researchType: S.rt,
      region: S.region?.name || '台灣',
      calibration: S.cal,
    } : null;

    for(const q of qs){
      // ── 雙軌引擎：先嘗試 AI，失敗則 fallback 到規則引擎 ──
      let ans;
      let isAIGenerated = false;

      if(aiAvailable && q.t === 'qual'){
        // 質性題用 AI 生成
        try {
          const aiResult = await window.PATH_AI.interviewAI(aiCtx, q.q);
          if(aiResult.text){
            ans = { text: aiResult.text, t: 'qual', culture: '' };
            isAIGenerated = true;
            aiUsedCount++;
          }
        } catch(e) { /* fallback below */ }
      }

      if(!ans){
        // 規則引擎 fallback（量化題永遠走規則引擎）
        ans = genAns(p, q);
        if(aiAvailable && q.t === 'qual') aiFallbackCount++;
      }

      transcript.push({role:'interviewer',text:q.q,dim:q.d});
      transcript.push({role:'user',text:ans.text,type:ans.t,isAI:isAIGenerated});
      allR.push({q,persona:p,answer:ans});

      // 研究記錄：chat bubble 格式（AI 回覆加微標記）
      const aiTag = isAIGenerated ? '<span style="font-size:8px;color:var(--gold);background:rgba(124,92,252,.1);padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:1px;font-weight:600">AI</span>' : '';
      if(q.t==='quant'){
        log.innerHTML+=`<div class="log-chat"><div class="log-chat-q">${q.q}</div><div class="log-chat-a"><strong>${ans.text}</strong></div></div>`;
      } else {
        log.innerHTML+=`<div class="log-chat"><div class="log-chat-q">${q.q}</div><div class="log-chat-a">${ans.text}${aiTag}</div></div>`;
      }

      // 追問邏輯
      if(q.t==='qual'){
        const fu=genFollowUp(ans,q,p);
        if(fu){
          let fuAns;
          let fuIsAI = false;

          if(aiAvailable){
            try {
              const fuAiResult = await window.PATH_AI.interviewAI(aiCtx, fu.q);
              if(fuAiResult.text){
                fuAns = { text: fuAiResult.text, t: 'qual', culture: '' };
                fuIsAI = true;
                aiUsedCount++;
              }
            } catch(e) { /* fallback */ }
          }
          if(!fuAns) fuAns = genAns(p, fu);

          transcript.push({role:'interviewer',text:fu.q,dim:fu.d,isFollowUp:true});
          transcript.push({role:'user',text:fuAns.text,type:fuAns.t,isAI:fuIsAI});
          const fuAiTag = fuIsAI ? '<span style="font-size:8px;color:var(--gold);background:rgba(124,92,252,.1);padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:1px;font-weight:600">AI</span>' : '';
          log.innerHTML+=`<div class="log-chat log-chat-followup"><div class="log-chat-q" style="color:var(--violet)">↳ ${fu.q}</div><div class="log-chat-a">${fuAns.text}${fuAiTag}</div></div>`;
          allR.push({q:fu,persona:p,answer:fuAns});
        }
      }

      done++;
      const pct=Math.round(done/totalSteps*100);
      document.getElementById('progFill').style.width=pct+'%';
      document.getElementById('progPct').textContent=pct+'%';
      document.getElementById('progLabel').textContent=`訪談中：${p.name}${isAIGenerated?' · AI':''}`;
      await new Promise(r=>setTimeout(r, aiAvailable ? 50+Math.random()*80 : 20+Math.random()*35));
    }
    log.innerHTML+=`<div style="height:1px;background:var(--border);margin:8px 0"></div>`;
    S.interviews.push({persona:p, transcript});
    log.scrollTop=log.scrollHeight;
  }
  // 記錄 AI 使用統計
  S.aiStats = { used: aiUsedCount, fallback: aiFallbackCount, available: aiAvailable };

  // ── Calculate results ──
  S.results.quant={};S.results.qual=[];
  const quantMap={};
  allR.forEach(({q,persona,answer})=>{
    if(q.t==='quant'){
      if(!quantMap[q.d]) quantMap[q.d]=[];
      quantMap[q.d].push(answer.score);
    } else {
      // 找到或建立 qual dim
      let existing=S.results.qual.find(x=>x.dim===q.d);
      if(!existing){existing={dim:q.d,samples:[]};S.results.qual.push(existing);}
      if(existing.samples.length<6) existing.samples.push({name:persona.name,text:answer.text});
    }
  });
  Object.entries(quantMap).forEach(([d,scores])=>{
    const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
    const sd=Math.sqrt(scores.reduce((a,b)=>a+Math.pow(b-avg,2),0)/scores.length);
    S.results.quant[d]={avg:+avg.toFixed(1),sd:+sd.toFixed(1)};
  });

  document.getElementById('progLabel').textContent=`${n} 場訪談完成`;
  const vBtn=document.getElementById('viewResultBtn');
  vBtn.classList.remove('hidden');
  vBtn.style.animation='pulse 1.5s ease infinite';
  setTimeout(()=>vBtn.scrollIntoView({behavior:'smooth',block:'center'}),300);
  }catch(err){showToast('研究過程發生錯誤，請重試');console.error(err);}
}

// ========================================
// RESULTS RENDER
// ========================================
function renderResults(){
  const Q=S.results.quant;
  const n=S.aud.sampleSize||16;
  const acc=calcAccuracy();
  const confRange=acc.range;
  const rtLabel={concept:'概念驗證',pain:'痛點深掘',pricing:'定價測試',compete:'競品比較',retain:'留存驗證',custom:'自定義'};
  const entries=Object.entries(Q);
  const sorted=[...entries].sort((a,b)=>b[1].avg-a[1].avg);
  const topDim=sorted[0], botDim=sorted[sorted.length-1];
  const prodName=S.product.name||'產品';
  const regionName=S.region?.name||'台灣';

  // ── ① Hero ──
  const overallAvg=entries.length
    ? (entries.reduce((s,[,v])=>s+v.avg,0)/entries.length).toFixed(1) : '—';
  const overallColor=+overallAvg>=7?'var(--teal)':+overallAvg>=5?'var(--gold)':'var(--violet)';
  document.getElementById('rptMeta').innerHTML=
    `<div class="rhm-dot"></div>PATH 受眾研究室 · ${rtLabel[S.rt]||S.rt} · ${regionName} · ${n} 位合成用戶`;
  document.getElementById('rptProduct').innerHTML=
    `<span>${prodName}</span> 研究報告`;
  // Hero score cards: overall + per-dim
  const heroCards=[
    {val:overallAvg, dim:'綜合平均分', col:overallColor, bar:Math.round(+overallAvg/10*100)},
    {val:`${confRange}`, dim:'研究品質 RQS', col:'var(--violet)', bar:Math.round(acc.rqs)},
    {val:entries.length, dim:'評分維度數', col:'var(--gold)', bar:Math.min(100,entries.length*20)},
    {val:n, dim:'合成用戶數', col:'var(--teal)', bar:Math.min(100,n/64*100)},
  ];
  document.getElementById('rptScores').innerHTML=heroCards.map(c=>`
    <div class="rhs-card">
      <div class="rhs-val" style="color:${c.col}">${c.val}</div>
      <div class="rhs-dim">${c.dim}</div>
      <div class="rhs-bar"><div class="rhs-bar-fill" style="width:${c.bar}%;background:${c.col}"></div></div>
    </div>`).join('');

  // ── ①b Summary（自然語言摘要）──
  const summaryEl=document.getElementById('rptSummary');
  if(summaryEl && entries.length>0){
    const avgScore=+overallAvg;
    const sentiment=avgScore>=7?'正面':'偏中性，仍有提升空間';
    const topName=topDim?topDim[0]:'—';
    const botName=botDim?botDim[0]:'—';
    const highSD=entries.filter(([,v])=>v.sd>2.5);
    // 產品資料完整度判斷
    const prod=S.product||{};
    const prodFields=[prod.name,prod.desc,prod.problem,prod.pricing,prod.compete,prod.audience].filter(Boolean).length;
    const validationLevel=prodFields>=4?'方向性驗證':prodFields>=2?'初步探索':'概念測試';
    const validationColor=prodFields>=4?'var(--teal)':prodFields>=2?'var(--amber)':'var(--ink-dim)';
    // RQS 聲明 — 使用 calcAccuracy 模型
    const rqsRange=acc.range;
    const missingProd=6-acc.prodFieldCount;
    const missingAud=5-acc.audDimCount;
    const proA=calcAccuracy({sampleSize:128,isPro:true,product:{name:'x',desc:'x',problem:'x',pricing:'x',compete:'x',audience:'x'},aud:{age:['25-35'],jobs:['tech'],income:['50-100k'],life:['single']},region:{id:'tw'}});
    let prodNote=`研究品質分數 RQS ${rqsRange}（樣本${n}人 +${acc.sampleBase} · 產品資料 +${acc.prodBonus} · 受眾精準度 +${acc.audBonus}）`;
    if(missingProd>2||missingAud>2){
      prodNote+=`。`;
      const tips=[];
      if(missingProd>2) tips.push(`補充產品資料（缺 ${missingProd} 項）可再提升約 +${Math.round((4-acc.prodBonus)*10)/10}`);
      if(missingAud>2) tips.push(`精準化受眾描述（缺 ${missingAud} 維）可再提升約 +${Math.round((3-acc.audBonus)*10)/10}`);
      prodNote+=tips.join('；');
      prodNote+=`。Pro 方案 RQS 上限 ${proA.proMax}。`;
    } else if(acc.rqs<83){
      prodNote+=`。Pro 方案（128 人 + 完整因子）RQS 上限 ${proA.proMax}。`;
    } else {
      prodNote+=`${S.aiStats?.used>0?' · AI 增強':''}。已接近 Free 上限，Pro 方案 RQS 上限 ${proA.proMax}。`;
    }

    let summaryHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap"><span style="font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:${validationColor};background:${validationColor}15;padding:3px 10px;border-radius:100px;border:1px solid ${validationColor}30">${validationLevel}</span><span style="font-size:13px;color:var(--ink-dim)">${prodNote}</span></div>`;
    summaryHTML+=`本次研究對 <strong>${prodName}</strong> 進行了 <span class="rs-highlight">${rtLabel[S.rt]||S.rt}</span> 驗證，共 <strong>${n}</strong> 位 ${regionName} 合成用戶參與。`;
    summaryHTML+=`綜合平均分 <strong>${overallAvg}/10</strong>，整體態度${sentiment}。`;
    if(S.hypo) summaryHTML+=`<div style="margin-top:10px;padding:10px 14px;background:var(--gold-soft);border-radius:8px;font-size:13px;color:var(--ink-soft)"><strong style="color:var(--gold);font-size:13px;letter-spacing:.8px;text-transform:uppercase">核心假設</strong><br>${S.hypo.slice(0,120)}${S.hypo.length>120?'...':''}</div>`;
    if(topDim) summaryHTML+=`其中「<strong>${topName}</strong>」表現最佳（${topDim[1].avg}/10），`;
    if(botDim && botDim[0]!==topName) summaryHTML+=`「<strong>${botName}</strong>」是最弱環節（${botDim[1].avg}/10）${botDim[1].avg<=4.5?'，需要重點關注':''}。`;
    if(highSD.length>0) summaryHTML+=`值得注意的是，「${highSD.map(([d])=>d).join('」「')}」出現明顯的意見分裂——代表受眾內部可能存在截然不同的細分群體。`;
    summaryEl.innerHTML=summaryHTML;
  }

  // ── ② Dim bars ──
  const dimColors=['var(--primary)','var(--teal)','var(--violet)','var(--gold)','var(--amber)','var(--rose)'];
  document.getElementById('rptDims').innerHTML=entries.map(([d,v],i)=>{
    const pct=Math.round(v.avg/10*100);
    const col=v.avg>=7?'var(--teal)':v.avg>=5?'var(--gold)':'var(--rose)';
    const accentCol=dimColors[i%6];
    const sdLabel=v.sd<1.5?'受眾看法一致':v.sd<2.5?'受眾看法略有分歧':'受眾意見明顯分裂';
    const sdColor=v.sd<1.5?'var(--teal)':v.sd<2.5?'var(--ink-dim)':'var(--amber)';
    const sdIcon=v.sd<1.5?'●':v.sd<2.5?'◐':'◑';
    return `<div class="rpt-dim" style="--dim-accent:${accentCol}">
      <div class="rd-label">${d}<span class="rd-sd" style="color:${sdColor}">${sdIcon} ${sdLabel}</span></div>
      <div class="rd-track"><div class="rd-track-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="rd-score" style="color:${col}">${v.avg}<small>/10</small></div>
    </div>`;
  }).join('');

  // ── ③ Qual voices（初始顯示 4 則，可展開全部）──
  const allVoices=S.results.qual;
  const totalQual=allVoices.reduce((s,q)=>s+q.samples.length,0);
  function renderVoiceCard(item, s){
    const persona=S.personas.find(p=>p.name===s.name)||{initial:s.name.slice(0,1),job:'',lifeLabel:''};
    const hasCulture=s.text.includes('PTT')||s.text.includes('LINE')||s.text.includes('超商');
    return `<div class="rpt-voice">
      <div class="rv-avatar">${persona.initial||s.name.slice(0,1)}</div>
      <div class="rv-body">
        <div class="rv-meta">
          <span class="rv-name">${s.name}</span>
          ${persona.job?`<span class="rv-tag">${persona.job}</span>`:''}
          ${persona.ocean?`<span class="rv-tag" style="background:rgba(124,92,252,.06);color:var(--gold);font-family:var(--font-mono);font-size:13px">O${Math.round(persona.ocean.O/10)} C${Math.round(persona.ocean.C/10)} E${Math.round(persona.ocean.E/10)}</span>`:''}
          <span class="rv-dim">${item.dim}</span>
        </div>
        <div class="rv-quote">${s.text}</div>
        ${hasCulture?`<div class="rv-culture"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c-1 2-2 4-2 6s1 4 2 6M8 2c1 2 2 4 2 6s-1 4-2 6"/></svg> 在地文化訊號</div>`:''}
      </div>
    </div>`;
  }
  // 初始只顯示前 4 則
  const initCards=allVoices.slice(0,2).flatMap(item=>item.samples.slice(0,2).map(s=>renderVoiceCard(item,s)));
  const allCards=allVoices.flatMap(item=>item.samples.slice(0,3).map(s=>renderVoiceCard(item,s)));
  const qa=document.getElementById('qualVoicesArea');
  qa.innerHTML=initCards.join('');
  if(allCards.length>initCards.length){
    // 儲存全部卡片供展開用
    window._allVoiceCards=allCards.join('');
    qa.innerHTML+=`<button class="log-expand-btn" onclick="document.getElementById('qualVoicesArea').innerHTML=window._allVoiceCards;app.showToast('已展開全部 ${allCards.length} 則聲音')">展開全部（共 ${allCards.length} 則 / ${totalQual} 則收錄）</button>`;
  }

  // ── ⑤ Insights ──
  const ins=[];
  if(topDim) ins.push({
    col:'var(--teal)',bg:'rgba(10,143,108,.1)',
    icon:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="1,11 5.5,6.5 8.5,9 15,2"/><polyline points="11,2 15,2 15,6"/></svg>`,
    tag:'最強信號',
    body:`「${topDim[0]}」拿到 <strong>${topDim[1].avg}/10</strong>，是本次最高分維度。${topDim[1].sd<1.5?'受眾態度高度一致，信號明確。':'受眾反應略有分散，建議真人確認。'}`
  });
  if(botDim&&botDim[0]!==topDim?.[0]) ins.push({
    col: botDim[1].avg<=4.5?'var(--amber)':'var(--gold)',
    bg:  botDim[1].avg<=4.5?'rgba(240,160,90,.1)':'rgba(124,92,252,.1)',
    icon:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5.5" x2="8" y2="8.5"/><line x1="8" y1="10.5" x2="8.01" y2="10.5" stroke-width="2"/></svg>`,
    tag: botDim[1].avg<=4.5?'警示區間':'需關注',
    body:`「${botDim[0]}」僅 <strong>${botDim[1].avg}/10</strong>${botDim[1].avg<=4.5?'，建議立刻安排 5 位真人訪談確認痛點深度。':'，處於中低區，有改善空間。'}`
  });
  entries.forEach(([d,v])=>{
    if(v.sd>2.5) ins.push({
      col:'var(--violet)',bg:'rgba(108,75,219,.1)',
      icon:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="14" x2="3" y2="8"/><line x1="8" y1="14" x2="8" y2="4"/><line x1="13" y1="14" x2="13" y2="10"/></svg>`,
      tag:'意見分歧',
      body:`「${d}」標準差 <strong>${v.sd}</strong>，受眾內部態度明顯分歧。可能存在兩個截然不同的細分市場，值得個別深探。`
    });
  });
  document.getElementById('insightsArea').innerHTML=ins.map(i=>`
    <div class="rpt-insight">
      <div class="ri-icon" style="background:${i.bg};color:${i.col}">${i.icon}</div>
      <div>
        <div class="ri-tag" style="color:${i.col}">${i.tag}</div>
        <div class="ri-body">${i.body}</div>
      </div>
    </div>`).join('');

  // ── ⑥ Culture ──
  const sevCol={高:'var(--rose)',中:'var(--amber)',低:'var(--teal)'};
  const sevBg={高:'rgba(201,61,84,.08)',中:'rgba(196,132,29,.08)',低:'rgba(10,143,108,.08)'};
  const cf=[
    {tag:'委婉偏誤校正',sev:'高',
     body:`本次校準值 <strong>${S.cal.indirect}/100</strong>。委婉語（「還好」「也不是不行」）在台灣語境中高頻出現。建議將正面信號再下修 15–25%，才能讀到真實態度。`},
    {tag:'社交驗證依賴',sev:S.cal.social>65?'高':'中',
     body:`校準值 <strong>${S.cal.social}/100</strong>。${S.cal.social>65?'超過 60%':'約 40%'} 合成用戶會「先問朋友」或查 PTT/Dcard 再決策。口碑種子優先於廣告投放。`},
    {tag:'訂閱疲勞',sev:S.cal.subscription<40?'高':'中',
     body:`校準值 <strong>${S.cal.subscription}/100</strong>（越低=越抗拒）。約 ${Math.round((100-S.cal.subscription)*0.7)}% 合成用戶對月費有抵觸。建議設計「買斷 + 訂閱二擇」或年繳折扣。`},
  ];
  document.getElementById('cultureArea').innerHTML=cf.map(f=>`
    <div class="rpt-insight">
      <div class="ri-icon" style="background:${sevBg[f.sev]};color:${sevCol[f.sev]}"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c-1 2-2 4-2 6s1 4 2 6M8 2c1 2 2 4 2 6s-1 4-2 6"/></svg></div>
      <div>
        <div class="ri-tag" style="color:${sevCol[f.sev]}">${f.tag} · ${f.sev}影響</div>
        <div class="ri-body">${f.body}</div>
      </div>
    </div>`).join('');

  // ── ⑦ Actions（重要度而非時間壓力）──
  const lowestKey=botDim?botDim[0]:'弱勢維度';
  const lowestAvg=botDim?botDim[1].avg:5;
  const acts=[
    {pri:'high',col:'var(--primary)',label:'重要',
     body:`安排 5 位真實用戶訪談，聚焦「<strong>${lowestKey}</strong>」（當前 ${lowestAvg}/10）。建議問法：<em>「你上次遇到這個問題是什麼時候？當時怎麼解決的？」</em>`},
    {pri:'mid',col:'var(--amber)',label:'建議',
     body:`在 PTT 創業版 / Dcard 科技版發「試用體驗募集文」，觀察真實留言與 AI 合成結果的落差，驗證模型盲點。`},
    {pri:'mid',col:'var(--amber)',label:'建議',
     body:`製作一頁含 CTA 按鈕的 Landing Page（不需實際收費），用點擊率驗證「<strong>${topDim?topDim[0]:'最強維度'}</strong>」的真實轉換意願。`},
    {pri:'low',col:'var(--teal)',label:'參考',
     body:`從質性聲音中擷取高頻出現的用戶原話，直接用作產品文案素材——用戶說過的語言永遠比你想的文案更有說服力。`},
  ];
  document.getElementById('actionsArea').innerHTML=acts.map(a=>`
    <div class="rpt-action">
      <div class="ra-pri">
        <div class="ra-pri-dot" style="background:${a.col}"></div>
        <div class="ra-pri-label" style="color:${a.col}">${a.label}</div>
      </div>
      <div class="ra-body">${a.body}</div>
    </div>`).join('');

  // ── ⑦b Keyword Map（關鍵詞圖譜）──
  const kwArea=document.getElementById('rptKeywordMap');
  if(kwArea){
    // 從所有質性回答中提取關鍵詞
    const allTexts=S.results.qual.flatMap(q=>q.samples.map(s=>s.text)).join(' ');
    const kwPatterns=[
      {re:/CP值|性價比/g,label:'CP值',cat:'price'},
      {re:/月費|訂閱|付費/g,label:'訂閱制',cat:'price'},
      {re:/PTT|Dcard/g,label:'PTT/Dcard',cat:'channel'},
      {re:/LINE/g,label:'LINE',cat:'channel'},
      {re:/朋友|同事|推薦/g,label:'口碑推薦',cat:'social'},
      {re:/痛點|問題|需求/g,label:'痛點共鳴',cat:'insight'},
      {re:/觀望|猶豫|考慮/g,label:'觀望態度',cat:'risk'},
      {re:/上手|複雜|學習/g,label:'上手門檻',cat:'ux'},
      {re:/超商|取貨/g,label:'超商生態',cat:'channel'},
      {re:/競品|類似|替代/g,label:'競品意識',cat:'compete'},
      {re:/免費|試用/g,label:'免費試用',cat:'price'},
      {re:/時間|效率|省時/g,label:'時間價值',cat:'insight'},
      {re:/信任|安全|保障/g,label:'信任需求',cat:'risk'},
      {re:/工具|App|軟體/g,label:'工具選擇',cat:'product'},
    ];
    const catColors={price:'var(--amber)',channel:'var(--violet)',social:'var(--teal)',insight:'var(--gold)',risk:'var(--rose)',ux:'#5B8FB9',compete:'#8B6BB8',product:'var(--ink-dim)'};
    const catBg={price:'rgba(124,92,252,.1)',channel:'rgba(108,75,219,.1)',social:'rgba(10,143,108,.1)',insight:'rgba(124,92,252,.1)',risk:'rgba(201,61,84,.1)',ux:'rgba(91,143,185,.1)',compete:'rgba(139,107,184,.1)',product:'rgba(136,136,160,.1)'};
    const kwResults=kwPatterns.map(kw=>{
      const matches=allTexts.match(kw.re);
      return{label:kw.label,count:matches?matches.length:0,cat:kw.cat};
    }).filter(k=>k.count>0).sort((a,b)=>b.count-a.count);
    if(kwResults.length>0){
      kwArea.innerHTML=kwResults.map(kw=>{
        const size=kw.count>=5?15:kw.count>=3?14:13;
        const weight=kw.count>=5?700:kw.count>=3?600:500;
        return `<span class="kw-tag" style="background:${catBg[kw.cat]};color:${catColors[kw.cat]};font-size:${size}px;font-weight:${weight}"><span>${kw.label}</span><span class="kw-count">${kw.count}</span></span>`;
      }).join('');
    } else {
      kwArea.parentElement.classList.add('hidden');
    }
  }

  // ── ⑦c Transcripts（訪談記錄）──
  const tcArea=document.getElementById('rptTranscripts');
  if(tcArea && S.interviews && S.interviews.length>0){
    tcArea.innerHTML=S.interviews.slice(0,8).map((iv,idx)=>{
      const p=iv.persona;
      const turns=iv.transcript;
      const turnsHTML=[];
      for(let t=0;t<turns.length;t+=2){
        const q=turns[t], a=turns[t+1];
        if(!q||!a) continue;
        const isFU=q.isFollowUp;
        turnsHTML.push(`<div class="tc-turn ${isFU?'tc-followup':''}"><div class="tc-q">${isFU?'↳ ':''}${q.text}</div><div class="tc-a">${a.text}</div></div>`);
      }
      return `<div class="rpt-transcript-card${idx===0?' open':''}">
        <div class="rpt-tc-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="rpt-tc-avatar">${p.initial}</div>
          <div class="rpt-tc-info">
            <div class="rpt-tc-name">${p.name}</div>
            <div class="rpt-tc-meta">${p.age}歲 ${p.gender} · ${p.job} · ${p.loc}${p.ocean?` · O${Math.round(p.ocean.O/10)}C${Math.round(p.ocean.C/10)}E${Math.round(p.ocean.E/10)}`:''}</div>
          </div>
          <div class="rpt-tc-arrow">▾</div>
        </div>
        <div class="rpt-tc-body">${turnsHTML.join('')}</div>
      </div>`;
    }).join('');
    if(S.interviews.length>8){
      tcArea.innerHTML+=`<div style="text-align:center;padding:8px;font-size:13px;color:var(--ink-dim)">顯示前 8 場 / 共 ${S.interviews.length} 場訪談</div>`;
    }
  }

  // ── ⑦c Verdict（一句話結論）──
  const verdictEl=document.getElementById('rptVerdict');
  if(verdictEl){
    const avg=+overallAvg;
    let verdict='', sub='';
    if(avg>=7.5){
      verdict=`${prodName} 的初步驗證信號強烈正面`;
      sub=`合成用戶對核心價值的認可度高，建議加速進入真人驗證階段，聚焦在轉換率和留存數據。`;
    } else if(avg>=5.5){
      verdict=`${prodName} 有潛力，但需要針對性調整`;
      sub=`整體方向被受眾認可，但「${botDim?botDim[0]:'弱勢維度'}」是明確的阻力點。建議先解決這個瓶頸，再擴大驗證規模。`;
    } else if(avg>=3.5){
      verdict=`${prodName} 的市場接受度低於預期`;
      sub=`多數受眾的反應偏冷。在投入更多資源之前，建議重新審視核心假設——問題是否真實？受眾定義是否精準？`;
    } else {
      verdict=`${prodName} 在當前定位下的市場信號為負面`;
      sub=`強烈建議暫停開發，先用 5-10 位真人訪談釐清：你要解決的問題是否真正存在、受眾是否願意為此付費。`;
    }
    verdictEl.innerHTML=`
      <div class="rv-label">研究結論</div>
      <div class="rv-text">${verdict}</div>
      <div class="rv-sub">${sub}</div>`;
  }

  // ── ⑦d RQS Breakdown（研究品質因子分解）──
  const accSection=document.getElementById('rptAccuracySection');
  const accBody=document.getElementById('rptAccuracyBody');
  if(accSection && accBody){
    accSection.style.display='block';
    const missingFields=[];
    const p=S.product||{};
    if(!p.name) missingFields.push('產品名稱');
    if(!p.desc) missingFields.push('產品描述');
    if(!p.problem) missingFields.push('痛點說明');
    if(!p.pricing) missingFields.push('定價模式');
    if(!p.compete) missingFields.push('競品資訊');
    if(!p.audience) missingFields.push('目標受眾');
    const missingAudDims=[];
    if(!S.region) missingAudDims.push('目標地域');
    if(!S.aud.age||S.aud.age.length===0||S.aud.age.length>3) missingAudDims.push('年齡區間（建議選 1–3 項）');
    if(!S.aud.jobs||S.aud.jobs.length===0||S.aud.jobs.length>3) missingAudDims.push('職業類別（建議選 1–3 項）');
    if(!S.aud.income||S.aud.income.length===0||S.aud.income.length>3) missingAudDims.push('收入區間（建議選 1–3 項）');
    if(!S.aud.life||S.aud.life.length===0||S.aud.life.length>3) missingAudDims.push('生命週期（建議選 1–3 項）');

    const proCalc=calcAccuracy({sampleSize:128,isPro:true,product:{name:'x',desc:'x',problem:'x',pricing:'x',compete:'x',audience:'x'},aud:{age:['25-35'],jobs:['tech'],income:['50-100k'],life:['single']},region:{id:'tw'}});

    let accHTML=`<div style="font-size:13px;color:var(--ink-sec);margin-bottom:12px;line-height:1.6">RQS 衡量方法論完整度，不是統計精度。分數越高代表研究設計越嚴謹，結果越值得參考。</div>`;
    const factorCols=acc.factors.length>=4?'repeat(4,1fr)':'repeat(3,1fr)';
    accHTML+=`<div style="display:grid;grid-template-columns:${factorCols};gap:10px;margin-bottom:12px">`;
    acc.factors.forEach(f=>{
      const pct=Math.round(f.val/f.max*100);
      const col=pct>=75?'var(--teal)':pct>=40?'var(--gold)':'var(--rose)';
      accHTML+=`<div style="background:var(--bg-alt);border-radius:var(--r-sm);padding:12px 14px;border:1px solid var(--border)">
        <div style="font-size:12px;color:var(--ink-dim);margin-bottom:3px">${f.name}</div>
        <div style="font-size:16px;font-weight:700;color:${col}">${f.desc}</div>
        <div style="font-size:12px;color:var(--ink-dim);margin-top:2px">貢獻 +${f.val}</div>
        <div style="height:3px;background:var(--border);border-radius:2px;margin-top:6px"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px"></div></div>
      </div>`;
    });
    accHTML+=`</div>`;

    // 改善建議
    const tips=[];
    if(missingFields.length>0) tips.push(`<strong>補充產品資料</strong>：${missingFields.join('、')}（每補一項約 +0.5–0.8）`);
    if(missingAudDims.length>0) tips.push(`<strong>精準化受眾</strong>：${missingAudDims.join('、')}（每精準一維約 +0.4–0.6）`);
    if(n<64) tips.push(`<strong>增加樣本量</strong>：從 ${n} 人升至 ${n===16?32:64} 人可提升約 +3`);
    if(!acc.hasReal) tips.push(`<strong style="color:var(--teal)">加入真人訪談資料</strong>：5 人 +3、10 人 +5、20 人 +7、30+ 人 +8，是突破 RQS 上限的唯一因子`);
    tips.push(`<strong style="color:var(--primary)">升級 Pro 方案</strong>：128 人 + 完整資料 + 精準受眾${acc.hasReal?'+ 真人校準':''}，RQS 計算上限 ${proCalc.proMax}`);

    if(tips.length>0){
      accHTML+=`<div style="font-size:13px;color:var(--ink-sec);line-height:1.8">
        <div style="font-size:12px;font-weight:700;color:var(--ink-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">如何提升 RQS</div>
        ${tips.map(t=>`<div style="padding:3px 0">${t}</div>`).join('')}
      </div>`;
    }
    accBody.innerHTML=accHTML;
  }

  // ── ⑦e Real vs AI Comparison（真人 vs AI 對照）──
  const realSection=document.getElementById('rptRealVsAiSection');
  const realBody=document.getElementById('rptRealVsAiBody');
  if(realSection && realBody && S.realInterview && S.realInterview.validCount>0){
    realSection.style.display='block';
    const realData=S.realInterview.rows||[];
    const realCount=S.realInterview.validCount;

    // 收集真人量化平均
    const realQuantMap={};
    realData.forEach(d=>{
      Object.entries(d.quant||{}).forEach(([k,v])=>{
        if(!realQuantMap[k])realQuantMap[k]=[];
        realQuantMap[k].push(v);
      });
    });
    const realQuantAvgs={};
    Object.entries(realQuantMap).forEach(([k,vals])=>{
      realQuantAvgs[k]={avg:+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1),n:vals.length};
    });

    // 嘗試對照 AI 量化結果
    // 量化欄位名 → AI 維度的映射
    const colToDim={
      try:'試用意願',action:'行動意願',recommend:'推薦意願',
      pain:'痛點強度',pay:'支付意願',urgency:'急迫感',
      price_expectation:'價格預期',cp:'CP值',
      advantage:'相對優勢',switch:'轉換意願',differentiation:'差異辨識',
      irreplaceable:'不可取代性',alt_satisfaction:'替代方案滿意度',retention:'留存預測',
    };

    let rvHTML=`<div style="font-size:13px;color:var(--ink-sec);margin-bottom:12px;line-height:1.6">
      真人回應 ${realCount} 人 vs AI 合成用戶 ${n} 人的量化指標對照。差距越小代表 AI 模擬越接近真實。
    </div>`;

    // 量化對照表
    const comparisons=[];
    Object.entries(realQuantAvgs).forEach(([col,rv])=>{
      // 嘗試匹配 AI 維度
      const cleanCol=col.replace(/_score$/,'');
      let aiMatch=null;
      // 先嘗試直接匹配
      Object.entries(Q).forEach(([dim,qv])=>{
        const dimLower=dim.toLowerCase();
        if(Object.values(colToDim).some(d=>d===dim)){
          if(Object.entries(colToDim).find(([c,d])=>c===cleanCol&&d===dim)){
            aiMatch={dim,avg:qv.avg};
          }
        }
      });
      // 如果沒匹配到，用模糊匹配
      if(!aiMatch){
        Object.entries(Q).forEach(([dim,qv])=>{
          const kw=cleanCol.replace(/_/g,'');
          if(dim.includes(kw)||kw.includes(dim.replace(/[^a-zA-Z\u4e00-\u9fff]/g,''))){
            aiMatch={dim,avg:qv.avg};
          }
        });
      }
      comparisons.push({col:cleanCol.replace(/_/g,' '),realAvg:rv.avg,realN:rv.n,aiDim:aiMatch?.dim||'—',aiAvg:aiMatch?.avg||null});
    });

    if(comparisons.length>0){
      rvHTML+=`<div style="overflow-x:auto"><table style="width:100%;font-size:13px;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:8px 6px;font-weight:600;color:var(--ink-dim);font-size:12px">指標</th>
          <th style="text-align:center;padding:8px 6px;font-weight:600;color:var(--teal);font-size:12px">真人均值</th>
          <th style="text-align:center;padding:8px 6px;font-weight:600;color:var(--primary);font-size:12px">AI 均值</th>
          <th style="text-align:center;padding:8px 6px;font-weight:600;color:var(--ink-dim);font-size:12px">差距</th>
        </tr></thead><tbody>`;
      comparisons.forEach(c=>{
        const diff=c.aiAvg!==null?Math.abs(c.realAvg-c.aiAvg).toFixed(1):'—';
        const diffCol=diff==='—'?'var(--ink-dim)':+diff<=1?'var(--teal)':+diff<=2?'var(--gold)':'var(--rose)';
        const diffLabel=diff==='—'?'無對應':+diff<=1?'高度一致':+diff<=2?'輕微偏差':'顯著差異';
        rvHTML+=`<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:8px 6px">${c.col}</td>
          <td style="text-align:center;padding:8px 6px;font-weight:600;color:var(--teal)">${c.realAvg}</td>
          <td style="text-align:center;padding:8px 6px;font-weight:600;color:var(--primary)">${c.aiAvg!==null?c.aiAvg:'—'}</td>
          <td style="text-align:center;padding:8px 6px;color:${diffCol};font-weight:600">${diff} <span style="font-size:11px;font-weight:400">${diffLabel}</span></td>
        </tr>`;
      });
      rvHTML+=`</tbody></table></div>`;
    }

    // 質性聲音抽樣（標記為真人）
    const realQualSamples=[];
    realData.slice(0,4).forEach(d=>{
      Object.entries(d.qual||{}).forEach(([k,v])=>{
        if(v&&realQualSamples.length<6){
          realQualSamples.push({col:k.replace(/_/g,' '),text:v,person:`${d.id}${d.occupation?' · '+d.occupation:''}`});
        }
      });
    });
    if(realQualSamples.length>0){
      rvHTML+=`<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;color:var(--ink-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">真人聲音抽樣</div>`;
      rvHTML+=realQualSamples.map(s=>`
        <div style="background:var(--bg-alt);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:6px;border-left:3px solid var(--teal)">
          <div style="font-size:12px;color:var(--teal);font-weight:600;margin-bottom:3px"><span style="background:rgba(45,189,168,.1);padding:1px 6px;border-radius:3px;font-size:10px;margin-right:4px">真人</span>${s.person}</div>
          <div style="font-size:13px;color:var(--ink-sec);line-height:1.5">${s.text}</div>
        </div>
      `).join('');
      rvHTML+=`</div>`;
    }

    realBody.innerHTML=rvHTML;
  }

  // ── AI 研究摘要 ──
  triggerAISummary(Q, entries, overallAvg);
}

async function triggerAISummary(Q, entries, overallAvg) {
  const section = document.getElementById('aiSummarySection');
  const loadingEl = document.getElementById('aiSummaryLoading');
  const textEl = document.getElementById('aiSummaryText');
  if (!section || !window.PATH_AI) return;

  // 顯示 loading
  section.style.display = 'block';
  loadingEl.style.display = 'flex';
  textEl.style.display = 'none';

  // 收集質性樣本
  const qualSamples = (S.results.qual || []).flatMap(q =>
    q.samples.slice(0, 2).map(s => ({ name: s.name, dim: q.dim, text: s.text }))
  ).slice(0, 8);

  const rtLabel = {concept:'概念驗證',pain:'痛點深掘',pricing:'定價測試',compete:'競品比較',retain:'留存驗證',custom:'自定義'};

  try {
    const aiResult = await window.PATH_AI.reportAI({
      product: S.product,
      researchType: rtLabel[S.rt] || S.rt,
      region: S.region?.name || '台灣',
      sampleSize: S.aud.sampleSize || 16,
      hypothesis: S.hypo || '',
      quant: Q,
      qualSamples: qualSamples,
      overallAvg: overallAvg,
    });

    if (aiResult.text) {
      loadingEl.style.display = 'none';
      textEl.textContent = aiResult.text;
      textEl.style.display = 'block';

      // AI 使用統計標記
      if (S.aiStats) {
        const statsTag = document.createElement('div');
        statsTag.style.cssText = 'margin-top:12px;font-size:13px;color:var(--ink-dim);display:flex;align-items:center;gap:6px;flex-wrap:wrap';
        const mode = aiResult.source === 'dev-sim' ? 'AI 模擬模式' : 'LLM 生成';
        statsTag.innerHTML = `<span style="background:rgba(124,92,252,.1);color:var(--gold);padding:2px 6px;border-radius:3px;font-weight:600">${mode}</span>`;
        if (S.aiStats.used > 0) statsTag.innerHTML += `<span>${S.aiStats.used} 則 AI 回覆</span>`;
        if (S.aiStats.fallback > 0) statsTag.innerHTML += `<span>${S.aiStats.fallback} 則規則引擎回覆</span>`;
        textEl.appendChild(statsTag);
      }
    } else {
      section.style.display = 'none';
    }
  } catch (e) {
    console.warn('[PATH AI] report summary failed:', e);
    section.style.display = 'none';
  }
}

function exportMarkdown(){
  const Q=S.results.quant;
  const n=S.aud.sampleSize||16;
  const entries=Object.entries(Q);
  const rtLabel={concept:'概念驗證',pain:'痛點深掘',pricing:'定價測試',compete:'競品比較',retain:'留存驗證',custom:'自定義'};
  let md=`# PATH 受眾研究室 研究報告\n\n`;
  md+=`**產品：** ${S.product.name||'未命名'}  \n`;
  md+=`**研究類型：** ${rtLabel[S.rt]||S.rt}  \n`;
  md+=`**地域：** ${S.region?.name||'台灣'}  \n`;
  md+=`**合成用戶數：** ${n}  \n`;
  md+=`**受眾類型：** ${S.audType==='b2b'?'To B 企業採購':'To C 個人消費者'}  \n`;
  if(S.hypo) md+=`**核心假設：** ${S.hypo}  \n`;
  md+=`\n---\n\n## 量化評分\n\n`;
  md+=`| 維度 | 平均分 | 受眾一致性 |\n|------|--------|------------|\n`;
  entries.forEach(([d,v])=>{
    const sdLabel=v.sd<1.5?'一致':v.sd<2.5?'略有分歧':'明顯分裂';
    md+=`| ${d} | ${v.avg}/10 | ${sdLabel} |\n`;
  });
  const overallAvg=entries.length?(entries.reduce((s,[,v])=>s+v.avg,0)/entries.length).toFixed(1):'—';
  md+=`\n**綜合平均：** ${overallAvg}/10\n\n`;
  md+=`## 質性聲音抽樣\n\n`;
  S.results.qual.slice(0,4).forEach(item=>{
    md+=`### ${item.dim}\n\n`;
    item.samples.slice(0,2).forEach(s=>{
      md+=`> **${s.name}：** ${s.text}\n\n`;
    });
  });
  md+=`## 研究結論\n\n`;
  md+=document.getElementById('rptVerdict')?.innerText||'';
  const rptAcc=calcAccuracy();
  md+=`\n\n## 研究品質分數 (RQS)\n\n`;
  md+=`RQS 衡量方法論完整度，非統計精度。\n\n`;
  md+=`| 因子 | 貢獻 | 說明 |\n|------|------|------|\n`;
  rptAcc.factors.forEach(f=>md+=`| ${f.name} | +${f.val} | ${f.desc} |\n`);
  md+=`\n**RQS 範圍：** ${rptAcc.range}\n\n`;
  // 真人 vs AI 對照
  if(S.realInterview && S.realInterview.validCount>0){
    md+=`## 真人 vs AI 對照\n\n`;
    md+=`真人回應 ${S.realInterview.validCount} 人\n\n`;
    const realData=S.realInterview.rows||[];
    // 量化對照
    const realQuantMap={};
    realData.forEach(d=>{
      Object.entries(d.quant||{}).forEach(([k,v])=>{
        if(!realQuantMap[k])realQuantMap[k]=[];
        realQuantMap[k].push(v);
      });
    });
    if(Object.keys(realQuantMap).length>0){
      md+=`| 指標 | 真人均值 | 樣本數 |\n|------|----------|--------|\n`;
      Object.entries(realQuantMap).forEach(([k,vals])=>{
        const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
        md+=`| ${k.replace(/_score$/,'').replace(/_/g,' ')} | ${avg} | ${vals.length} |\n`;
      });
      md+=`\n`;
    }
    // 質性抽樣
    const qualSamples=[];
    realData.slice(0,3).forEach(d=>{
      Object.entries(d.qual||{}).forEach(([k,v])=>{
        if(v&&qualSamples.length<4) qualSamples.push({id:d.id,text:v});
      });
    });
    if(qualSamples.length>0){
      md+=`### 真人聲音\n\n`;
      qualSamples.forEach(s=>md+=`> **${s.id}：** ${s.text}\n\n`);
    }
  }
  md+=`\n\n---\n\n*由 PATH 受眾研究室 v0.7.0 生成 · ${new Date().toLocaleDateString('zh-TW')} · BeyondSpec*\n`;
  const blob=new Blob([md],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`PATH-Lab-${S.product.name||'report'}-${new Date().toISOString().slice(0,10)}.md`;
  a.click();URL.revokeObjectURL(url);
}

function initFromURL(){
  const p = new URLSearchParams(window.location.search);
  if(!p.has('pathP')) return; // 沒有參數就正常啟動

  const pathP=+p.get('pathP'), pathA=+p.get('pathA'),
        pathT=+p.get('pathT'), pathH=+p.get('pathH'),
        weak=p.get('weak')||'A', rt=p.get('rt')||'concept',
        total=+p.get('total')||0;

  // 研究類型自動選
  S.rt = rt;
  document.querySelectorAll('#rtChips .chip').forEach(c=>{
    c.classList.toggle('sel', c.dataset.v===rt);
  });

  // 核心假設自動填入
  const hypoMap = {
    P: `我的核心假設：目標用戶正在經歷的痛點真實存在，且嚴重到願意為解法付費（P分 ${pathP}/100）。`,
    A: `我的核心假設：我能精準觸達「___」這個受眾群體，他們有清楚的共同特徵與需求（A分 ${pathA}/100）。`,
    T: `我的核心假設：目標用戶願意為這個產品付費，且月費設定在「___」是合理的起點（T分 ${pathT}/100）。`,
    H: `我的核心假設：我的解法相比現有替代方案有明顯差異化，用戶能清楚感受到（H分 ${pathH}/100）。`,
  };
  const hypoEl = document.getElementById('hypo');
  if(hypoEl) hypoEl.value = hypoMap[weak] || hypoMap['A'];
  S.hypo = hypoEl ? hypoEl.value : '';

  // 在 Phase A 卡片頂部插入「來自 PATH 診斷」提示橫幅
  const fromBadge = document.createElement('div');
  fromBadge.style.cssText = 'background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.25);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--gold);display:flex;align-items:center;gap:8px;';
  fromBadge.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M14 2L2 8l5 2 2 5 5-13Z"/><line x1="9" y1="10" x2="12" y2="7"/></svg><div><strong>來自 PATH 診斷結果</strong>——最弱維度：<strong>${
    {P:'P · 問題驗證',A:'A · 受眾輪廓',T:'T · 牽引力',H:'H · 執行力'}[weak]
  }（${[pathP,pathA,pathT,pathH][['P','A','T','H'].indexOf(weak)]}/100）</strong>。<br>研究類型已自動設定，核心假設已預填。</div>`;
  const phaseA = document.getElementById('phase-0');
  if(phaseA) phaseA.insertBefore(fromBadge, phaseA.firstChild);

  // 受眾根據 PATH 類型預設
  if(p.get('type')==='AI'){
    S.aud.jobs = ['tech','self'];
    S.aud.age  = ['25-35','35-45'];
    document.querySelectorAll('#jobChips .chip').forEach(c=>c.classList.toggle('sel',['tech','self'].includes(c.dataset.v)));
  }
}

function saveResearch(){
  try{
    // Save to localStorage (Lab history)
    const history=JSON.parse(localStorage.getItem('path_lab_history')||'[]');
    const record={
      id:Date.now().toString(),
      date:new Date().toISOString(),
      product:S.product.name||'未命名',
      rt:S.rt, audType:S.audType,
      region:S.region?.name||'台灣',
      n:S.aud.sampleSize||16,
      quant:S.results.quant,
      qual:S.results.qual,
      verdict:document.getElementById('rptVerdict')?.innerText?.slice(0,100)||''
    };
    history.unshift(record);
    if(history.length>20) history.length=20;
    localStorage.setItem('path_lab_history',JSON.stringify(history));

    // Also save to app state.researches (for Reports tab)
    const rtLabel={concept:'概念驗證',pain:'痛點深掘',pricing:'定價測試',compete:'競品比較',retain:'留存驗證',custom:'自定義'};
    const quantVals=Object.values(record.quant||{});
    const avgScore=quantVals.length?(quantVals.reduce((s,v)=>s+(v.avg||0),0)/quantVals.length).toFixed(1):'—';
    state.researches.unshift({
      id:record.id,
      productName:record.product,
      date:record.date,
      type:rtLabel[record.rt]||record.rt,
      sampleSize:record.n,
      score:avgScore,
      region:record.region,
      audType:record.audType,
      quant:record.quant,
      qual:record.qual,
      verdict:record.verdict
    });
    localStorage.setItem('bp_researches',JSON.stringify(state.researches));
    showToast('研究已保存至研究報告');
  }catch(e){ console.error('saveResearch error:',e); }
}

  function viewDiagnosis(diagId) {
    const d = state.diagnoses.find(x => x.id === diagId);
    if (!d) { showToast('找不到該診斷記錄'); return; }
    // Re-render diagnosis result page using stored data
    // Synthesize raw scores from normalized (approx: norm/100*15+5 → array of 5)
    const syntheticRaw = {};
    ['P','A','T','H'].forEach(dim => {
      const n = d.scores[dim] || 0;
      const total = Math.round(n / 100 * 15 + 5);
      const avg = total / 5;
      syntheticRaw[dim] = Array(5).fill(Math.round(avg));
    });
    state.quizState = {
      type: d.type,
      currentDim: 0,
      currentQuestion: 0,
      answers: {},
      scores: d.rawScores || syntheticRaw,
      productName: d.productName || '',
      results: { normalized: d.scores, total: d.total, pathType: d.pathType },
      rediagId: d.id,
      _viewOnly: true
    };
    showQuizResults();
  }

  function viewResearch(researchId) {
    const research = state.researches.find(r => r.id === researchId);
    if (!research) { showToast('找不到該研究記錄'); return; }
    // Load data back into Lab state and show Phase D (report)
    S.product = { name: research.productName };
    S.rt = research.type;
    S.audType = research.audType || 'b2c';
    S.results = { quant: research.quant || {}, qual: research.qual || [] };
    navigate('lab');
    // Jump directly to Phase D (report)
    setTimeout(() => {
      curPhase = 3;
      PH.forEach((p,i) => { const el=document.getElementById(p); if(el) el.classList.toggle('hidden',i!==3); });
      renderSteps();
      renderResults();
      scrollContentTop();
    }, 100);
  }

  function exportResearchJSON(researchId) {
    const r = state.researches.find(r => r.id === researchId);
    if (!r) return;
    const json = JSON.stringify(r, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (r.productName||'research') + '_report.json';
    a.click(); URL.revokeObjectURL(url);
    showToast('JSON 已下載');
  }

  function renameResearch(researchId) {
    const r = state.researches.find(r => r.id === researchId);
    if (!r) return;
    const newName = prompt('重新命名研究報告：', r.productName || '');
    if (newName === null || !newName.trim()) return;
    r.productName = newName.trim();
    try { localStorage.setItem('bp_researches', JSON.stringify(state.researches)); } catch(e){}
    saveState();
    renderHome();
    showToast('已重命名');
  }

  function deleteResearch(researchId) {
    if (!confirm('確定刪除這份研究？此操作無法復原。')) return;
    state.researches = state.researches.filter(r => r.id !== researchId);
    try { localStorage.setItem('bp_researches', JSON.stringify(state.researches)); } catch(e){}
    saveState();
    renderHome();
    showToast('已刪除');
  }

  function exportResearchMD(researchId) {
    const r = state.researches.find(r => r.id === researchId);
    if (!r) return;
    const rtLabel = r.type || '概念驗證';
    const date = new Date(r.date).toLocaleDateString('zh-TW');
    let md = '# ' + (r.productName||'研究報告') + '\\n\\n';
    md += '| 項目 | 內容 |\\n|---|---|\\n';
    md += '| 研究類型 | ' + rtLabel + ' |\\n';
    md += '| 受眾類型 | ' + (r.audType==='b2b'?'B2B':'B2C') + ' |\\n';
    md += '| 市場地域 | ' + (r.region||'—') + ' |\\n';
    md += '| 樣本數 | ' + (r.sampleSize||'—') + ' |\\n';
    md += '| 均分 | ' + (r.score||'—') + '/10 |\\n';
    md += '| 日期 | ' + date + ' |\\n\\n';
    if (r.verdict) md += '## 總結\\n' + r.verdict + '\\n\\n';
    if (r.quant) {
      md += '## 量化指標\\n';
      Object.entries(r.quant).forEach(([k,v]) => {
        md += '- **' + k + '**: 均值 ' + (v.avg||'—').toString() + ', 中位數 ' + (v.med||'—').toString() + '\\n';
      });
    }
    const blob = new Blob([md], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (r.productName||'research') + '_report.md';
    a.click(); URL.revokeObjectURL(url);
    showToast('Markdown 已下載');
  }

  // ==================== ADVANCED ANALYTICS ====================
  function analyzeQuizResponses() {
    const responses = state.quizState.answers;
    const scores = state.quizState.scores;
    const dims = ['P', 'A', 'T', 'H'];

    const analysis = {
      totalResponses: Object.keys(responses).length,
      avgScore: 0,
      strongestDim: null,
      weakestDim: null,
      consistencyScore: 0,
      improvementAreas: []
    };

    const normalized = {};
    dims.forEach(dim => {
      const dimScores = scores[dim] || [];
      const avg = dimScores.length > 0 ? dimScores.reduce((a, b) => a + b) / dimScores.length : 0;
      normalized[dim] = avg;
    });

    analysis.avgScore = Object.values(normalized).reduce((a, b) => a + b, 0) / dims.length;
    analysis.strongestDim = dims.reduce((best, current) =>
      normalized[current] > normalized[best] ? current : best
    );
    analysis.weakestDim = dims.reduce((worst, current) =>
      normalized[current] < normalized[worst] ? current : worst
    );

    const stddevs = dims.map(dim => {
      const dimScores = scores[dim] || [];
      const mean = normalized[dim];
      return Math.sqrt(dimScores.reduce((sq, n) => sq + Math.pow(n - mean, 2), 0) / dimScores.length);
    });

    analysis.consistencyScore = 100 - (stddevs.reduce((a, b) => a + b, 0) / stddevs.length) * 20;

    dims.forEach(dim => {
      if (normalized[dim] < 5) {
        analysis.improvementAreas.push(dim);
      }
    });

    return analysis;
  }

  // ==================== UTILITY FUNCTIONS ====================
  function debounce(func, delay) {
    let timeoutId;
    return function(...args) {
      clearTimeout(timeoutId);
      timeoutId = setTimeout(() => func.apply(this, args), delay);
    };
  }

  function throttle(func, delay) {
    let lastCall = 0;
    return function(...args) {
      const now = Date.now();
      if (now - lastCall >= delay) {
        lastCall = now;
        func.apply(this, args);
      }
    };
  }

  function getCurrentTimestamp() {
    return new Date().toISOString();
  }

  function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('zh-TW', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function calculateConfidenceInterval(mean, stddev, sampleSize, confidence = 0.95) {
    const zScore = confidence === 0.95 ? 1.96 : 2.576;
    const marginOfError = zScore * (stddev / Math.sqrt(sampleSize));
    return {
      lower: mean - marginOfError,
      upper: mean + marginOfError
    };
  }

  function generateRandomId() {
    return 'id_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
  }

  function cloneDeep(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function mergeObjects(target, source) {
    const result = { ...target };
    Object.keys(source).forEach(key => {
      if (typeof source[key] === 'object' && !Array.isArray(source[key])) {
        result[key] = mergeObjects(result[key] || {}, source[key]);
      } else {
        result[key] = source[key];
      }
    });
    return result;
  }

  async function handleDocFile(file) {
    if (!file) return;

    if (file.size > maxSize) { showToast('文件超過 2MB 限制'); return; }

    const ext = file.name.split('.').pop().toLowerCase();

        text = await file.text();
      } else if (ext === 'pdf') {
        text = await extractPdfText(file);
      } else if (ext === 'docx') {

  // Simple PDF text extraction (reads raw text from PDF stream)
  async function extractPdfText(file) {
    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    let text = '';
    // Try to decode as text — works for text-based PDFs
    const rawStr = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
    // Extract text between BT and ET (PDF text blocks)
    const textBlocks = rawStr.match(/\(([^)]+)\)/g);
    if (textBlocks && textBlocks.length > 5) {
      text = textBlocks.map(b => b.slice(1, -1)).join(' ');
    }
    // If PDF text extraction fails, inform user
    if (text.trim().length < 20) {
      // Fallback: try to find readable strings
      const readable = rawStr.match(/[\u4e00-\u9fff\u3400-\u4dbfa-zA-Z0-9\s,.!?，。！？、；：""''（）\[\]【】]{10,}/g);
      if (readable) text = readable.join('\n');
    }
    if (text.trim().length < 20) {
      throw new Error('PDF 解析失敗。建議複製文字內容到 .txt 後重新上傳。');
    }
    return text;
  }

  // Simple DOCX text extraction (reads XML from zip)
  async function extractDocxText(file) {
    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    // DOCX is a ZIP file, find document.xml
    // Simple ZIP parser: look for 'word/document.xml' entry
    const rawStr = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
    // Find XML content between <w:t> tags
    const matches = rawStr.match(/<w:t[^>]*>([^<]+)<\/w:t>/g);
    if (matches && matches.length > 0) {
      return matches.map(m => m.replace(/<[^>]+>/g, '')).join('');
    }
    throw new Error('DOCX 解析失敗。建議複製文字內容到 .txt 後重新上傳。');
  }

      const resp = await fetch('https://api.openai.com/v1/chat/completions', {

        body: JSON.stringify({

      const data = await resp.json();
      const content = data.choices?.[0]?.message?.content || '';

      // Parse JSON from response
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('AI 回應格式異常');
      const result = JSON.parse(jsonMatch[0]);

      const scores = {
        P: Math.max(0, Math.min(100, Math.round(result.P || result.problem || 50))),
        A: Math.max(0, Math.min(100, Math.round(result.A || result.audience || 50))),
        T: Math.max(0, Math.min(100, Math.round(result.T || result.traction || 50))),
        H: Math.max(0, Math.min(100, Math.round(result.H || result.how || 50)))
      };

      finishDocDiagnosis(prodName, scores, docText, result.summary || '');

    } catch (err) {
      console.warn('AI scoring failed, using template:', err);

      const scores = templateBasedScoring(docText);

  // Detect if the product is AI-related
  function isAIProduct(text) {
    const t = text.toLowerCase();
    const aiKeywords = /\bai\b|人工智慧|機器學習|machine learning|deep learning|llm|大語言模型|gpt|claude|gemini|transformer|neural|模型|inference|推論|fine-?tun|微調|prompt|embedding|向量|rag|agent|chatbot|聊天機器人|生成式|generative|nlp|自然語言|computer vision|電腦視覺|diffusion|stable diffusion|midjourney/;
    const matches = (t.match(aiKeywords) || []).length;
    return matches >= 2; // at least 2 AI-related terms → classified as AI product
  }

  // Fallback: keyword-based scoring when no API key
  function templateBasedScoring(text) {
    const t = text.toLowerCase();
    const len = text.length;
    const isAI = isAIProduct(text);

    // P — Problem: keywords about pain, problem, need
    let P = 35;
    if (/痛點|問題|需求|困擾|挑戰|不滿|難以|缺乏|pain|problem|need|challenge/.test(t)) P += 15;
    if (/願意付費|付費意願|收費|pricing|pay|monetiz/.test(t)) P += 10;
    if (/真實|驗證|確認|validated|confirmed/.test(t)) P += 8;
    if (/訪談|調查|survey|interview|研究/.test(t)) P += 7;
    // AI-specific P adjustments
    if (isAI) {
      if (/沒有\s*ai.*也.*價值|不依賴\s*ai|ai.*加速|核心價值.*不是.*ai/i.test(t)) P += 8;
      if (/hallucin|幻覺|準確率|accuracy|品質|可靠/i.test(t)) P += 5;
    }

    // A — Audience: keywords about target users
    let A = 30;
    if (/受眾|目標用戶|客群|persona|target|audience|用戶畫像/.test(t)) A += 15;
    if (/年齡|職業|收入|地區|demographic|segment/.test(t)) A += 10;
    if (/B2B|B2C|企業|消費者|開發者|設計師/.test(t)) A += 8;
    if (/\d+.*人|樣本|sample|用戶數/.test(t)) A += 7;
    // AI-specific A adjustments
    if (isAI) {
      if (/早期採用|early adopter|技術愛好者|innovator/.test(t)) A += 6;
      if (/ai.*literacy|ai.*素養|不懂.*技術|非技術/.test(t)) A += 5;
    }

    // T — Traction（牽引力）: 賽道定位 + 市場拉力 + 潛力價值
    let T = 30;
    if (/競品|替代方案|competitor|alternative|差異化|賽道|定位|positioning/.test(t)) T += 15;
    if (/市場規模|TAM|SAM|market size|billion|million|市場拉力|需求/.test(t)) T += 10;
    if (/定價|價格|收費|月費|年費|price|pricing|商業模式|business model/.test(t)) T += 8;
    if (/趨勢|trend|成長|growth|護城河|moat|壁壘|潛力/.test(t)) T += 7;
    // AI-specific T adjustments
    if (isAI) {
      if (/護城河|moat|數據.*壁壘|獨家.*數據|proprietary/.test(t)) T += 7;
      if (/api.*成本|token.*cost|inference.*cost|推論成本/.test(t)) T += 5;
    }

    // H — How（執行力）: 執行條件 + 資源 + 團隊 + 策略夥伴
    let H = 30;
    if (/MVP|原型|prototype|demo|beta|里程碑|milestone/.test(t)) H += 15;
    if (/團隊|founder|co-founder|CTO|背景|經驗|expertise|domain/.test(t)) H += 10;
    if (/資源|資金|funding|投資|investor|顧問|advisor/.test(t)) H += 8;
    if (/合作|夥伴|partner|通路|channel|策略聯盟|alliance|迭代|iterate/.test(t)) H += 7;
    // AI-specific H adjustments
    if (isAI) {
      if (/fine-?tun|微調|自建模型|訓練|training|gpu|算力/.test(t)) H += 7;
      if (/ai.*團隊|ml.*engineer|資料科學|data scientist/.test(t)) H += 6;
      if (/api.*串接|openai|anthropic|azure.*ai|aws.*bedrock/.test(t)) H += 4;
    }

    // Bonus for document completeness
    const completeness = Math.min(10, Math.floor(len / 500));
    P = Math.min(100, P + completeness);
    A = Math.min(100, A + completeness);
    T = Math.min(100, T + completeness);
    H = Math.min(100, H + completeness);

    return { P, A, T, H, isAI };
  }

  function finishDocDiagnosis(prodName, scores, docText, aiSummary) {
    const normalized = scores;
    const total = Math.round((scores.P + scores.A + scores.T + scores.H) / 4);

    let pathType = '萌芽探索者';
    if (total > 25) pathType = '摸索前進者';
    if (total > 50) pathType = '蓄勢待發者';
    if (total > 75) pathType = '準備起飛者';

    const dims = ['P', 'A', 'T', 'H'];
    const weakest = dims.slice().sort((a, b) => normalized[a] - normalized[b]);
    const strongest = dims.slice().sort((a, b) => normalized[b] - normalized[a]);
    const weakDim = DIMENSIONS.find(d => d.id === weakest[0]);
    const strongDim = DIMENSIONS.find(d => d.id === strongest[0]);

    const verdictData = getVerdict(normalized, total, weakDim, strongDim);

    // Save to state
    const detectedAI = isAIProduct(docText);
    const diagnosis = {
      id: 'diag_' + Date.now(),
      type: detectedAI ? 'ai' : 'standard',
      date: new Date().toISOString(),
      scores: normalized,
      rawScores: { P: [normalized.P], A: [normalized.A], T: [normalized.T], H: [normalized.H] },
      total: total,
      pathType: pathType,
      productName: prodName,
      verdict: verdictData.verdict,
      verdictTitle: verdictData.title,
      source: 'doc_import',
      isAIProduct: detectedAI,
      docExcerpt: docText.substring(0, 200)
    };
    state.diagnoses.push(diagnosis);
    saveState();

    // Re-use the quiz results display
    state.quizState.type = 'standard';
    state.quizState.productName = prodName;
    state.quizState.scores = { P: [normalized.P], A: [normalized.A], T: [normalized.T], H: [normalized.H] };
    state.quizState.results = { normalized, total, pathType };
    state.quizState._viewOnly = true;

    showQuizResults();
    showToast('產品資料匯入診斷完成！');
  }
